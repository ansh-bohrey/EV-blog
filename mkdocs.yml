site_name: EV BMS Blog
site_description: Practical EV battery and BMS engineering topics
site_url: https://ansh-bohrey.github.io/EV-blog/
repo_url: https://github.com/ansh-bohrey/EV-blog
repo_name: ansh-bohrey/EV-blog
docs_dir: claude_blog
theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: default
    primary: white
    accent: blue
  features:
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
extra:
  analytics:
    provider: google
    property: G-21L0CKXXJ3
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/sidebar-toggle.js
  - javascripts/iframe-resize.js
plugins:
  - search
nav:
  - Home: index.md
  - Intro:
      - Series Overview: intro/series-overview.md
      - Equivalent Circuit Model: intro/equivalent-circuit-model.md
  - Battery:
      - Cell: battery/cell.md
      - Battery Pack and Module: battery/battery.md
      - Cooling: battery/cooling.md
  - BMS Concepts:
      - BMS Introduction: bms_concepts/bms-introduction.md
      - OCV vs Terminal Voltage: bms_concepts/ocv-vs-terminal-voltage.md
      - State of Charge (SOC): bms_concepts/state-of-charge-soc.md
      - State of Health (SOH): bms_concepts/state-of-health-soh.md
      - State of Power (SOP): bms_concepts/state-of-power-sop.md
      - Analog Front End (AFE): bms_concepts/analog-front-end-afe.md
      - Cell Balancing: bms_concepts/cell-balancing.md
      - Charging Algorithm: bms_concepts/charging-algorithm.md
      - Deep Discharge Protection: bms_concepts/deep-discharge-protection.md
      - Ignition Handling: bms_concepts/ignition-handling.md
      - Thermal Runaway Detection: bms_concepts/thermal-runaway-detection-handling.md
      - Error Handling and Fault Reporting: bms_concepts/error-handling-fault-reporting.md
      - HV Safety Architecture: bms_concepts/hv-safety-architecture.md
      - Battery Paralleling: bms_concepts/battery-paralleling.md
      - BMS During a Drive: bms_concepts/bms-during-a-drive.md
  - Interfaces:
      - Communication Interface Overview: interfaces/communication-interface.md
      - CAN: interfaces/can.md
      - RS-485 and RS-232: interfaces/rs-485-232.md
  - EV:
      - EV Nodes: ev/ev-nodes.md
      - Why Range Drops in Winter: ev/why-range-drops-in-winter.md
      - Regenerative Braking: ev/regenerative-braking.md
