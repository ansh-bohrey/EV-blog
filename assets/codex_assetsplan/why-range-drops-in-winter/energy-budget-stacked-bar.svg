<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .bar1{fill:#1f77b4;}
    .bar2{fill:#ff7f0e;}
    .bar3{fill:#2ca02c;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Energy Budget: Summer vs Winter</text>
  <rect x="260" y="200" width="120" height="250" class="bar1"/>
  <rect x="260" y="450" width="120" height="0" class="bar2"/>
  <text x="260" y="520" class="label">Summer</text>

  <rect x="620" y="160" width="120" height="290" class="bar1"/>
  <rect x="620" y="450" width="120" height="80" class="bar2"/>
  <rect x="620" y="530" width="120" height="40" class="bar3"/>
  <text x="620" y="590" class="label">Winter</text>

  <text x="420" y="230" class="label">Propulsion</text>
  <text x="760" y="470" class="label">Heating</text>
  <text x="760" y="560" class="label">Battery heat</text>
</svg>
