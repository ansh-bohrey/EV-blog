<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .axis{stroke:#222;stroke-width:2;}
    .grid{stroke:#e6e6e6;stroke-width:1;}
    .canh{stroke:#1f77b4;stroke-width:3;fill:none;}
    .canl{stroke:#d62728;stroke-width:3;fill:none;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">CAN Differential Signaling</text>
  <line x1="100" y1="100" x2="100" y2="600" class="axis"/>
  <line x1="100" y1="600" x2="1100" y2="600" class="axis"/>
  <line x1="100" y1="300" x2="1100" y2="300" class="grid"/>
  <path d="M100 260 L200 260 L200 220 L300 220 L300 260 L400 260 L400 220 L500 220" class="canh"/>
  <path d="M100 340 L200 340 L200 380 L300 380 L300 340 L400 340 L400 380 L500 380" class="canl"/>
  <text x="520" y="240" class="label">CAN_H</text>
  <text x="520" y="380" class="label">CAN_L</text>
</svg>
