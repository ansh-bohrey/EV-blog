<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .line{stroke:#333;stroke-width:3;}
    .node{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">CAN Bus Topology (Linear + Stubs)</text>
  <line x1="120" y1="300" x2="1080" y2="300" class="line"/>
  <rect x="200" y="220" width="120" height="60" class="node"/>
  <rect x="440" y="220" width="120" height="60" class="node"/>
  <rect x="680" y="220" width="120" height="60" class="node"/>
  <rect x="920" y="220" width="120" height="60" class="node"/>
  <line x1="260" y1="300" x2="260" y2="280" class="line"/>
  <line x1="500" y1="300" x2="500" y2="280" class="line"/>
  <line x1="740" y1="300" x2="740" y2="280" class="line"/>
  <line x1="980" y1="300" x2="980" y2="280" class="line"/>
  <text x="150" y="360" class="label">120Ω termination</text>
  <text x="900" y="360" class="label">120Ω termination</text>
</svg>
