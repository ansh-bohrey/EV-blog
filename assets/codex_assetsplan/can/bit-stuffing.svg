<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .line{stroke:#333;stroke-width:3;fill:none;}
    .label{font:14px sans-serif;fill:#111;}
    .stuff{stroke:#d62728;stroke-width:3;}
  </style>
  <text x="40" y="40" class="title">Bit Stuffing Example</text>
  <path d="M100 300 L200 300 L200 240 L300 240 L300 300 L400 300 L400 240 L500 240 L500 300 L600 300" class="line"/>
  <line x1="600" y1="300" x2="660" y2="240" class="stuff"/>
  <text x="680" y="240" class="label">Stuff bit</text>
</svg>
