<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">Error Frame → Bus Off (Concept)</text>
  <rect x="120" y="200" width="240" height="80" class="box"/>
  <text x="150" y="245" class="label">Error Detected</text>
  <rect x="460" y="200" width="240" height="80" class="box"/>
  <text x="490" y="245" class="label">Error Frame</text>
  <rect x="800" y="200" width="240" height="80" class="box"/>
  <text x="850" y="245" class="label">Bus Off</text>
  <line x1="360" y1="240" x2="460" y2="240" class="arrow"/>
  <line x1="700" y1="240" x2="800" y2="240" class="arrow"/>
</svg>
