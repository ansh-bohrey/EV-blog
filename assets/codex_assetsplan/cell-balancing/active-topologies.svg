<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>
  <text x="40" y="40" class="title">Active Balancing Topologies (Overview)</text>

  <rect x="80" y="120" width="300" height="200" class="box"/>
  <text x="100" y="160" class="label">Capacitor Shuttle</text>
  <text x="100" y="190" class="label">Simple, slow</text>

  <rect x="450" y="120" width="300" height="200" class="box"/>
  <text x="470" y="160" class="label">Inductor-based</text>
  <text x="470" y="190" class="label">Efficient, complex</text>

  <rect x="820" y="120" width="300" height="200" class="box"/>
  <text x="840" y="160" class="label">Transformer-based</text>
  <text x="840" y="190" class="label">Non-adjacent cells</text>
</svg>
