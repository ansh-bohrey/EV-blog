<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .cell { stroke: #333; stroke-width: 2; fill: #f2f2f2; }
    .weak { fill: #f8c9d4; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>
  <text x="40" y="40" class="title">Weakest Cell Limits the Pack</text>

  <rect x="120" y="200" width="80" height="200" class="cell"/>
  <rect x="220" y="200" width="80" height="200" class="cell"/>
  <rect x="320" y="200" width="80" height="200" class="cell weak"/>
  <rect x="420" y="200" width="80" height="200" class="cell"/>
  <rect x="520" y="200" width="80" height="200" class="cell"/>

  <text x="310" y="430" class="label">Low capacity</text>
  <text x="120" y="470" class="label">Series string</text>
</svg>
