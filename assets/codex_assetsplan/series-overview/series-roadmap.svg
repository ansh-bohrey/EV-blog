<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
    .arrow { stroke: #333; stroke-width: 2.5; fill: none; }
  </style>

  <text x="40" y="40" class="title">Series Roadmap (Dependency Flow)</text>

  <!-- Row 1 -->
  <rect x="60" y="80" width="200" height="60" class="box"/>
  <text x="75" y="115" class="label">OCV vs Terminal Voltage</text>

  <rect x="300" y="80" width="140" height="60" class="box"/>
  <text x="335" y="115" class="label">SOC</text>

  <rect x="480" y="80" width="140" height="60" class="box"/>
  <text x="515" y="115" class="label">SOH</text>

  <rect x="660" y="80" width="140" height="60" class="box"/>
  <text x="695" y="115" class="label">SOP</text>

  <!-- Row 2 -->
  <rect x="840" y="80" width="200" height="60" class="box"/>
  <text x="860" y="115" class="label">Deep Discharge</text>

  <rect x="60" y="200" width="200" height="60" class="box"/>
  <text x="85" y="235" class="label">Cell Balancing</text>

  <rect x="300" y="200" width="140" height="60" class="box"/>
  <text x="335" y="235" class="label">AFE</text>

  <rect x="480" y="200" width="200" height="60" class="box"/>
  <text x="505" y="235" class="label">Charging Algorithm</text>

  <!-- Row 3 -->
  <rect x="720" y="200" width="180" height="60" class="box"/>
  <text x="740" y="235" class="label">Ignition Handling</text>

  <rect x="930" y="200" width="210" height="60" class="box"/>
  <text x="950" y="235" class="label">HV Safety Architecture</text>

  <!-- Row 4 -->
  <rect x="60" y="320" width="200" height="60" class="box"/>
  <text x="85" y="355" class="label">Communication Interface</text>

  <rect x="300" y="320" width="140" height="60" class="box"/>
  <text x="335" y="355" class="label">CAN</text>

  <rect x="480" y="320" width="180" height="60" class="box"/>
  <text x="505" y="355" class="label">RS-485 / RS-232</text>

  <!-- Row 5 -->
  <rect x="60" y="440" width="200" height="60" class="box"/>
  <text x="95" y="475" class="label">Error Handling</text>

  <rect x="300" y="440" width="200" height="60" class="box"/>
  <text x="330" y="475" class="label">Thermal Runaway</text>

  <rect x="540" y="440" width="200" height="60" class="box"/>
  <text x="585" y="475" class="label">BMS During Drive</text>

  <rect x="780" y="440" width="200" height="60" class="box"/>
  <text x="825" y="475" class="label">BMS Validation</text>

  <!-- Arrows -->
  <line x1="260" y1="110" x2="300" y2="110" class="arrow"/>
  <line x1="440" y1="110" x2="480" y2="110" class="arrow"/>
  <line x1="620" y1="110" x2="660" y2="110" class="arrow"/>
  <line x1="800" y1="110" x2="840" y2="110" class="arrow"/>

  <line x1="160" y1="140" x2="160" y2="200" class="arrow"/>
  <line x1="370" y1="140" x2="370" y2="200" class="arrow"/>
  <line x1="550" y1="140" x2="550" y2="200" class="arrow"/>
  <line x1="730" y1="140" x2="730" y2="200" class="arrow"/>
  <line x1="940" y1="140" x2="940" y2="200" class="arrow"/>

  <line x1="160" y1="260" x2="160" y2="320" class="arrow"/>
  <line x1="370" y1="260" x2="370" y2="320" class="arrow"/>
  <line x1="550" y1="260" x2="550" y2="320" class="arrow"/>

  <line x1="160" y1="380" x2="160" y2="440" class="arrow"/>
  <line x1="370" y1="380" x2="370" y2="440" class="arrow"/>
  <line x1="550" y1="380" x2="550" y2="440" class="arrow"/>
  <line x1="830" y1="260" x2="830" y2="440" class="arrow"/>
</svg>
