<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .col { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 16px sans-serif; fill: #111; }
    .item { font: 14px sans-serif; fill: #333; }
  </style>

  <text x="40" y="40" class="title">What You Need to Know (Checklist)</text>

  <rect x="60" y="90" width="340" height="520" class="col"/>
  <rect x="430" y="90" width="340" height="520" class="col"/>
  <rect x="800" y="90" width="340" height="520" class="col"/>

  <text x="80" y="125" class="label">Students</text>
  <text x="80" y="160" class="item">☐ Ohm's law</text>
  <text x="80" y="190" class="item">☐ RC circuits</text>
  <text x="80" y="220" class="item">☐ Voltage divider</text>
  <text x="80" y="250" class="item">☐ Basic coding</text>

  <text x="450" y="125" class="label">Enthusiasts</text>
  <text x="450" y="160" class="item">☐ None required</text>
  <text x="450" y="190" class="item">☐ Start with Cell</text>
  <text x="450" y="220" class="item">☐ Skip math-heavy parts</text>

  <text x="820" y="125" class="label">Engineers</text>
  <text x="820" y="160" class="item">☐ ECM primer recommended</text>
  <text x="820" y="190" class="item">☐ Familiar with CAN</text>
  <text x="820" y="220" class="item">☐ Comfortable with state-space</text>
</svg>
