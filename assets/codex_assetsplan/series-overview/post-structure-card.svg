<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .card { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 18px sans-serif; fill: #111; }
    .item { font: 14px sans-serif; fill: #333; }
  </style>

  <text x="40" y="40" class="title">Standard Post Structure</text>

  <rect x="80" y="90" width="1040" height="520" class="card"/>

  <text x="120" y="140" class="label">1. Goal</text>
  <text x="120" y="190" class="label">2. Audience Angles</text>
  <text x="120" y="240" class="label">3. Subtopic Flow</text>
  <text x="120" y="290" class="label">4. Experiment Ideas</text>
  <text x="120" y="340" class="label">5. Literature Review</text>

  <text x="520" y="140" class="item">One-sentence outcome of the post</text>
  <text x="520" y="190" class="item">Engineer vs student vs enthusiast framing</text>
  <text x="520" y="240" class="item">Numbered flow from intuition to depth</text>
  <text x="520" y="290" class="item">2–3 hands-on experiments</text>
  <text x="520" y="340" class="item">Textbooks, papers, online, standards</text>
</svg>
