<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .layer { stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
    .callout { stroke: #333; stroke-width: 2; }
  </style>
  <text x="40" y="40" class="title">SOH Degradation Mechanisms (Cross-Section)</text>
  <rect x="180" y="140" width="840" height="80" fill="#f2d0a7" class="layer"/>
  <rect x="180" y="220" width="840" height="30" fill="#e9e9e9" class="layer"/>
  <rect x="180" y="250" width="840" height="80" fill="#cde6f7" class="layer"/>
  <rect x="180" y="330" width="840" height="30" fill="#e9e9e9" class="layer"/>
  <rect x="180" y="360" width="840" height="80" fill="#f8c9d4" class="layer"/>

  <text x="200" y="190" class="label">Anode</text>
  <text x="200" y="300" class="label">Electrolyte</text>
  <text x="200" y="410" class="label">Cathode</text>

  <line x1="920" y1="170" x2="1090" y2="120" class="callout"/>
  <text x="1100" y="120" class="label">SEI growth</text>

  <line x1="920" y1="190" x2="1090" y2="170" class="callout"/>
  <text x="1100" y="170" class="label">Lithium plating</text>

  <line x1="920" y1="270" x2="1090" y2="240" class="callout"/>
  <text x="1100" y="240" class="label">Electrolyte breakdown</text>

  <line x1="920" y1="400" x2="1090" y2="360" class="callout"/>
  <text x="1100" y="360" class="label">Particle cracking</text>

  <line x1="920" y1="420" x2="1090" y2="410" class="callout"/>
  <text x="1100" y="410" class="label">Metal dissolution</text>
</svg>
