<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .wire{stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Parallel Pack Connection (Post-PDU)</text>
  <rect x="120" y="180" width="200" height="120" class="box"/>
  <text x="160" y="245" class="label">Pack A</text>
  <rect x="120" y="380" width="200" height="120" class="box"/>
  <text x="160" y="445" class="label">Pack B</text>
  <rect x="820" y="280" width="240" height="120" class="box"/>
  <text x="860" y="345" class="label">HV Bus</text>
  <line x1="320" y1="240" x2="820" y2="340" class="wire"/>
  <line x1="320" y1="440" x2="820" y2="340" class="wire"/>
</svg>
