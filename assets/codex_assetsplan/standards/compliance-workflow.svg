<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">Standards Compliance Workflow</text>
  <rect x="120" y="200" width="200" height="80" class="box"/>
  <text x="150" y="245" class="label">Design</text>
  <rect x="420" y="200" width="200" height="80" class="box"/>
  <text x="450" y="245" class="label">Test</text>
  <rect x="720" y="200" width="200" height="80" class="box"/>
  <text x="750" y="245" class="label">Report</text>
  <rect x="1020" y="200" width="140" height="80" class="box"/>
  <text x="1035" y="245" class="label">Approval</text>
  <line x1="320" y1="240" x2="420" y2="240" class="arrow"/>
  <line x1="620" y1="240" x2="720" y2="240" class="arrow"/>
  <line x1="920" y1="240" x2="1020" y2="240" class="arrow"/>
</svg>
