<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">MiL → SiL → HiL</text>
  <rect x="120" y="200" width="260" height="120" class="box"/>
  <text x="160" y="265" class="label">MiL (Model)</text>
  <rect x="460" y="200" width="260" height="120" class="box"/>
  <text x="500" y="265" class="label">SiL (Software)</text>
  <rect x="800" y="200" width="260" height="120" class="box"/>
  <text x="840" y="265" class="label">HiL (Hardware)</text>
</svg>
