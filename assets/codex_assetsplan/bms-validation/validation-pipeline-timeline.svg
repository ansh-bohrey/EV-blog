  <text x="110" y="190" class="label">Cell char</text>
  <rect x="280" y="150" width="140" height="80" class="node"/>
  <text x="300" y="190" class="label">MiL</text>
  <rect x="460" y="150" width="140" height="80" class="node"/>
  <text x="480" y="190" class="label">SiL</text>
  <rect x="640" y="150" width="140" height="80" class="node"/>
  <text x="660" y="190" class="label">HiL</text>
  <rect x="820" y="150" width="140" height="80" class="node"/>
  <text x="835" y="190" class="label">Pack</text>
  <rect x="1000" y="150" width="140" height="80" class="node"/>
  <text x="1020" y="190" class="label">Vehicle</text>
</svg>
