<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">Charger ↔ BMS Communication</text>
  <rect x="120" y="200" width="240" height="120" class="box"/>
  <text x="170" y="260" class="label">BMS</text>

  <rect x="840" y="200" width="240" height="120" class="box"/>
  <text x="890" y="260" class="label">Charger</text>

  <line x1="360" y1="230" x2="840" y2="230" class="arrow"/>
  <text x="480" y="215" class="label">Request V/I</text>

  <line x1="840" y1="290" x2="360" y2="290" class="arrow"/>
  <text x="520" y="310" class="label">Status & Ack</text>
</svg>
