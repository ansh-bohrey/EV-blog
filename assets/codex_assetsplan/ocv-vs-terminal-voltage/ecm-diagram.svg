  <line x1="440" y1="300" x2="440" y2="360" class="wire"/>
  <line x1="340" y1="360" x2="440" y2="360" class="wire"/>
  <line x1="385" y1="340" x2="385" y2="380" class="component"/>
  <line x1="395" y1="340" x2="395" y2="380" class="component"/>
