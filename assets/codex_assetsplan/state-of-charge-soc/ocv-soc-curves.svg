<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .axis { stroke: #222; stroke-width: 2; }
    .grid { stroke: #e6e6e6; stroke-width: 1; }
    .nmc { stroke: #1f77b4; stroke-width: 3; fill: none; }
    .lfp { stroke: #d62728; stroke-width: 3; fill: none; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>

  <text x="40" y="40" class="title">OCV vs SOC: NMC vs LFP (Concept)</text>

  <line x1="100" y1="100" x2="100" y2="600" class="axis"/>
  <line x1="100" y1="600" x2="1100" y2="600" class="axis"/>

  <line x1="100" y1="500" x2="1100" y2="500" class="grid"/>
  <line x1="100" y1="400" x2="1100" y2="400" class="grid"/>
  <line x1="100" y1="300" x2="1100" y2="300" class="grid"/>
  <line x1="100" y1="200" x2="1100" y2="200" class="grid"/>

  <path d="M100 520 C300 450, 500 380, 700 300 C900 230, 1000 200, 1100 180" class="nmc"/>
  <path d="M100 450 C300 440, 500 435, 700 430 C900 420, 1000 410, 1100 380" class="lfp"/>

  <text x="920" y="250" class="label">NMC</text>
  <text x="920" y="430" class="label">LFP (flat)</text>

  <text x="1040" y="635" class="label">SOC →</text>
  <text x="30" y="120" class="label">OCV ↑</text>
</svg>
