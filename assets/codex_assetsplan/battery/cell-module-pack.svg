<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 18px sans-serif; fill: #111; }
    .arrow { stroke: #333; stroke-width: 3; fill: none; }
  </style>

  <text x="40" y="40" class="title">Hierarchy: Cell → Module → Pack</text>

  <rect x="100" y="140" width="200" height="120" class="box"/>
  <text x="160" y="210" class="label">Cell</text>

  <rect x="450" y="140" width="240" height="120" class="box"/>
  <text x="520" y="210" class="label">Module</text>

  <rect x="820" y="120" width="280" height="160" class="box"/>
  <text x="920" y="210" class="label">Pack</text>

  <line x1="300" y1="200" x2="450" y2="200" class="arrow"/>
  <polygon points="450,200 430,190 430,210" fill="#333" />

  <line x1="690" y1="200" x2="820" y2="200" class="arrow"/>
  <polygon points="820,200 800,190 800,210" fill="#333" />

  <text x="100" y="320" class="label">Cells in series/parallel</text>
  <text x="450" y="320" class="label">Mechanical + electrical unit</text>
  <text x="820" y="320" class="label">Full HV system</text>
</svg>
