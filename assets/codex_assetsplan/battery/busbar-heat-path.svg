<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .bar { fill: #f2c14e; stroke: #333; stroke-width: 2; }
    .cell { fill: #e6f2ff; stroke: #333; stroke-width: 2; }
    .arrow { stroke: #d62728; stroke-width: 3; fill: none; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>

  <text x="40" y="40" class="title">Busbar Heat Path (Simplified)</text>

  <rect x="200" y="180" width="120" height="180" class="cell"/>
  <rect x="880" y="180" width="120" height="180" class="cell"/>
  <rect x="320" y="240" width="560" height="60" class="bar"/>

  <text x="210" y="380" class="label">Cell +</text>
  <text x="900" y="380" class="label">Cell -</text>
  <text x="520" y="230" class="label">Busbar</text>

  <!-- Heat arrows -->
  <line x1="520" y1="310" x2="520" y2="380" class="arrow"/>
  <polygon points="520,380 510,360 530,360" fill="#d62728" />

  <line x1="600" y1="310" x2="650" y2="380" class="arrow"/>
  <polygon points="650,380 640,360 660,360" fill="#d62728" />

  <text x="520" y="420" class="label">I²R heat</text>
</svg>
