<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .pack { fill: #f2f2f2; stroke: #333; stroke-width: 2; }
    .label { font: 16px sans-serif; fill: #111; }
    .callout { stroke: #333; stroke-width: 2; fill: none; }
  </style>

  <text x="40" y="40" class="title">Pack Components (Exploded Callouts)</text>

  <rect x="420" y="180" width="360" height="260" class="pack" />
  <text x="540" y="320" class="label">Battery Pack</text>

  <!-- Callouts -->
  <line x1="420" y1="220" x2="220" y2="140" class="callout" />
  <text x="80" y="140" class="label">Contactors</text>

  <line x1="420" y1="260" x2="220" y2="260" class="callout" />
  <text x="80" y="260" class="label">Pre-charge Resistor</text>

  <line x1="420" y1="320" x2="200" y2="400" class="callout" />
  <text x="80" y="410" class="label">BMS ECU</text>

  <line x1="780" y1="220" x2="980" y2="140" class="callout" />
  <text x="990" y="140" class="label">IMD</text>

  <line x1="780" y1="280" x2="980" y2="280" class="callout" />
  <text x="990" y="280" class="label">MSD</text>

  <line x1="780" y1="340" x2="980" y2="420" class="callout" />
  <text x="990" y="430" class="label">Cooling Plate</text>
</svg>
