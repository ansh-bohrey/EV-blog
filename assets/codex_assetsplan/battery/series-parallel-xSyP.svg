<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .label { font: 16px sans-serif; fill: #111; }
    .cell { stroke: #333; stroke-width: 2; fill: #f2f2f2; }
    .wire { stroke: #222; stroke-width: 2; }
  </style>

  <text x="40" y="40" class="title">Series vs Parallel vs xSyP</text>

  <!-- Series -->
  <text x="80" y="90" class="label">Series (4S)</text>
  <rect x="80" y="120" width="60" height="100" class="cell"/>
  <rect x="160" y="120" width="60" height="100" class="cell"/>
  <rect x="240" y="120" width="60" height="100" class="cell"/>
  <rect x="320" y="120" width="60" height="100" class="cell"/>
  <line x1="140" y1="170" x2="160" y2="170" class="wire"/>
  <line x1="220" y1="170" x2="240" y2="170" class="wire"/>
  <line x1="300" y1="170" x2="320" y2="170" class="wire"/>

  <!-- Parallel -->
  <text x="80" y="300" class="label">Parallel (4P)</text>
  <rect x="80" y="330" width="60" height="100" class="cell"/>
  <rect x="160" y="330" width="60" height="100" class="cell"/>
  <rect x="240" y="330" width="60" height="100" class="cell"/>
  <rect x="320" y="330" width="60" height="100" class="cell"/>
  <line x1="80" y1="320" x2="380" y2="320" class="wire"/>
  <line x1="80" y1="450" x2="380" y2="450" class="wire"/>

  <!-- xSyP -->
  <text x="600" y="90" class="label">xSyP Example (3S2P)</text>
  <rect x="600" y="120" width="50" height="80" class="cell"/>
  <rect x="660" y="120" width="50" height="80" class="cell"/>
  <rect x="740" y="120" width="50" height="80" class="cell"/>
  <rect x="800" y="120" width="50" height="80" class="cell"/>
  <rect x="880" y="120" width="50" height="80" class="cell"/>
  <rect x="940" y="120" width="50" height="80" class="cell"/>

  <line x1="600" y1="110" x2="710" y2="110" class="wire"/>
  <line x1="740" y1="110" x2="850" y2="110" class="wire"/>
  <line x1="880" y1="110" x2="990" y2="110" class="wire"/>

  <line x1="600" y1="210" x2="710" y2="210" class="wire"/>
  <line x1="740" y1="210" x2="850" y2="210" class="wire"/>
  <line x1="880" y1="210" x2="990" y2="210" class="wire"/>

  <line x1="710" y1="160" x2="740" y2="160" class="wire"/>
  <line x1="850" y1="160" x2="880" y2="160" class="wire"/>
</svg>
