<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .line{stroke:#333;stroke-width:3;}
    .node{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">30-Minute Drive Timeline (BMS Actions)</text>
  <line x1="100" y1="200" x2="1100" y2="200" class="line"/>
  <rect x="100" y="150" width="160" height="80" class="node"/>
  <text x="120" y="190" class="label">Key On</text>
  <rect x="300" y="150" width="160" height="80" class="node"/>
  <text x="320" y="190" class="label">Accel</text>
  <rect x="500" y="150" width="160" height="80" class="node"/>
  <text x="520" y="190" class="label">Cruise</text>
  <rect x="700" y="150" width="160" height="80" class="node"/>
  <text x="720" y="190" class="label">Regen</text>
  <rect x="900" y="150" width="160" height="80" class="node"/>
  <text x="920" y="190" class="label">Park</text>
</svg>
