<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .axis{stroke:#222;stroke-width:2;}
    .grid{stroke:#e6e6e6;stroke-width:1;}
    .soc{stroke:#1f77b4;stroke-width:3;fill:none;}
    .current{stroke:#d62728;stroke-width:3;fill:none;}
    .temp{stroke:#2ca02c;stroke-width:3;fill:none;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">SOC / Current / Temperature vs Time</text>
  <line x1="100" y1="100" x2="100" y2="600" class="axis"/>
  <line x1="100" y1="600" x2="1100" y2="600" class="axis"/>
  <line x1="100" y1="500" x2="1100" y2="500" class="grid"/>
  <line x1="100" y1="400" x2="1100" y2="400" class="grid"/>
  <line x1="100" y1="300" x2="1100" y2="300" class="grid"/>
  <path d="M100 200 C300 230, 500 260, 700 300 C900 340, 1050 360, 1100 380" class="soc"/>
  <path d="M100 520 C300 360, 500 400, 700 300 C900 360, 1050 420, 1100 520" class="current"/>
  <path d="M100 480 C300 450, 500 420, 700 380 C900 340, 1050 320, 1100 300" class="temp"/>
  <text x="900" y="220" class="label">SOC</text>
  <text x="900" y="520" class="label">Current</text>
  <text x="900" y="320" class="label">Temp</text>
</svg>
