<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">Decision Flow: BMS → VCU → MCU</text>
  <rect x="120" y="220" width="200" height="100" class="box"/>
  <text x="150" y="275" class="label">BMS</text>
  <rect x="500" y="220" width="200" height="100" class="box"/>
  <text x="530" y="275" class="label">VCU</text>
  <rect x="880" y="220" width="200" height="100" class="box"/>
  <text x="910" y="275" class="label">MCU</text>
  <line x1="320" y1="270" x2="500" y2="270" class="arrow"/>
  <line x1="700" y1="270" x2="880" y2="270" class="arrow"/>
  <text x="330" y="250" class="label">Limits</text>
  <text x="710" y="250" class="label">Torque req</text>
</svg>
