<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .label { font: 16px sans-serif; fill: #111; }
    .small { font: 13px sans-serif; fill: #333; }
    .layer { stroke: #333; stroke-width: 2; }
  </style>

  <text x="40" y="40" class="title">Li-ion Cell Cross-Section (Simplified)</text>

  <rect x="120" y="120" width="900" height="80" fill="#f2d0a7" class="layer"/>
  <rect x="120" y="200" width="900" height="30" fill="#e9e9e9" class="layer"/>
  <rect x="120" y="230" width="900" height="80" fill="#cde6f7" class="layer"/>
  <rect x="120" y="310" width="900" height="30" fill="#e9e9e9" class="layer"/>
  <rect x="120" y="340" width="900" height="80" fill="#f8c9d4" class="layer"/>

  <text x="140" y="170" class="label">Anode (Graphite)</text>
  <text x="140" y="222" class="small">Separator (porous)</text>
  <text x="140" y="280" class="label">Electrolyte (Li-ion transport)</text>
  <text x="140" y="332" class="small">Separator (porous)</text>
  <text x="140" y="390" class="label">Cathode (NMC / LFP)</text>

  <line x1="1050" y1="160" x2="1100" y2="160" stroke="#333" stroke-width="2" />
  <text x="1110" y="165" class="small">Current Collector (Cu)</text>
  <line x1="1050" y1="380" x2="1100" y2="380" stroke="#333" stroke-width="2" />
  <text x="1110" y="385" class="small">Current Collector (Al)</text>

  <text x="40" y="520" class="label">Charge / Discharge Concept</text>
  <line x1="120" y1="560" x2="520" y2="560" stroke="#333" stroke-width="2" />
  <polygon points="520,560 500,550 500,570" fill="#333" />
  <text x="140" y="540" class="small">Li+ flow (electrolyte)</text>
  <line x1="120" y1="600" x2="520" y2="600" stroke="#333" stroke-width="2" />
  <polygon points="120,600 140,590 140,610" fill="#333" />
  <text x="140" y="620" class="small">e- flow (external circuit)</text>
</svg>
