<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Li-ion Shuttle Animation</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; }
    .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
    svg { width: 100%; height: 600px; background: #fff; border: 1px solid #ddd; }
    .layer { stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
    .ion { fill: #1f77b4; }
    .electron { fill: #333; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Li-ion Shuttle (Charge/Discharge)</h2>
    <svg viewBox="0 0 1200 600">
      <rect x="150" y="150" width="900" height="60" fill="#f2d0a7" class="layer" />
      <rect x="150" y="210" width="900" height="20" fill="#e9e9e9" class="layer" />
      <rect x="150" y="230" width="900" height="60" fill="#cde6f7" class="layer" />
      <rect x="150" y="290" width="900" height="20" fill="#e9e9e9" class="layer" />
      <rect x="150" y="310" width="900" height="60" fill="#f8c9d4" class="layer" />

      <text x="170" y="190" class="label">Anode</text>
      <text x="170" y="265" class="label">Electrolyte</text>
      <text x="170" y="350" class="label">Cathode</text>

      <!-- ions moving through electrolyte -->
      <circle class="ion" cx="300" cy="260" r="8">
        <animate attributeName="cx" values="300; 900; 300" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle class="ion" cx="500" cy="260" r="8">
        <animate attributeName="cx" values="500; 1000; 500" dur="3s" repeatCount="indefinite" />
      </circle>

      <!-- electrons moving in external circuit -->
      <circle class="electron" cx="250" cy="450" r="6">
        <animate attributeName="cx" values="250; 950; 250" dur="3s" repeatCount="indefinite" />
      </circle>
      <line x1="200" y1="450" x2="1000" y2="450" stroke="#333" stroke-width="2" />
      <text x="200" y="480" class="label">External circuit (e- flow)</text>
    </svg>
  </div>
</body>
</html>
