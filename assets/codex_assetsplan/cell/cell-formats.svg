<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .label { font: 16px sans-serif; fill: #111; }
    .shape { stroke: #333; stroke-width: 2; fill: #f2f2f2; }
  </style>

  <text x="40" y="40" class="title">Cell Formats Comparison</text>

  <!-- Cylindrical -->
  <rect x="120" y="140" width="140" height="300" rx="70" ry="70" class="shape"/>
  <text x="120" y="480" class="label">Cylindrical</text>
  <text x="120" y="505" class="label">18650 / 21700 / 4680</text>

  <!-- Prismatic -->
  <rect x="400" y="160" width="200" height="260" class="shape"/>
  <text x="400" y="480" class="label">Prismatic</text>

  <!-- Pouch -->
  <rect x="700" y="170" width="220" height="240" class="shape"/>
  <line x1="700" y1="170" x2="680" y2="150" stroke="#333" stroke-width="2" />
  <text x="700" y="480" class="label">Pouch</text>

  <!-- Blade -->
  <rect x="980" y="210" width="160" height="160" class="shape"/>
  <rect x="980" y="210" width="260" height="60" class="shape"/>
  <text x="980" y="480" class="label">Blade (CTP)</text>
</svg>
