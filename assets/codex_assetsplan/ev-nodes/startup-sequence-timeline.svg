<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .line{stroke:#333;stroke-width:3;}
    .node{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Node Startup Sequence</text>
  <line x1="100" y1="200" x2="1100" y2="200" class="line"/>
  <rect x="100" y="150" width="140" height="80" class="node"/>
  <text x="110" y="190" class="label">12V Wake</text>
  <rect x="280" y="150" width="140" height="80" class="node"/>
  <text x="300" y="190" class="label">BMS Boot</text>
  <rect x="460" y="150" width="140" height="80" class="node"/>
  <text x="470" y="190" class="label">Pre-charge</text>
  <rect x="640" y="150" width="140" height="80" class="node"/>
  <text x="670" y="190" class="label">HV Ready</text>
  <rect x="820" y="150" width="140" height="80" class="node"/>
  <text x="850" y="190" class="label">Drive Ready</text>
</svg>
