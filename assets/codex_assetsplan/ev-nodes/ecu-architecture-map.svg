<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">EV ECU Architecture Map</text>
  <rect x="120" y="140" width="200" height="80" class="box"/>
  <text x="150" y="185" class="label">VCU</text>
  <rect x="360" y="140" width="200" height="80" class="box"/>
  <text x="390" y="185" class="label">BMS</text>
  <rect x="600" y="140" width="200" height="80" class="box"/>
  <text x="630" y="185" class="label">MCU</text>
  <rect x="840" y="140" width="200" height="80" class="box"/>
  <text x="870" y="185" class="label">OBC</text>

  <rect x="120" y="280" width="200" height="80" class="box"/>
  <text x="150" y="325" class="label">DCDC</text>
  <rect x="360" y="280" width="200" height="80" class="box"/>
  <text x="390" y="325" class="label">TMC</text>
  <rect x="600" y="280" width="200" height="80" class="box"/>
  <text x="640" y="325" class="label">Gateway</text>
  <rect x="840" y="280" width="200" height="80" class="box"/>
  <text x="860" y="325" class="label">Cluster</text>
</svg>
