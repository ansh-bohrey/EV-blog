<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">BMS Communication Layers</text>
  <rect x="120" y="140" width="200" height="80" class="box"/>
  <text x="140" y="185" class="label">Cells/AFE</text>
  <rect x="420" y="140" width="200" height="80" class="box"/>
  <text x="450" y="185" class="label">BMS MCU</text>
  <rect x="720" y="120" width="200" height="80" class="box"/>
  <text x="750" y="165" class="label">CAN Bus</text>
  <rect x="720" y="240" width="200" height="80" class="box"/>
  <text x="750" y="285" class="label">UDS/Diag</text>
  <rect x="980" y="140" width="200" height="80" class="box"/>
  <text x="1010" y="185" class="label">Charger</text>
  <line x1="320" y1="180" x2="420" y2="180" class="arrow"/>
  <line x1="620" y1="180" x2="720" y2="160" class="arrow"/>
  <line x1="920" y1="160" x2="980" y2="180" class="arrow"/>
</svg>
