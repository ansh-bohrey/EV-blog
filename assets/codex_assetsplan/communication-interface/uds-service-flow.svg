<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">UDS Service Flow (Read Data)</text>
  <rect x="120" y="220" width="240" height="120" class="box"/>
  <text x="150" y="285" class="label">Tester</text>
  <rect x="840" y="220" width="240" height="120" class="box"/>
  <text x="875" y="285" class="label">BMS ECU</text>
  <line x1="360" y1="250" x2="840" y2="250" class="arrow"/>
  <text x="500" y="235" class="label">0x22 (Read Data)</text>
  <line x1="840" y1="310" x2="360" y2="310" class="arrow"/>
  <text x="520" y="330" class="label">0x62 (Response)</text>
</svg>
