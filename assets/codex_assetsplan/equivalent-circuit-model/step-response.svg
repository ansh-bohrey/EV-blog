<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .label { font: 16px sans-serif; fill: #111; }
    .axis { stroke: #222; stroke-width: 2; }
    .grid { stroke: #e6e6e6; stroke-width: 1; }
    .curve1 { stroke: #1f77b4; stroke-width: 3; fill: none; }
    .curve2 { stroke: #d62728; stroke-width: 3; fill: none; }
    .legend { font: 14px sans-serif; fill: #333; }
  </style>

  <text x="40" y="40" class="title">Current Step Response: Terminal Voltage vs Time</text>

  <!-- Grid -->
  <g>
    <line x1="100" y1="100" x2="100" y2="600" class="axis"/>
    <line x1="100" y1="600" x2="1100" y2="600" class="axis"/>
    <line x1="100" y1="500" x2="1100" y2="500" class="grid"/>
    <line x1="100" y1="400" x2="1100" y2="400" class="grid"/>
    <line x1="100" y1="300" x2="1100" y2="300" class="grid"/>
    <line x1="100" y1="200" x2="1100" y2="200" class="grid"/>
    <line x1="300" y1="100" x2="300" y2="600" class="grid"/>
    <line x1="500" y1="100" x2="500" y2="600" class="grid"/>
    <line x1="700" y1="100" x2="700" y2="600" class="grid"/>
    <line x1="900" y1="100" x2="900" y2="600" class="grid"/>
  </g>

  <!-- Axes labels -->
  <text x="30" y="120" class="label">V</text>
  <text x="1080" y="635" class="label">t</text>

  <!-- Current step (red) -->
  <path d="M100 520 L280 520 L280 360 L900 360 L900 520 L1100 520" class="curve2"/>
  <text x="930" y="350" class="legend">Current (step)</text>

  <!-- Voltage response (blue) -->
  <path d="M100 260 L280 260 L280 320 C320 350, 380 380, 450 390 C520 400, 620 410, 740 410 C860 410, 980 410, 1100 410" class="curve1"/>
  <text x="930" y="420" class="legend">Terminal Voltage</text>

  <!-- Markers -->
  <line x1="280" y1="260" x2="280" y2="600" class="grid"/>
  <text x="250" y="630" class="legend">step</text>
</svg>
