<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Current Step Response Animation</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; }
    .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
    canvas { width: 100%; height: 600px; border: 1px solid #ddd; background: #fff; }
    .note { color: #444; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Current Step Response (Animated)</h2>
    <canvas id="c" width="1200" height="600"></canvas>
    <div class="note">Blue: Terminal voltage. Red: Current step.</div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;

    const pad = { l: 80, r: 40, t: 40, b: 60 };
    const x0 = pad.l, y0 = h - pad.b, x1 = w - pad.r, y1 = pad.t;

    function drawAxes() {
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x0, y1); ctx.lineTo(x0, y0); ctx.lineTo(x1, y0);
      ctx.stroke();

      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 1;
      for (let i = 1; i <= 4; i++) {
        const y = y0 - (i * (y0 - y1) / 5);
        ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
      }
      for (let i = 1; i <= 4; i++) {
        const x = x0 + (i * (x1 - x0) / 5);
        ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
      }
    }

    function mapX(t) {
      return x0 + t * (x1 - x0);
    }

    function mapY(v) {
      return y0 - v * (y0 - y1);
    }

    function currentStep(t) {
      return t < 0.2 ? 0.2 : 0.7; // normalized
    }

    function voltageResponse(t) {
      // simple response: instant drop + exponential decay
      const v0 = 0.75;
      const drop = 0.18;
      if (t < 0.2) return v0;
      const dt = t - 0.2;
      return v0 - drop - 0.08 * (1 - Math.exp(-dt * 6));
    }

    let t = 0;
    let lastTime = performance.now();
    function draw() {
      ctx.clearRect(0, 0, w, h);
      drawAxes();

      // current step (red)
      ctx.strokeStyle = '#d62728';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let i = 0; i <= 200; i++) {
        const tt = i / 200;
        const x = mapX(tt);
        const y = mapY(0.2 + 0.5 * currentStep(tt));
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // voltage response (blue)
      ctx.strokeStyle = '#1f77b4';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i <= Math.floor(t * 200); i++) {
        const tt = i / 200;
        const x = mapX(tt);
        const y = mapY(voltageResponse(tt));
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // labels
      ctx.fillStyle = '#333';
      ctx.font = '14px sans-serif';
      ctx.fillText('t', x1 - 10, y0 + 30);
      ctx.fillText('V', x0 - 20, y1 + 10);

      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      t += dt * 0.4;
      if (t > 1.0) t = 0;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
