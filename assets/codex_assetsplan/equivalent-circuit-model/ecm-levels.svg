<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .label { font: 16px sans-serif; fill: #111; }
    .small { font: 13px sans-serif; fill: #333; }
    .box { fill: #f8f8f8; stroke: #ddd; stroke-width: 2; }
    .wire { stroke: #222; stroke-width: 3; fill: none; }
    .component { stroke: #222; stroke-width: 3; fill: none; }
  </style>

  <text x="40" y="40" class="title">Equivalent Circuit Model Levels (0 → 3)</text>

  <!-- Panel boxes -->
  <rect x="40" y="70" width="520" height="280" class="box"/>
  <rect x="640" y="70" width="520" height="280" class="box"/>
  <rect x="40" y="380" width="520" height="280" class="box"/>
  <rect x="640" y="380" width="520" height="280" class="box"/>

  <!-- Level 0: OCV source only -->
  <text x="60" y="100" class="label">Level 0: Ideal OCV Source</text>
  <circle cx="120" cy="200" r="30" class="component"/>
  <text x="108" y="205" class="small">OCV</text>
  <line x1="150" y1="200" x2="260" y2="200" class="wire"/>
  <line x1="90" y1="200" x2="60" y2="200" class="wire"/>
  <line x1="60" y1="200" x2="60" y2="260" class="wire"/>
  <line x1="60" y1="260" x2="260" y2="260" class="wire"/>
  <line x1="260" y1="260" x2="260" y2="200" class="wire"/>

  <!-- Level 1: Add R0 -->
  <text x="660" y="100" class="label">Level 1: OCV + R0</text>
  <circle cx="720" cy="200" r="30" class="component"/>
  <text x="708" y="205" class="small">OCV</text>
  <line x1="750" y1="200" x2="820" y2="200" class="wire"/>
  <rect x="820" y="185" width="60" height="30" class="component"/>
  <text x="840" y="205" class="small">R0</text>
  <line x1="880" y1="200" x2="980" y2="200" class="wire"/>
  <line x1="690" y1="200" x2="660" y2="200" class="wire"/>
  <line x1="660" y1="200" x2="660" y2="260" class="wire"/>
  <line x1="660" y1="260" x2="980" y2="260" class="wire"/>
  <line x1="980" y1="260" x2="980" y2="200" class="wire"/>

  <!-- Level 2: Add RC pair -->
  <text x="60" y="410" class="label">Level 2: OCV + R0 + R1||C1</text>
  <circle cx="120" cy="510" r="30" class="component"/>
  <text x="108" y="515" class="small">OCV</text>
  <line x1="150" y1="510" x2="220" y2="510" class="wire"/>
  <rect x="220" y="495" width="60" height="30" class="component"/>
  <text x="240" y="515" class="small">R0</text>
  <line x1="280" y1="510" x2="320" y2="510" class="wire"/>
  <rect x="320" y="495" width="60" height="30" class="component"/>
  <text x="340" y="515" class="small">R1</text>
  <line x1="380" y1="510" x2="520" y2="510" class="wire"/>

  <!-- C1 in parallel with R1 (offset for clarity) -->
  <line x1="320" y1="510" x2="300" y2="510" class="wire"/>
  <line x1="380" y1="510" x2="400" y2="510" class="wire"/>
  <line x1="300" y1="510" x2="300" y2="560" class="wire"/>
  <line x1="400" y1="510" x2="400" y2="560" class="wire"/>
  <line x1="300" y1="560" x2="400" y2="560" class="wire"/>
  <line x1="345" y1="540" x2="345" y2="580" class="component"/>
  <line x1="355" y1="540" x2="355" y2="580" class="component"/>
  <text x="365" y="575" class="small">C1</text>
  <line x1="90" y1="510" x2="60" y2="510" class="wire"/>
  <line x1="60" y1="510" x2="60" y2="600" class="wire"/>
  <line x1="60" y1="600" x2="520" y2="600" class="wire"/>
  <line x1="520" y1="600" x2="520" y2="510" class="wire"/>

  <!-- Level 3: Add second RC pair -->
  <text x="660" y="410" class="label">Level 3: OCV + R0 + R1||C1 + R2||C2</text>
  <circle cx="720" cy="510" r="30" class="component"/>
  <text x="708" y="515" class="small">OCV</text>
  <line x1="750" y1="510" x2="820" y2="510" class="wire"/>
  <rect x="820" y="495" width="60" height="30" class="component"/>
  <text x="840" y="515" class="small">R0</text>
  <line x1="880" y1="510" x2="920" y2="510" class="wire"/>
  <rect x="920" y="495" width="60" height="30" class="component"/>
  <text x="940" y="515" class="small">R1</text>
  <line x1="980" y1="510" x2="1020" y2="510" class="wire"/>
  <rect x="1020" y="495" width="60" height="30" class="component"/>
  <text x="1040" y="515" class="small">R2</text>
  <line x1="1080" y1="510" x2="1160" y2="510" class="wire"/>

  <!-- C1 in parallel with R1 (offset for clarity) -->
  <line x1="920" y1="510" x2="900" y2="510" class="wire"/>
  <line x1="980" y1="510" x2="1000" y2="510" class="wire"/>
  <line x1="900" y1="510" x2="900" y2="560" class="wire"/>
  <line x1="1000" y1="510" x2="1000" y2="560" class="wire"/>
  <line x1="900" y1="560" x2="1000" y2="560" class="wire"/>
  <line x1="945" y1="540" x2="945" y2="580" class="component"/>
  <line x1="955" y1="540" x2="955" y2="580" class="component"/>
  <text x="965" y="575" class="small">C1</text>

  <!-- C2 in parallel with R2 (offset for clarity) -->
  <line x1="1020" y1="510" x2="1000" y2="510" class="wire"/>
  <line x1="1080" y1="510" x2="1100" y2="510" class="wire"/>
  <line x1="1000" y1="510" x2="1000" y2="560" class="wire"/>
  <line x1="1100" y1="510" x2="1100" y2="560" class="wire"/>
  <line x1="1000" y1="560" x2="1100" y2="560" class="wire"/>
  <line x1="1045" y1="540" x2="1045" y2="580" class="component"/>
  <line x1="1055" y1="540" x2="1055" y2="580" class="component"/>
  <text x="1065" y="575" class="small">C2</text>

  <line x1="690" y1="510" x2="660" y2="510" class="wire"/>
  <line x1="660" y1="510" x2="660" y2="600" class="wire"/>
  <line x1="660" y1="600" x2="1160" y2="600" class="wire"/>
  <line x1="1160" y1="600" x2="1160" y2="510" class="wire"/>
</svg>
