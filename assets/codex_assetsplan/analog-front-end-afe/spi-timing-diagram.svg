<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .line { stroke: #222; stroke-width: 3; fill: none; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>
  <text x="40" y="40" class="title">SPI Transaction (Simplified Timing)</text>

  <text x="40" y="140" class="label">CS</text>
  <path d="M120 120 L200 120 L200 160 L900 160 L900 120 L1040 120" class="line"/>

  <text x="40" y="260" class="label">SCLK</text>
  <path d="M120 240 L160 240 L160 280 L200 280 L200 240 L240 240 L240 280 L280 280 L280 240 L320 240 L320 280 L360 280 L360 240 L400 240" class="line"/>

  <text x="40" y="380" class="label">MOSI</text>
  <path d="M120 360 L260 360 L260 400 L420 400 L420 360 L580 360 L580 400 L740 400 L740 360 L900 360" class="line"/>

  <text x="40" y="500" class="label">MISO</text>
  <path d="M120 480 L280 480 L280 520 L440 520 L440 480 L600 480 L600 520 L760 520 L760 480 L900 480" class="line"/>

  <text x="120" y="610" class="label">Command → Data → CRC</text>
</svg>
