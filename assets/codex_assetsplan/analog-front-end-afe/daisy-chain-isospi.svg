<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
    .arrow { stroke: #333; stroke-width: 2.5; fill: none; }
  </style>
  <text x="40" y="40" class="title">AFE Daisy-Chain (isoSPI Concept)</text>

  <rect x="80" y="200" width="180" height="80" class="box"/>
  <text x="110" y="245" class="label">AFE #1</text>

  <rect x="340" y="200" width="180" height="80" class="box"/>
  <text x="370" y="245" class="label">AFE #2</text>

  <rect x="600" y="200" width="180" height="80" class="box"/>
  <text x="630" y="245" class="label">AFE #3</text>

  <rect x="860" y="200" width="180" height="80" class="box"/>
  <text x="890" y="245" class="label">AFE #4</text>

  <line x1="260" y1="240" x2="340" y2="240" class="arrow"/>
  <line x1="520" y1="240" x2="600" y2="240" class="arrow"/>
  <line x1="780" y1="240" x2="860" y2="240" class="arrow"/>

  <text x="80" y="330" class="label">isoSPI link passes data across isolation</text>
</svg>
