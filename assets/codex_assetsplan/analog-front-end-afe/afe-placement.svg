<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
    .arrow { stroke: #333; stroke-width: 2.5; fill: none; }
  </style>
  <text x="40" y="40" class="title">AFE Placement in Pack Architecture</text>

  <rect x="80" y="160" width="240" height="120" class="box"/>
  <text x="120" y="220" class="label">Cells</text>

  <rect x="380" y="140" width="240" height="160" class="box"/>
  <text x="430" y="210" class="label">AFE</text>
  <text x="410" y="230" class="label">(Cell monitor)</text>

  <rect x="700" y="160" width="240" height="120" class="box"/>
  <text x="740" y="220" class="label">BMS MCU</text>

  <line x1="320" y1="220" x2="380" y2="220" class="arrow"/>
  <line x1="620" y1="220" x2="700" y2="220" class="arrow"/>
</svg>
