<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
    .grid { stroke: #333; stroke-width: 1; }
  </style>
  <text x="40" y="40" class="title">AFE Register Map (Zoomed Example)</text>

  <rect x="80" y="100" width="1040" height="500" class="box"/>
  <line x1="80" y1="150" x2="1120" y2="150" class="grid" />
  <line x1="80" y1="220" x2="1120" y2="220" class="grid" />
  <line x1="80" y1="290" x2="1120" y2="290" class="grid" />
  <line x1="80" y1="360" x2="1120" y2="360" class="grid" />

  <line x1="300" y1="100" x2="300" y2="600" class="grid" />
  <line x1="650" y1="100" x2="650" y2="600" class="grid" />

  <text x="100" y="135" class="label">Address</text>
  <text x="320" y="135" class="label">Register</text>
  <text x="670" y="135" class="label">Description</text>

  <text x="100" y="200" class="label">0x00</text>
  <text x="320" y="200" class="label">CELL_1_V</text>
  <text x="670" y="200" class="label">Cell 1 voltage</text>

  <text x="100" y="270" class="label">0x01</text>
  <text x="320" y="270" class="label">CELL_2_V</text>
  <text x="670" y="270" class="label">Cell 2 voltage</text>

  <text x="100" y="340" class="label">0x10</text>
  <text x="320" y="340" class="label">FAULT_STAT</text>
  <text x="670" y="340" class="label">Fault flags</text>
</svg>
