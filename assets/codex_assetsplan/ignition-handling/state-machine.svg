<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .state{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .arrow{stroke:#333;stroke-width:2.5;fill:none;}
  </style>
  <text x="40" y="40" class="title">BMS Power State Machine</text>
  <rect x="80" y="140" width="180" height="80" class="state"/>
  <text x="120" y="190" class="label">Sleep</text>
  <rect x="320" y="140" width="180" height="80" class="state"/>
  <text x="350" y="190" class="label">Wake</text>
  <rect x="560" y="140" width="180" height="80" class="state"/>
  <text x="590" y="190" class="label">Pre-charge</text>
  <rect x="800" y="140" width="180" height="80" class="state"/>
  <text x="840" y="190" class="label">Run</text>
  <rect x="560" y="300" width="180" height="80" class="state"/>
  <text x="610" y="350" class="label">Charge</text>
  <rect x="800" y="300" width="180" height="80" class="state"/>
  <text x="860" y="350" class="label">Fault</text>

  <line x1="260" y1="180" x2="320" y2="180" class="arrow"/>
  <line x1="500" y1="180" x2="560" y2="180" class="arrow"/>
  <line x1="740" y1="180" x2="800" y2="180" class="arrow"/>
  <line x1="650" y1="220" x2="650" y2="300" class="arrow"/>
  <line x1="890" y1="220" x2="890" y2="300" class="arrow"/>
</svg>
