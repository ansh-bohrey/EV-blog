<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
    .arrow { stroke: #333; stroke-width: 2.5; fill: none; }
  </style>

  <text x="40" y="40" class="title">Thermal Resistance Chain</text>

  <rect x="80" y="200" width="160" height="80" class="box"/>
  <text x="110" y="245" class="label">Cell Core</text>

  <rect x="300" y="200" width="160" height="80" class="box"/>
  <text x="340" y="245" class="label">Cell Surface</text>

  <rect x="520" y="200" width="160" height="80" class="box"/>
  <text x="560" y="245" class="label">TIM</text>

  <rect x="740" y="200" width="160" height="80" class="box"/>
  <text x="770" y="245" class="label">Cooling Plate</text>

  <rect x="960" y="200" width="160" height="80" class="box"/>
  <text x="1010" y="245" class="label">Coolant</text>

  <line x1="240" y1="240" x2="300" y2="240" class="arrow"/>
  <line x1="460" y1="240" x2="520" y2="240" class="arrow"/>
  <line x1="680" y1="240" x2="740" y2="240" class="arrow"/>
  <line x1="900" y1="240" x2="960" y2="240" class="arrow"/>

  <text x="80" y="330" class="label">R_cell → R_TIM → R_plate → R_conv</text>
</svg>
