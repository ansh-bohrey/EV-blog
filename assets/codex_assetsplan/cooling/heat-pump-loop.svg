<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .arrow { stroke: #333; stroke-width: 2.5; fill: none; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>

  <text x="40" y="40" class="title">Heat Pump Loop (Simplified)</text>

  <rect x="120" y="160" width="200" height="80" class="box"/>
  <text x="145" y="205" class="label">Compressor</text>

  <rect x="380" y="160" width="200" height="80" class="box"/>
  <text x="405" y="205" class="label">Condenser</text>

  <rect x="640" y="160" width="200" height="80" class="box"/>
  <text x="665" y="205" class="label">Expansion</text>

  <rect x="900" y="160" width="200" height="80" class="box"/>
  <text x="925" y="205" class="label">Evaporator</text>

  <line x1="320" y1="200" x2="380" y2="200" class="arrow"/>
  <line x1="580" y1="200" x2="640" y2="200" class="arrow"/>
  <line x1="840" y1="200" x2="900" y2="200" class="arrow"/>
  <line x1="1000" y1="240" x2="220" y2="240" class="arrow"/>
</svg>
