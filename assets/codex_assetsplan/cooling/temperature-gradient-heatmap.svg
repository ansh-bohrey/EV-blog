<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .cell { stroke: #333; stroke-width: 1; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>

  <text x="40" y="40" class="title">Temperature Gradient Across Pack (Concept Heatmap)</text>

  <rect x="200" y="150" width="80" height="80" fill="#fee5d9" class="cell"/>
  <rect x="280" y="150" width="80" height="80" fill="#fcbba1" class="cell"/>
  <rect x="360" y="150" width="80" height="80" fill="#fc9272" class="cell"/>
  <rect x="440" y="150" width="80" height="80" fill="#fb6a4a" class="cell"/>
  <rect x="520" y="150" width="80" height="80" fill="#de2d26" class="cell"/>

  <rect x="200" y="230" width="80" height="80" fill="#fcbba1" class="cell"/>
  <rect x="280" y="230" width="80" height="80" fill="#fc9272" class="cell"/>
  <rect x="360" y="230" width="80" height="80" fill="#fb6a4a" class="cell"/>
  <rect x="440" y="230" width="80" height="80" fill="#ef3b2c" class="cell"/>
  <rect x="520" y="230" width="80" height="80" fill="#cb181d" class="cell"/>

  <rect x="200" y="310" width="80" height="80" fill="#fc9272" class="cell"/>
  <rect x="280" y="310" width="80" height="80" fill="#fb6a4a" class="cell"/>
  <rect x="360" y="310" width="80" height="80" fill="#ef3b2c" class="cell"/>
  <rect x="440" y="310" width="80" height="80" fill="#cb181d" class="cell"/>
  <rect x="520" y="310" width="80" height="80" fill="#99000d" class="cell"/>

  <text x="640" y="210" class="label">Cooler edge</text>
  <text x="640" y="360" class="label">Hotter core</text>
</svg>
