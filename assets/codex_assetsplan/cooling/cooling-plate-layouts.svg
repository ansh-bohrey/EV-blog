<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .plate { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .channel { stroke: #1f77b4; stroke-width: 4; fill: none; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>

  <text x="40" y="40" class="title">Cooling Plate Channel Layouts</text>

  <rect x="80" y="120" width="480" height="400" class="plate"/>
  <text x="100" y="150" class="label">Serpentine</text>
  <path d="M120 200 L520 200 L520 240 L120 240 L120 280 L520 280 L520 320 L120 320 L120 360 L520 360" class="channel"/>

  <rect x="640" y="120" width="480" height="400" class="plate"/>
  <text x="660" y="150" class="label">Parallel</text>
  <line x1="700" y1="200" x2="1060" y2="200" class="channel"/>
  <line x1="700" y1="250" x2="1060" y2="250" class="channel"/>
  <line x1="700" y1="300" x2="1060" y2="300" class="channel"/>
  <line x1="700" y1="350" x2="1060" y2="350" class="channel"/>
</svg>
