<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Coolant Flow Animation</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; }
    .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
    svg { width: 100%; height: 600px; background: #fff; border: 1px solid #ddd; }
    .plate { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .channel { stroke: #1f77b4; stroke-width: 5; fill: none; }
    .dot { fill: #1f77b4; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Coolant Flow (Serpentine Plate)</h2>
    <svg viewBox="0 0 1200 600">
      <rect x="200" y="120" width="800" height="360" class="plate" />
      <path id="path" d="M240 180 L960 180 L960 240 L240 240 L240 300 L960 300 L960 360 L240 360" class="channel" />

      <circle r="10" class="dot">
        <animateMotion dur="4s" repeatCount="indefinite">
          <mpath href="#path" />
        </animateMotion>
      </circle>
    </svg>
  </div>
</body>
</html>
