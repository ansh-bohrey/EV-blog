<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: 24px sans-serif; fill: #111; }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
    .label { font: 14px sans-serif; fill: #111; }
  </style>

  <text x="40" y="40" class="title">Cooling Architectures</text>

  <rect x="80" y="100" width="240" height="200" class="box"/>
  <text x="110" y="140" class="label">Passive</text>
  <text x="110" y="170" class="label">Natural convection</text>

  <rect x="360" y="100" width="240" height="200" class="box"/>
  <text x="390" y="140" class="label">Air Cooling</text>
  <text x="390" y="170" class="label">Fans / ducts</text>

  <rect x="640" y="100" width="240" height="200" class="box"/>
  <text x="670" y="140" class="label">Liquid Cooling</text>
  <text x="670" y="170" class="label">Cold plates</text>

  <rect x="920" y="100" width="240" height="200" class="box"/>
  <text x="950" y="140" class="label">Immersion</text>
  <text x="950" y="170" class="label">Dielectric fluid</text>
</svg>
