<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .cell{fill:#e6f2ff;stroke:#333;stroke-width:2;}
    .barrier{fill:#f2c14e;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Thermal Propagation Barriers</text>
  <rect x="200" y="240" width="80" height="200" class="cell"/>
  <rect x="300" y="240" width="20" height="200" class="barrier"/>
  <rect x="320" y="240" width="80" height="200" class="cell"/>
  <rect x="420" y="240" width="20" height="200" class="barrier"/>
  <rect x="440" y="240" width="80" height="200" class="cell"/>
  <text x="200" y="470" class="label">Barrier material slows heat spread</text>
</svg>
