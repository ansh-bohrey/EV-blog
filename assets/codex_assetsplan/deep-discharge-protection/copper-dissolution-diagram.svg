<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .layer{stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .callout{stroke:#333;stroke-width:2;}
  </style>
  <text x="40" y="40" class="title">Copper Dissolution & Dendrites (Concept)</text>
  <rect x="200" y="200" width="800" height="80" fill="#f2d0a7" class="layer"/>
  <rect x="200" y="280" width="800" height="30" fill="#e9e9e9" class="layer"/>
  <rect x="200" y="310" width="800" height="80" fill="#f8c9d4" class="layer"/>
  <line x1="600" y1="280" x2="620" y2="310" class="callout"/>
  <text x="630" y="310" class="label">Cu dendrite</text>
  <text x="220" y="240" class="label">Anode</text>
  <text x="220" y="360" class="label">Cathode</text>
</svg>
