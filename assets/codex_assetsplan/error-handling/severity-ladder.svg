<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .step{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Fault Severity Ladder</text>
  <rect x="200" y="500" width="300" height="80" class="step"/>
  <rect x="350" y="380" width="300" height="80" class="step"/>
  <rect x="500" y="260" width="300" height="80" class="step"/>
  <text x="230" y="545" class="label">Level 1: Warning</text>
  <text x="380" y="425" class="label">Level 2: Fault</text>
  <text x="530" y="305" class="label">Level 3: Shutdown</text>
</svg>
