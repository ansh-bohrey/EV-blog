<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .line{stroke:#333;stroke-width:2;}
  </style>
  <text x="40" y="40" class="title">BMS Fault Taxonomy</text>
  <rect x="500" y="80" width="200" height="60" class="box"/>
  <text x="540" y="115" class="label">Faults</text>

  <rect x="200" y="200" width="220" height="60" class="box"/>
  <text x="220" y="235" class="label">Cell-level</text>

  <rect x="500" y="200" width="220" height="60" class="box"/>
  <text x="520" y="235" class="label">System-level</text>

  <rect x="800" y="200" width="220" height="60" class="box"/>
  <text x="820" y="235" class="label">Safety-level</text>

  <line x1="600" y1="140" x2="310" y2="200" class="line"/>
  <line x1="600" y1="140" x2="610" y2="200" class="line"/>
  <line x1="600" y1="140" x2="910" y2="200" class="line"/>
</svg>
