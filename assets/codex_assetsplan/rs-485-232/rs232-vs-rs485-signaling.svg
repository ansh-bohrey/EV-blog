<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .line1{stroke:#1f77b4;stroke-width:3;fill:none;}
    .line2{stroke:#d62728;stroke-width:3;fill:none;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">RS-232 vs RS-485 Signaling</text>
  <path d="M100 250 L200 250 L200 200 L300 200 L300 250 L400 250" class="line1"/>
  <text x="450" y="230" class="label">RS-232 (single-ended)</text>
  <path d="M100 450 L200 450 L200 400 L300 400 L300 450 L400 450" class="line1"/>
  <path d="M100 450 L200 450 L200 500 L300 500 L300 450 L400 450" class="line2"/>
  <text x="450" y="430" class="label">RS-485 (differential)</text>
</svg>
