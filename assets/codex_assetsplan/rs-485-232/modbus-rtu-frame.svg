<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:12px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Modbus RTU Frame</text>
  <rect x="80" y="250" width="1040" height="100" class="box"/>
  <text x="100" y="300" class="label">Address</text>
  <text x="220" y="300" class="label">Function</text>
  <text x="360" y="300" class="label">Data</text>
  <text x="920" y="300" class="label">CRC</text>
</svg>
