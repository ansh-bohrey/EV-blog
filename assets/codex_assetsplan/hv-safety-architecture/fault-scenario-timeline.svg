<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .line{stroke:#333;stroke-width:3;}
    .node{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Fault Scenario Timeline (Isolation Loss)</text>
  <line x1="100" y1="200" x2="1100" y2="200" class="line"/>
  <rect x="100" y="150" width="180" height="80" class="node"/>
  <text x="120" y="190" class="label">Leak starts</text>
  <rect x="360" y="150" width="180" height="80" class="node"/>
  <text x="380" y="190" class="label">IMD warning</text>
  <rect x="620" y="150" width="180" height="80" class="node"/>
  <text x="640" y="190" class="label">Fault latch</text>
  <rect x="880" y="150" width="180" height="80" class="node"/>
  <text x="900" y="190" class="label">Contactors open</text>
</svg>
