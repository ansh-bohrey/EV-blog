<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .wire{stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .fault{stroke:#d62728;stroke-width:3;}
  </style>
  <text x="40" y="40" class="title">Isolation Monitoring Principle</text>
  <rect x="120" y="160" width="240" height="120" class="box"/>
  <text x="150" y="225" class="label">HV Bus</text>
  <rect x="800" y="160" width="240" height="120" class="box"/>
  <text x="840" y="225" class="label">Chassis</text>
  <rect x="440" y="140" width="240" height="160" class="box"/>
  <text x="470" y="210" class="label">IMD</text>
  <line x1="360" y1="220" x2="440" y2="220" class="wire"/>
  <line x1="680" y1="220" x2="800" y2="220" class="wire"/>
  <line x1="280" y1="280" x2="520" y2="420" class="fault"/>
  <text x="540" y="440" class="label">Leakage path</text>
</svg>
