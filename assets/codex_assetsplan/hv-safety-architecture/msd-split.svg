<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
    .wire{stroke:#333;stroke-width:2;}
  </style>
  <text x="40" y="40" class="title">Manual Service Disconnect (MSD) Split</text>
  <rect x="120" y="240" width="300" height="120" class="box"/>
  <text x="150" y="300" class="label">Pack Half A</text>
  <rect x="780" y="240" width="300" height="120" class="box"/>
  <text x="810" y="300" class="label">Pack Half B</text>
  <rect x="520" y="220" width="160" height="160" class="box"/>
  <text x="560" y="300" class="label">MSD</text>
  <line x1="420" y1="300" x2="520" y2="300" class="wire"/>
  <line x1="680" y1="300" x2="780" y2="300" class="wire"/>
</svg>
