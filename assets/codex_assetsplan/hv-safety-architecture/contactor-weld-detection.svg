<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title{font:24px sans-serif;fill:#111;}
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2;}
    .wire{stroke:#333;stroke-width:2;}
    .label{font:14px sans-serif;fill:#111;}
  </style>
  <text x="40" y="40" class="title">Contactor Weld Detection</text>
  <rect x="120" y="200" width="240" height="100" class="box"/>
  <text x="150" y="255" class="label">Pack Voltage</text>
  <rect x="520" y="200" width="240" height="100" class="box"/>
  <text x="540" y="255" class="label">Load Voltage</text>
  <line x1="360" y1="250" x2="520" y2="250" class="wire"/>
  <text x="820" y="250" class="label">If Vpack == Vload when open → weld fault</text>
</svg>
