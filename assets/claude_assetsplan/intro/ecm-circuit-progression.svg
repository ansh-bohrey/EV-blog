<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="sans-serif">
  <rect width="1200" height="400" fill="white"/>

  <!-- Title -->
  <text x="600" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Equivalent Circuit Model (ECM) — Progressive Build-Up</text>

  <!-- ===== WIRE / COMPONENT STYLE ===== -->
  <!-- stroke="#222" stroke-width="2" for wires -->
  <!-- Component fills: white with dark stroke -->

  <!-- ============================================================
       LEVEL 0 — Ideal Source  (x-center ~130)
       Column x: 20 to 240
       ============================================================ -->

  <!-- Top wire: left terminal to + of source -->
  <!-- Layout: top rail left→right, source in middle, bottom rail -->
  <!-- Top terminal (+) at x=80 y=100; bottom terminal (-) at x=80 y=220 -->
  <!-- Source circle center: x=130, y=160 -->

  <!-- Top rail: terminal + to top of source -->
  <line x1="60" y1="100" x2="110" y2="100" stroke="#222" stroke-width="2"/>
  <line x1="110" y1="100" x2="110" y2="135" stroke="#222" stroke-width="2"/>
  <!-- Voltage source circle -->
  <circle cx="130" cy="160" r="26" fill="white" stroke="#222" stroke-width="2"/>
  <!-- + label top -->
  <text x="130" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">+</text>
  <!-- OCV label -->
  <text x="130" y="164" text-anchor="middle" font-size="9" fill="#222">OCV</text>
  <!-- - label bottom -->
  <text x="130" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#e11d48">−</text>
  <!-- Line from top of source to node -->
  <line x1="130" y1="134" x2="130" y2="100" stroke="#222" stroke-width="2"/>
  <!-- Line from bottom of source to bottom rail -->
  <line x1="130" y1="186" x2="130" y2="220" stroke="#222" stroke-width="2"/>
  <!-- Top rail: source to right terminal -->
  <line x1="130" y1="100" x2="200" y2="100" stroke="#222" stroke-width="2"/>
  <!-- Right terminal top (+) -->
  <circle cx="200" cy="100" r="4" fill="#1d4ed8"/>
  <text x="212" y="104" font-size="10" fill="#1d4ed8">+</text>
  <!-- Bottom rail -->
  <line x1="60" y1="220" x2="200" y2="220" stroke="#222" stroke-width="2"/>
  <!-- Right terminal bottom (-) -->
  <circle cx="200" cy="220" r="4" fill="#e11d48"/>
  <text x="212" y="224" font-size="10" fill="#e11d48">−</text>
  <!-- Left terminal dot -->
  <circle cx="60" cy="100" r="3" fill="#555"/>
  <circle cx="60" cy="220" r="3" fill="#555"/>

  <!-- Label below -->
  <text x="130" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Level 0</text>
  <text x="130" y="272" text-anchor="middle" font-size="10" fill="#555">Ideal Source</text>

  <!-- ===== PROGRESS ARROW 0→1 ===== -->
  <defs>
    <marker id="arrProg" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#6b7280"/>
    </marker>
  </defs>
  <line x1="248" y1="160" x2="282" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arrProg)"/>

  <!-- ============================================================
       LEVEL 1 — +R0  (column 300–530)
       Source at x=360, R0 between x=420 and x=480
       ============================================================ -->

  <!-- Source, same layout, x-offset by 270 -->
  <line x1="300" y1="100" x2="340" y2="100" stroke="#222" stroke-width="2"/>
  <line x1="340" y1="100" x2="340" y2="135" stroke="#222" stroke-width="2"/>
  <circle cx="360" cy="160" r="26" fill="white" stroke="#222" stroke-width="2"/>
  <text x="360" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">+</text>
  <text x="360" y="164" text-anchor="middle" font-size="9" fill="#222">OCV</text>
  <text x="360" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#e11d48">−</text>
  <line x1="360" y1="134" x2="360" y2="100" stroke="#222" stroke-width="2"/>
  <line x1="360" y1="186" x2="360" y2="220" stroke="#222" stroke-width="2"/>

  <!-- Wire from source + to R0 start -->
  <line x1="360" y1="100" x2="420" y2="100" stroke="#222" stroke-width="2"/>

  <!-- R0 resistor box -->
  <rect x="420" y="88" width="50" height="24" rx="4" fill="white" stroke="#222" stroke-width="2"/>
  <text x="445" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">R₀</text>

  <!-- Wire from R0 to terminal -->
  <line x1="470" y1="100" x2="510" y2="100" stroke="#222" stroke-width="2"/>
  <circle cx="510" cy="100" r="4" fill="#1d4ed8"/>
  <text x="522" y="104" font-size="10" fill="#1d4ed8">+</text>

  <!-- Bottom rail -->
  <line x1="300" y1="220" x2="510" y2="220" stroke="#222" stroke-width="2"/>
  <circle cx="510" cy="220" r="4" fill="#e11d48"/>
  <text x="522" y="224" font-size="10" fill="#e11d48">−</text>
  <circle cx="300" cy="100" r="3" fill="#555"/>
  <circle cx="300" cy="220" r="3" fill="#555"/>

  <!-- Label -->
  <text x="405" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Level 1</text>
  <text x="405" y="272" text-anchor="middle" font-size="10" fill="#555">+R₀ (Ohmic)</text>

  <!-- Progress arrow 1→2 -->
  <line x1="546" y1="160" x2="580" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arrProg)"/>

  <!-- ============================================================
       LEVEL 2 — +RC Pair  (column 600–870)
       Source at x=640, R0 at 700-750, then RC parallel: x=770-840
       ============================================================ -->

  <!-- Source -->
  <line x1="600" y1="100" x2="620" y2="100" stroke="#222" stroke-width="2"/>
  <line x1="620" y1="100" x2="620" y2="135" stroke="#222" stroke-width="2"/>
  <circle cx="640" cy="160" r="26" fill="white" stroke="#222" stroke-width="2"/>
  <text x="640" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">+</text>
  <text x="640" y="164" text-anchor="middle" font-size="9" fill="#222">OCV</text>
  <text x="640" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#e11d48">−</text>
  <line x1="640" y1="134" x2="640" y2="100" stroke="#222" stroke-width="2"/>
  <line x1="640" y1="186" x2="640" y2="220" stroke="#222" stroke-width="2"/>

  <!-- Wire to R0 -->
  <line x1="640" y1="100" x2="690" y2="100" stroke="#222" stroke-width="2"/>
  <!-- R0 box -->
  <rect x="690" y="88" width="46" height="24" rx="4" fill="white" stroke="#222" stroke-width="2"/>
  <text x="713" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">R₀</text>
  <!-- Wire R0 to RC node left -->
  <line x1="736" y1="100" x2="760" y2="100" stroke="#222" stroke-width="2"/>

  <!-- RC parallel pair — left node at x=760, right node at x=840 -->
  <!-- Top branch: R1 -->
  <line x1="760" y1="100" x2="760" y2="130" stroke="#222" stroke-width="2"/>
  <line x1="760" y1="130" x2="790" y2="130" stroke="#222" stroke-width="2"/>
  <rect x="790" y="118" width="40" height="24" rx="4" fill="white" stroke="#c2410c" stroke-width="2"/>
  <text x="810" y="134" text-anchor="middle" font-size="9" font-weight="bold" fill="#c2410c">R₁</text>
  <line x1="830" y1="130" x2="840" y2="130" stroke="#222" stroke-width="2"/>
  <line x1="840" y1="100" x2="840" y2="130" stroke="#222" stroke-width="2"/>
  <!-- Bottom branch: C1 -->
  <line x1="760" y1="100" x2="760" y2="170" stroke="#222" stroke-width="2"/>
  <line x1="760" y1="170" x2="793" y2="170" stroke="#222" stroke-width="2"/>
  <!-- Capacitor plates -->
  <line x1="793" y1="158" x2="793" y2="182" stroke="#14b8a6" stroke-width="3"/>
  <line x1="807" y1="158" x2="807" y2="182" stroke="#14b8a6" stroke-width="3"/>
  <text x="800" y="194" text-anchor="middle" font-size="9" font-weight="bold" fill="#14b8a6">C₁</text>
  <line x1="807" y1="170" x2="840" y2="170" stroke="#222" stroke-width="2"/>
  <line x1="840" y1="100" x2="840" y2="170" stroke="#222" stroke-width="2"/>

  <!-- Left and right node dots -->
  <circle cx="760" cy="100" r="3" fill="#555"/>
  <circle cx="840" cy="100" r="3" fill="#555"/>

  <!-- Wire to terminal -->
  <line x1="840" y1="100" x2="870" y2="100" stroke="#222" stroke-width="2"/>
  <circle cx="870" cy="100" r="4" fill="#1d4ed8"/>
  <text x="882" y="104" font-size="10" fill="#1d4ed8">+</text>

  <!-- Bottom rail -->
  <line x1="600" y1="220" x2="870" y2="220" stroke="#222" stroke-width="2"/>
  <circle cx="870" cy="220" r="4" fill="#e11d48"/>
  <text x="882" y="224" font-size="10" fill="#e11d48">−</text>
  <circle cx="600" cy="100" r="3" fill="#555"/>
  <circle cx="600" cy="220" r="3" fill="#555"/>

  <!-- Label -->
  <text x="735" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Level 2</text>
  <text x="735" y="272" text-anchor="middle" font-size="10" fill="#555">+RC Pair</text>

  <!-- Progress arrow 2→3 -->
  <line x1="910" y1="160" x2="944" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arrProg)"/>

  <!-- ============================================================
       LEVEL 3 — 2RC Thevenin  (column 960–1180)
       Source at x=985, R0 at 1025-1065, RC1: 1070-1110, RC2: 1115-1155
       ============================================================ -->

  <!-- Source -->
  <line x1="960" y1="100" x2="960" y2="135" stroke="#222" stroke-width="2"/>
  <circle cx="960" cy="160" r="20" fill="white" stroke="#222" stroke-width="2"/>
  <text x="960" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8">+</text>
  <text x="960" y="162" text-anchor="middle" font-size="8" fill="#222">OCV</text>
  <text x="960" y="174" text-anchor="middle" font-size="9" font-weight="bold" fill="#e11d48">−</text>
  <line x1="960" y1="100" x2="960" y2="100" stroke="#222" stroke-width="2"/>
  <line x1="960" y1="180" x2="960" y2="220" stroke="#222" stroke-width="2"/>
  <!-- top from source to rail -->
  <line x1="960" y1="100" x2="960" y2="100" stroke="#222" stroke-width="2"/>

  <!-- Top rail left anchor -->
  <line x1="955" y1="100" x2="960" y2="100" stroke="#222" stroke-width="2"/>

  <!-- Horizontal top rail from source top node to R0 -->
  <line x1="960" y1="100" x2="990" y2="100" stroke="#222" stroke-width="2"/>

  <!-- R0 -->
  <rect x="990" y="88" width="36" height="24" rx="3" fill="white" stroke="#222" stroke-width="1.8"/>
  <text x="1008" y="104" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">R₀</text>
  <line x1="1026" y1="100" x2="1040" y2="100" stroke="#222" stroke-width="2"/>

  <!-- RC1 pair: left node 1040, right node 1080 -->
  <!-- R1 top branch -->
  <line x1="1040" y1="100" x2="1040" y2="126" stroke="#222" stroke-width="2"/>
  <line x1="1040" y1="126" x2="1050" y2="126" stroke="#222" stroke-width="2"/>
  <rect x="1050" y="116" width="30" height="20" rx="3" fill="white" stroke="#c2410c" stroke-width="1.8"/>
  <text x="1065" y="130" text-anchor="middle" font-size="8" font-weight="bold" fill="#c2410c">R₁</text>
  <line x1="1080" y1="126" x2="1080" y2="100" stroke="#222" stroke-width="2"/>
  <!-- C1 bottom branch -->
  <line x1="1040" y1="100" x2="1040" y2="166" stroke="#222" stroke-width="2"/>
  <line x1="1040" y1="166" x2="1053" y2="166" stroke="#222" stroke-width="2"/>
  <line x1="1053" y1="156" x2="1053" y2="176" stroke="#14b8a6" stroke-width="2.5"/>
  <line x1="1063" y1="156" x2="1063" y2="176" stroke="#14b8a6" stroke-width="2.5"/>
  <text x="1058" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#14b8a6">C₁</text>
  <line x1="1063" y1="166" x2="1080" y2="166" stroke="#222" stroke-width="2"/>
  <line x1="1080" y1="100" x2="1080" y2="166" stroke="#222" stroke-width="2"/>

  <circle cx="1040" cy="100" r="3" fill="#555"/>
  <circle cx="1080" cy="100" r="3" fill="#555"/>

  <!-- Wire between RC1 and RC2 -->
  <line x1="1080" y1="100" x2="1094" y2="100" stroke="#222" stroke-width="2"/>

  <!-- RC2 pair: left node 1094, right node 1134 -->
  <line x1="1094" y1="100" x2="1094" y2="126" stroke="#222" stroke-width="2"/>
  <line x1="1094" y1="126" x2="1104" y2="126" stroke="#222" stroke-width="2"/>
  <rect x="1104" y="116" width="30" height="20" rx="3" fill="white" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="1119" y="130" text-anchor="middle" font-size="8" font-weight="bold" fill="#7c3aed">R₂</text>
  <line x1="1134" y1="126" x2="1134" y2="100" stroke="#222" stroke-width="2"/>
  <line x1="1094" y1="100" x2="1094" y2="166" stroke="#222" stroke-width="2"/>
  <line x1="1094" y1="166" x2="1107" y2="166" stroke="#222" stroke-width="2"/>
  <line x1="1107" y1="156" x2="1107" y2="176" stroke="#7c3aed" stroke-width="2.5"/>
  <line x1="1117" y1="156" x2="1117" y2="176" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="1112" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#7c3aed">C₂</text>
  <line x1="1117" y1="166" x2="1134" y2="166" stroke="#222" stroke-width="2"/>
  <line x1="1134" y1="100" x2="1134" y2="166" stroke="#222" stroke-width="2"/>

  <circle cx="1094" cy="100" r="3" fill="#555"/>
  <circle cx="1134" cy="100" r="3" fill="#555"/>

  <!-- Wire to terminal -->
  <line x1="1134" y1="100" x2="1160" y2="100" stroke="#222" stroke-width="2"/>
  <circle cx="1160" cy="100" r="4" fill="#1d4ed8"/>
  <text x="1172" y="104" font-size="10" fill="#1d4ed8">+</text>

  <!-- Bottom rail -->
  <line x1="955" y1="220" x2="1160" y2="220" stroke="#222" stroke-width="2"/>
  <circle cx="1160" cy="220" r="4" fill="#e11d48"/>
  <text x="1172" y="224" font-size="10" fill="#e11d48">−</text>
  <circle cx="955" cy="100" r="3" fill="#555"/>
  <circle cx="955" cy="220" r="3" fill="#555"/>

  <!-- Label -->
  <text x="1065" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Level 3</text>
  <text x="1065" y="272" text-anchor="middle" font-size="10" fill="#555">2RC Thevenin</text>

  <!-- ===== EQUATION STRIP at bottom ===== -->
  <rect x="20" y="295" width="1160" height="80" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="315" font-size="10" font-weight="bold" fill="#1a1a2e">Equations:</text>
  <text x="40" y="332" font-size="10" fill="#1a1a2e">Level 0:  V_t = OCV</text>
  <text x="260" y="332" font-size="10" fill="#1a1a2e">Level 1:  V_t = OCV − I·R₀</text>
  <text x="560" y="332" font-size="10" fill="#1a1a2e">Level 2:  V_t = OCV − I·R₀ − V_RC₁</text>
  <text x="860" y="332" font-size="10" fill="#1a1a2e">Level 3:  V_t = OCV − I·R₀ − V_RC₁ − V_RC₂</text>
  <text x="40" y="355" font-size="9" fill="#555">where: OCV = f(SOC),  V_RCₙ evolves as  dV_RCₙ/dt = I/Cₙ − V_RCₙ/(RₙCₙ)</text>
  <text x="40" y="370" font-size="9" fill="#555">Adding more RC pairs improves transient accuracy; most BMS implementations use 1–2 RC pairs (Thevenin model).</text>

</svg>
