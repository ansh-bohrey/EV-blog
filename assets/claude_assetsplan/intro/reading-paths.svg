<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="sans-serif">
  <rect width="800" height="600" fill="white"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Three Ways to Read This Series</text>

  <!-- ===== PATH COLUMN HEADERS ===== -->

  <!-- Path A header (blue) -->
  <rect x="40" y="44" width="200" height="40" rx="8" fill="#1d4ed8"/>
  <text x="140" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Path A — EV Enthusiast</text>
  <text x="140" y="76" text-anchor="middle" font-size="10" fill="#bfdbfe">~6 posts, story-first</text>

  <!-- Path B header (orange) -->
  <rect x="300" y="44" width="200" height="40" rx="8" fill="#ea580c"/>
  <text x="400" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Path B — Eng. Student</text>
  <text x="400" y="76" text-anchor="middle" font-size="10" fill="#fed7aa">Full order, build intuition</text>

  <!-- Path C header (green) -->
  <rect x="560" y="44" width="200" height="40" rx="8" fill="#15803d"/>
  <text x="660" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Path C — Practising Eng.</text>
  <text x="660" y="76" text-anchor="middle" font-size="10" fill="#bbf7d0">Reference / jump-in</text>

  <!-- ===== ARROW MARKER ===== -->
  <defs>
    <marker id="arrA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrC" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ===== PATH A BOXES (blue, x=40) ===== -->
  <!-- Box helper: each box 200w x 28h, left=40, spacing=66px from top of prev -->

  <!-- A1: Cell -->
  <rect x="40" y="104" width="200" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Cell</text>
  <line x1="140" y1="132" x2="140" y2="144" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- A2: Battery Pack -->
  <rect x="40" y="148" width="200" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="167" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Battery Pack</text>
  <line x1="140" y1="176" x2="140" y2="188" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- A3: Cooling -->
  <rect x="40" y="192" width="200" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="211" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Cooling</text>
  <line x1="140" y1="220" x2="140" y2="232" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- A4: BMS During a Drive -->
  <rect x="40" y="236" width="200" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">BMS During a Drive</text>
  <line x1="140" y1="264" x2="140" y2="276" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- A5: Why Range Drops in Winter -->
  <rect x="40" y="280" width="200" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="299" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Why Range Drops in Winter</text>
  <line x1="140" y1="308" x2="140" y2="320" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- A6: Charging Algorithm -->
  <rect x="40" y="324" width="200" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Charging Algorithm</text>

  <!-- A note -->
  <rect x="40" y="376" width="200" height="44" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="140" y="392" text-anchor="middle" font-size="9" fill="#1e40af">Skip equations.</text>
  <text x="140" y="404" text-anchor="middle" font-size="9" fill="#1e40af">Focus on intuition boxes</text>
  <text x="140" y="416" text-anchor="middle" font-size="9" fill="#1e40af">and "why does my car..." sections.</text>

  <!-- ===== PATH B BOXES (orange, x=300) ===== -->

  <!-- B1: Cell -->
  <rect x="300" y="104" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">Cell</text>
  <line x1="400" y1="132" x2="400" y2="144" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B2: Battery Pack -->
  <rect x="300" y="148" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="167" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">Battery Pack</text>
  <line x1="400" y1="176" x2="400" y2="188" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B3: Cooling -->
  <rect x="300" y="192" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="211" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">Cooling</text>
  <line x1="400" y1="220" x2="400" y2="232" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B4: ECM Primer -->
  <rect x="300" y="236" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">ECM Primer</text>
  <line x1="400" y1="264" x2="400" y2="276" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B5: OCV vs Terminal Voltage -->
  <rect x="300" y="280" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="299" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">OCV vs Terminal Voltage</text>
  <line x1="400" y1="308" x2="400" y2="320" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B6: SOC -->
  <rect x="300" y="324" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">SOC</text>
  <line x1="400" y1="352" x2="400" y2="364" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B7: SOH -->
  <rect x="300" y="368" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="387" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">SOH</text>
  <line x1="400" y1="396" x2="400" y2="408" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B8: SOP -->
  <rect x="300" y="412" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="431" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">SOP</text>
  <line x1="400" y1="440" x2="400" y2="452" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B9: AFE -->
  <rect x="300" y="456" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">AFE</text>
  <line x1="400" y1="484" x2="400" y2="496" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B10: Cell Balancing -->
  <rect x="300" y="500" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="519" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">Cell Balancing</text>
  <line x1="400" y1="528" x2="400" y2="540" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- B11: Ignition Handling -->
  <rect x="300" y="544" width="200" height="28" rx="5" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="562" text-anchor="middle" font-size="10" font-weight="bold" fill="#c2410c">Ignition Handling → HV Safety → CAN Bus</text>

  <!-- ===== PATH C (green, x=560) ===== -->

  <!-- Step 1: Topic Index Table -->
  <rect x="560" y="104" width="200" height="44" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">1. Open topics.md</text>
  <text x="660" y="137" text-anchor="middle" font-size="9" fill="#15803d">Browse the Topic Index table</text>
  <line x1="660" y1="148" x2="660" y2="162" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrC)"/>

  <!-- Step 2: Find relevant post -->
  <rect x="560" y="166" width="200" height="44" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">2. Jump to relevant post</text>
  <text x="660" y="199" text-anchor="middle" font-size="9" fill="#15803d">e.g. SOC, AFE, CAN Bus</text>
  <line x1="660" y1="210" x2="660" y2="224" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrC)"/>

  <!-- Step 3: Literature Review section -->
  <rect x="560" y="228" width="200" height="56" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="246" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">3. Scroll to Literature Review</text>
  <text x="660" y="260" text-anchor="middle" font-size="9" fill="#15803d">Key papers and standards</text>
  <text x="660" y="273" text-anchor="middle" font-size="9" fill="#15803d">listed per section</text>
  <line x1="660" y1="284" x2="660" y2="298" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrC)"/>

  <!-- Step 4: Prerequisites -->
  <rect x="560" y="302" width="200" height="56" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">4. Check prerequisites only</text>
  <text x="660" y="334" text-anchor="middle" font-size="9" fill="#15803d">if a concept is unfamiliar —</text>
  <text x="660" y="347" text-anchor="middle" font-size="9" fill="#15803d">follow backlinks as needed</text>

  <!-- C note box -->
  <rect x="560" y="382" width="200" height="60" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="660" y="400" text-anchor="middle" font-size="9" fill="#14532d">Non-linear. Each post is</text>
  <text x="660" y="413" text-anchor="middle" font-size="9" fill="#14532d">self-contained with prerequisite</text>
  <text x="660" y="426" text-anchor="middle" font-size="9" fill="#14532d">links at the top.</text>
  <text x="660" y="439" text-anchor="middle" font-size="9" font-weight="bold" fill="#14532d">No need to read in order.</text>

  <!-- Vertical dividers between columns -->
  <line x1="260" y1="44" x2="260" y2="570" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="520" y1="44" x2="520" y2="570" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Footer note -->
  <text x="400" y="592" text-anchor="middle" font-size="9" fill="#9ca3af">All posts include: Audience Angles (Engineer / Student / Enthusiast) — Experiment Ideas — Literature Review</text>
</svg>
