<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="580" fill="#f8f9fa"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Series vs Parallel Cell Connections</text>

  <!-- SERIES (top left) -->
  <text x="140" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a6eb5">4S — Series</text>
  <!-- cells stacked vertically, wire connecting − to + -->
  <g id="series">
    <!-- Cell 1 -->
    <rect x="90" y="80" width="100" height="50" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="140" y="100" text-anchor="middle" font-size="11" fill="#333">Cell 1</text>
    <text x="140" y="115" text-anchor="middle" font-size="10" fill="#555">3.6 V</text>
    <line x1="140" y1="80" x2="140" y2="75" stroke="#333" stroke-width="2"/>
    <text x="148" y="78" font-size="10" fill="#c00">+</text>
    <line x1="140" y1="130" x2="140" y2="135" stroke="#333" stroke-width="2"/>
    <text x="148" y="140" font-size="10" fill="#00c">−</text>
    <!-- Cell 2 -->
    <rect x="90" y="148" width="100" height="50" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="140" y="168" text-anchor="middle" font-size="11" fill="#333">Cell 2</text>
    <text x="140" y="183" text-anchor="middle" font-size="10" fill="#555">3.6 V</text>
    <line x1="140" y1="198" x2="140" y2="203" stroke="#333" stroke-width="2"/>
    <!-- Cell 3 -->
    <rect x="90" y="216" width="100" height="50" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="140" y="236" text-anchor="middle" font-size="11" fill="#333">Cell 3</text>
    <text x="140" y="251" text-anchor="middle" font-size="10" fill="#555">3.6 V</text>
    <line x1="140" y1="266" x2="140" y2="271" stroke="#333" stroke-width="2"/>
    <!-- Cell 4 -->
    <rect x="90" y="284" width="100" height="50" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="140" y="304" text-anchor="middle" font-size="11" fill="#333">Cell 4</text>
    <text x="140" y="319" text-anchor="middle" font-size="10" fill="#555">3.6 V</text>
    <line x1="140" y1="334" x2="140" y2="340" stroke="#333" stroke-width="2"/>
    <!-- top terminal -->
    <line x1="140" y1="75" x2="200" y2="75" stroke="#c00" stroke-width="2"/>
    <circle cx="200" cy="75" r="5" fill="#c00"/>
    <text x="210" y="79" font-size="11" fill="#c00" font-weight="bold">V+ (14.4V)</text>
    <!-- bottom terminal -->
    <line x1="140" y1="340" x2="200" y2="340" stroke="#00c" stroke-width="2"/>
    <circle cx="200" cy="340" r="5" fill="#00c"/>
    <text x="210" y="344" font-size="11" fill="#00c" font-weight="bold">V−</text>
  </g>
  <!-- Series summary box -->
  <rect x="70" y="355" width="200" height="95" rx="6" fill="#e8f4fd" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="170" y="372" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6eb5">Series Rules</text>
  <text x="80" y="388" font-size="10" fill="#333">✓ V_total = N × V_cell = 14.4V</text>
  <text x="80" y="403" font-size="10" fill="#333">✓ Capacity = 1 × C_cell</text>
  <text x="80" y="418" font-size="10" fill="#333">✓ R_total = N × R_cell</text>
  <text x="80" y="433" font-size="10" fill="#c00">⚠ Weakest cell limits string</text>

  <!-- PARALLEL (top right) -->
  <text x="560" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#e07b00">4P — Parallel</text>
  <g id="parallel">
    <!-- top bus -->
    <line x1="440" y1="90" x2="700" y2="90" stroke="#c00" stroke-width="2.5"/>
    <!-- bottom bus -->
    <line x1="440" y1="310" x2="700" y2="310" stroke="#00c" stroke-width="2.5"/>
    <!-- 4 cells side by side -->
    <rect x="455" y="110" width="50" height="180" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="480" y="192" text-anchor="middle" font-size="10" fill="#333" transform="rotate(-90,480,192)">Cell 1 · 3.6V</text>
    <line x1="480" y1="110" x2="480" y2="90" stroke="#c00" stroke-width="1.5"/>
    <line x1="480" y1="290" x2="480" y2="310" stroke="#00c" stroke-width="1.5"/>

    <rect x="525" y="110" width="50" height="180" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="550" y="192" text-anchor="middle" font-size="10" fill="#333" transform="rotate(-90,550,192)">Cell 2 · 3.6V</text>
    <line x1="550" y1="110" x2="550" y2="90" stroke="#c00" stroke-width="1.5"/>
    <line x1="550" y1="290" x2="550" y2="310" stroke="#00c" stroke-width="1.5"/>

    <rect x="595" y="110" width="50" height="180" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="620" y="192" text-anchor="middle" font-size="10" fill="#333" transform="rotate(-90,620,192)">Cell 3 · 3.6V</text>
    <line x1="620" y1="110" x2="620" y2="90" stroke="#c00" stroke-width="1.5"/>
    <line x1="620" y1="290" x2="620" y2="310" stroke="#00c" stroke-width="1.5"/>

    <rect x="665" y="110" width="50" height="180" rx="5" fill="white" stroke="#333" stroke-width="2"/>
    <text x="690" y="192" text-anchor="middle" font-size="10" fill="#333" transform="rotate(-90,690,192)">Cell 4 · 3.6V</text>
    <line x1="690" y1="110" x2="690" y2="90" stroke="#c00" stroke-width="1.5"/>
    <line x1="690" y1="290" x2="690" y2="310" stroke="#00c" stroke-width="1.5"/>

    <!-- terminals -->
    <circle cx="440" cy="90" r="5" fill="#c00"/>
    <text x="415" y="94" text-anchor="end" font-size="11" fill="#c00" font-weight="bold">V+ (3.6V)</text>
    <circle cx="440" cy="310" r="5" fill="#00c"/>
    <text x="415" y="314" text-anchor="end" font-size="11" fill="#00c" font-weight="bold">V−</text>
  </g>
  <!-- Parallel summary box -->
  <rect x="440" y="328" width="220" height="95" rx="6" fill="#fff4e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="550" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="#e07b00">Parallel Rules</text>
  <text x="450" y="361" font-size="10" fill="#333">✓ V_total = V_cell = 3.6V</text>
  <text x="450" y="376" font-size="10" fill="#333">✓ Capacity = N × C_cell</text>
  <text x="450" y="391" font-size="10" fill="#333">✓ R_total = R_cell / N</text>
  <text x="450" y="406" font-size="10" fill="#555">Current splits between cells</text>

  <!-- xSyP box at bottom centre -->
  <rect x="250" y="455" width="400" height="105" rx="8" fill="#f0f0ff" stroke="#5555cc" stroke-width="2"/>
  <text x="450" y="475" text-anchor="middle" font-size="13" font-weight="bold" fill="#5555cc">xSyP Notation — Example: 96S3P</text>
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="#333">96 cells in series × 3 cells in parallel at each position</text>
  <text x="450" y="513" text-anchor="middle" font-size="11" fill="#333">V_pack = 96 × 3.6V = <tspan font-weight="bold">345.6V</tspan>   |   Capacity = 3 × C_cell</text>
  <text x="450" y="531" text-anchor="middle" font-size="11" fill="#333">Energy = 345.6V × (3 × 5Ah) = <tspan font-weight="bold">5.18 kWh per module</tspan></text>
  <text x="450" y="549" text-anchor="middle" font-size="10" fill="#777">Multiple modules in series build the full pack</text>
</svg>