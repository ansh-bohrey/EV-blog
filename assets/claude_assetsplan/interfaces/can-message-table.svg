<svg viewBox="0 0 860 640" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="640" fill="#f8f9fa"/>
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">BMS CAN Message Reference Table</text>
  <text x="430" y="46" text-anchor="middle" font-size="11" fill="#555">SAE J1939-style extended IDs (29-bit) — typical BMS implementation on EV powertrain CAN bus</text>

  <!-- ===== TABLE HEADER ===== -->
  <rect x="14" y="56" width="832" height="28" rx="4" fill="#1a1a2e"/>
  <text x="72"  y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Message Name</text>
  <text x="176" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="white">CAN ID (hex)</text>
  <text x="260" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DLC</text>
  <text x="316" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Cycle</text>
  <text x="570" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Payload Layout (Byte : Bits : Signal)</text>
  <text x="802" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Direction</text>

  <!-- Column dividers in header -->
  <line x1="128" y1="56" x2="128" y2="84" stroke="#333" stroke-width="1"/>
  <line x1="220" y1="56" x2="220" y2="84" stroke="#333" stroke-width="1"/>
  <line x1="290" y1="56" x2="290" y2="84" stroke="#333" stroke-width="1"/>
  <line x1="344" y1="56" x2="344" y2="84" stroke="#333" stroke-width="1"/>
  <line x1="780" y1="56" x2="780" y2="84" stroke="#333" stroke-width="1"/>

  <!-- ===== ROW 1: BMS_Status ===== -->
  <rect x="14" y="84" width="832" height="44" rx="0" fill="#e8f0ff" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="101" font-size="10" font-weight="bold" fill="#1a1a2e">BMS_Status</text>
  <text x="20" y="116" font-size="9" fill="#555">State broadcast</text>
  <text x="176" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6eb5" font-family="Courier New, monospace">18F214FE</text>
  <text x="260" y="106" text-anchor="middle" font-size="11" fill="#333">8 B</text>
  <text x="316" y="106" text-anchor="middle" font-size="10" fill="#2a8a2a">100 ms</text>
  <!-- Payload -->
  <text x="350" y="98"  font-size="9" fill="#333">B0: BMS state (0=INIT 1=IDLE 2=PRE 3=DRIVE 4=SLEEP 5=FAULT)</text>
  <text x="350" y="111" font-size="9" fill="#333">B1: Fault severity (0=OK 1=L1 2=L2 3=L3 4=L4) | B2: Active DTC count</text>
  <text x="350" y="124" font-size="9" fill="#555">B3: SOC% (0–100, resolution 1%) | B4–B5: Pack voltage ×0.1V</text>
  <text x="786" y="106" text-anchor="middle" font-size="9" fill="#1a6eb5">BMS → ALL</text>
  <!-- dividers -->
  <line x1="128" y1="84" x2="128" y2="128" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="84" x2="220" y2="128" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="84" x2="290" y2="128" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="84" x2="344" y2="128" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="84" x2="780" y2="128" stroke="#c8d0e0" stroke-width="1"/>

  <!-- ===== ROW 2: BMS_CellData ===== -->
  <rect x="14" y="128" width="832" height="44" rx="0" fill="white" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="145" font-size="10" font-weight="bold" fill="#1a1a2e">BMS_CellData</text>
  <text x="20" y="160" font-size="9" fill="#555">Cell V + temp</text>
  <text x="176" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6eb5" font-family="Courier New, monospace">18F215FE</text>
  <text x="260" y="150" text-anchor="middle" font-size="11" fill="#333">8 B</text>
  <text x="316" y="150" text-anchor="middle" font-size="10" fill="#2a8a2a">100 ms</text>
  <text x="350" y="142" font-size="9" fill="#333">B0–B1: V_cell_min ×1mV (uint16) | B2–B3: V_cell_max ×1mV (uint16)</text>
  <text x="350" y="155" font-size="9" fill="#333">B4: T_cell_max − 40°C (uint8) | B5: T_cell_min − 40°C (uint8)</text>
  <text x="350" y="168" font-size="9" fill="#555">B6: Cell index of V_max | B7: Cell index of V_min</text>
  <text x="786" y="150" text-anchor="middle" font-size="9" fill="#1a6eb5">BMS → VCU</text>
  <line x1="128" y1="128" x2="128" y2="172" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="128" x2="220" y2="172" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="128" x2="290" y2="172" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="128" x2="344" y2="172" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="128" x2="780" y2="172" stroke="#c8d0e0" stroke-width="1"/>

  <!-- ===== ROW 3: BMS_PowerLimits ===== -->
  <rect x="14" y="172" width="832" height="44" rx="0" fill="#e8f0ff" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="189" font-size="10" font-weight="bold" fill="#1a1a2e">BMS_PowerLimits</text>
  <text x="20" y="204" font-size="9" fill="#555">SOP — charge/discharge</text>
  <text x="176" y="194" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6eb5" font-family="Courier New, monospace">18FF32FE</text>
  <text x="260" y="194" text-anchor="middle" font-size="11" fill="#333">8 B</text>
  <text x="316" y="194" text-anchor="middle" font-size="10" fill="#2a8a2a">10 ms</text>
  <text x="350" y="186" font-size="9" fill="#333">B0–B1: Max discharge power ×10W (uint16) | B2–B3: Max charge power ×10W</text>
  <text x="350" y="199" font-size="9" fill="#333">B4–B5: Max discharge current ×0.1A | B6–B7: Max charge current ×0.1A</text>
  <text x="350" y="212" font-size="9" fill="#c00">Fast cycle: VCU reads this to cap torque commands — safety critical path</text>
  <text x="786" y="194" text-anchor="middle" font-size="9" fill="#1a6eb5">BMS → VCU</text>
  <line x1="128" y1="172" x2="128" y2="216" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="172" x2="220" y2="216" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="172" x2="290" y2="216" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="172" x2="344" y2="216" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="172" x2="780" y2="216" stroke="#c8d0e0" stroke-width="1"/>

  <!-- ===== ROW 4: BMS_FaultBroadcast ===== -->
  <rect x="14" y="216" width="832" height="44" rx="0" fill="#fff0f0" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="233" font-size="10" font-weight="bold" fill="#c00">BMS_Fault</text>
  <text x="20" y="248" font-size="9" fill="#555">DTC fault event</text>
  <text x="176" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#c00" font-family="Courier New, monospace">18FEFFFE</text>
  <text x="260" y="238" text-anchor="middle" font-size="11" fill="#333">8 B</text>
  <text x="316" y="238" text-anchor="middle" font-size="10" fill="#c00">on event</text>
  <text x="350" y="230" font-size="9" fill="#333">B0–B1: DTC code (uint16) | B2: Severity level (0–4)</text>
  <text x="350" y="243" font-size="9" fill="#333">B3: Fault state (1=active 0=cleared) | B4: Occurrence count</text>
  <text x="350" y="256" font-size="9" fill="#555">B5–B7: Timestamp (seconds since BMS boot, uint24)</text>
  <text x="786" y="238" text-anchor="middle" font-size="9" fill="#c00">BMS → ALL</text>
  <line x1="128" y1="216" x2="128" y2="260" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="216" x2="220" y2="260" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="216" x2="290" y2="260" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="216" x2="344" y2="260" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="216" x2="780" y2="260" stroke="#c8d0e0" stroke-width="1"/>

  <!-- ===== ROW 5: VCU_DriveRequest ===== -->
  <rect x="14" y="260" width="832" height="44" rx="0" fill="#e8f0ff" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="277" font-size="10" font-weight="bold" fill="#1a1a2e">VCU_DriveReq</text>
  <text x="20" y="292" font-size="9" fill="#555">Torque / mode request</text>
  <text x="176" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#6633cc" font-family="Courier New, monospace">18F10102</text>
  <text x="260" y="282" text-anchor="middle" font-size="11" fill="#333">8 B</text>
  <text x="316" y="282" text-anchor="middle" font-size="10" fill="#2a8a2a">10 ms</text>
  <text x="350" y="274" font-size="9" fill="#333">B0–B1: Requested torque ×0.1 Nm (int16, signed) | B2: Drive mode (0=ECO 1=NRM 2=SPT)</text>
  <text x="350" y="287" font-size="9" fill="#333">B3: Regen level (0–10) | B4: Gear select (0=P 1=R 2=N 3=D)</text>
  <text x="350" y="300" font-size="9" fill="#555">B5–B6: Reserved | B7: Checksum (XOR B0–B6)</text>
  <text x="786" y="282" text-anchor="middle" font-size="9" fill="#6633cc">VCU → BMS</text>
  <line x1="128" y1="260" x2="128" y2="304" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="260" x2="220" y2="304" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="260" x2="290" y2="304" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="260" x2="344" y2="304" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="260" x2="780" y2="304" stroke="#c8d0e0" stroke-width="1"/>

  <!-- ===== ROW 6: OBC_ChargeStatus ===== -->
  <rect x="14" y="304" width="832" height="44" rx="0" fill="white" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="321" font-size="10" font-weight="bold" fill="#1a1a2e">OBC_ChargeStatus</text>
  <text x="20" y="336" font-size="9" fill="#555">Charger state</text>
  <text x="176" y="326" text-anchor="middle" font-size="11" font-weight="bold" fill="#e07b00" font-family="Courier New, monospace">18FF3301</text>
  <text x="260" y="326" text-anchor="middle" font-size="11" fill="#333">8 B</text>
  <text x="316" y="326" text-anchor="middle" font-size="10" fill="#2a8a2a">500 ms</text>
  <text x="350" y="318" font-size="9" fill="#333">B0: Charge state (0=idle 1=pre 2=CC 3=CV 4=done 5=err)</text>
  <text x="350" y="331" font-size="9" fill="#333">B1–B2: AC input voltage ×0.1V | B3–B4: DC output voltage ×0.1V</text>
  <text x="350" y="344" font-size="9" fill="#555">B5: DC output current ×0.1A | B6: OBC temp − 40°C | B7: Fault code</text>
  <text x="786" y="326" text-anchor="middle" font-size="9" fill="#e07b00">OBC → BMS</text>
  <line x1="128" y1="304" x2="128" y2="348" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="304" x2="220" y2="348" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="304" x2="290" y2="348" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="304" x2="344" y2="348" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="304" x2="780" y2="348" stroke="#c8d0e0" stroke-width="1"/>

  <!-- ===== ROW 7: BMS_ChargeCommand ===== -->
  <rect x="14" y="348" width="832" height="44" rx="0" fill="#e8f0ff" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="365" font-size="10" font-weight="bold" fill="#1a1a2e">BMS_ChargeCmd</text>
  <text x="20" y="380" font-size="9" fill="#555">Set-points to OBC</text>
  <text x="176" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6eb5" font-family="Courier New, monospace">18F216FE</text>
  <text x="260" y="370" text-anchor="middle" font-size="11" fill="#333">5 B</text>
  <text x="316" y="370" text-anchor="middle" font-size="10" fill="#2a8a2a">100 ms</text>
  <text x="350" y="362" font-size="9" fill="#333">B0–B1: Target voltage ×0.1V (uint16) | B2–B3: Max current ×0.1A (uint16)</text>
  <text x="350" y="375" font-size="9" fill="#333">B4: Enable (0=stop 1=charge) | Implements CC-CV profile from BMS side</text>
  <text x="350" y="388" font-size="9" fill="#555">BMS reduces max current as cell reaches CV knee to avoid overvoltage</text>
  <text x="786" y="370" text-anchor="middle" font-size="9" fill="#1a6eb5">BMS → OBC</text>
  <line x1="128" y1="348" x2="128" y2="392" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="348" x2="220" y2="392" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="348" x2="290" y2="392" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="348" x2="344" y2="392" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="348" x2="780" y2="392" stroke="#c8d0e0" stroke-width="1"/>

  <!-- ===== ROW 8: BMS_SOH ===== -->
  <rect x="14" y="392" width="832" height="44" rx="0" fill="white" stroke="#c8d0e0" stroke-width="0.5"/>
  <text x="20" y="409" font-size="10" font-weight="bold" fill="#1a1a2e">BMS_SOH_Diag</text>
  <text x="20" y="424" font-size="9" fill="#555">Health data (slow)</text>
  <text x="176" y="414" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6eb5" font-family="Courier New, monospace">18FF34FE</text>
  <text x="260" y="414" text-anchor="middle" font-size="11" fill="#333">8 B</text>
  <text x="316" y="414" text-anchor="middle" font-size="10" fill="#555">1000 ms</text>
  <text x="350" y="406" font-size="9" fill="#333">B0: SOH% (0–100) | B1–B2: Full charge capacity ×10 mAh | B3: Cycle count (×10)</text>
  <text x="350" y="419" font-size="9" fill="#333">B4: R_int relative to new ×0.5% | B5: Calendar age (months)</text>
  <text x="350" y="432" font-size="9" fill="#555">B6–B7: Lifetime energy throughput ×0.1 kWh (uint16)</text>
  <text x="786" y="414" text-anchor="middle" font-size="9" fill="#1a6eb5">BMS → VCU</text>
  <line x1="128" y1="392" x2="128" y2="436" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="220" y1="392" x2="220" y2="436" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="290" y1="392" x2="290" y2="436" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="344" y1="392" x2="344" y2="436" stroke="#c8d0e0" stroke-width="1"/>
  <line x1="780" y1="392" x2="780" y2="436" stroke="#c8d0e0" stroke-width="1"/>

  <!-- Table bottom border -->
  <line x1="14" y1="436" x2="846" y2="436" stroke="#999" stroke-width="1.5"/>

  <!-- ===== NOTES ===== -->
  <rect x="14" y="444" width="270" height="84" rx="6" fill="white" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="149" y="460" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">ID Structure (J1939-style 29-bit)</text>
  <text x="24" y="476" font-size="9" fill="#333">Bits 28–26: Priority (3 bits, 0=highest)</text>
  <text x="24" y="489" font-size="9" fill="#333">Bits 25–24: Reserved/DP (2 bits)</text>
  <text x="24" y="502" font-size="9" fill="#333">Bits 23–16: PGN high byte (8 bits)</text>
  <text x="24" y="515" font-size="9" fill="#333">Bits 15–8:  PGN low byte (8 bits)</text>
  <text x="24" y="528" font-size="9" fill="#555">Bits 7–0:   Source address (FE=BMS, 02=VCU)</text>

  <rect x="296" y="444" width="270" height="84" rx="6" fill="white" stroke="#c00" stroke-width="1.5"/>
  <text x="431" y="460" text-anchor="middle" font-size="10" font-weight="bold" fill="#c00">Common DTC Codes</text>
  <text x="306" y="476" font-size="9" fill="#333">0x0100  OV (overvoltage, any cell)</text>
  <text x="306" y="489" font-size="9" fill="#333">0x0200  UV (undervoltage, any cell)</text>
  <text x="306" y="502" font-size="9" fill="#333">0x0300  OT_DSG (overtemp discharge)</text>
  <text x="306" y="515" font-size="9" fill="#333">0x0500  OCC (overcurrent charge)</text>
  <text x="306" y="528" font-size="9" fill="#555">0x0700  CAN_TIMEOUT (VCU lost)</text>

  <rect x="578" y="444" width="268" height="84" rx="6" fill="white" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="712" y="460" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a8a2a">Timing conventions</text>
  <text x="588" y="476" font-size="9" fill="#333">10 ms  — safety-critical (SOP, torque)</text>
  <text x="588" y="489" font-size="9" fill="#333">100 ms — monitoring (SOC, cell data)</text>
  <text x="588" y="502" font-size="9" fill="#333">500 ms — slow telemetry (OBC, SOH)</text>
  <text x="588" y="515" font-size="9" fill="#c00">on-event — fault, contactor change</text>
  <text x="588" y="528" font-size="9" fill="#555">Missing frame &gt;3× period → timeout DTC</text>

  <!-- Footer -->
  <rect x="14" y="536" width="832" height="22" rx="4" fill="#1a1a2e"/>
  <text x="430" y="552" text-anchor="middle" font-size="10" fill="white">All signals big-endian (Motorola byte order) unless noted | Scale factors apply before decode | Reserved bytes = 0xFF</text>
</svg>
