<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="520" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">AFE Daisy-Chain Architecture — 45-Cell Stack</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#555">3× BQ76940 ICs, each monitoring 15 cells — isolated serial comms to MCU</text>

  <defs>
    <marker id="dcarr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#1a6eb5"/>
    </marker>
    <marker id="dcrarr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2a8a2a"/>
    </marker>
  </defs>

  <!-- MCU (left) -->
  <rect x="20" y="210" width="110" height="100" rx="8" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="75" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#330080">MCU</text>
  <text x="75" y="268" text-anchor="middle" font-size="10" fill="#330080">(Isolated</text>
  <text x="75" y="282" text-anchor="middle" font-size="10" fill="#330080">SPI host)</text>
  <text x="75" y="298" text-anchor="middle" font-size="9" fill="#555">3.3V / GND</text>

  <!-- MCU → IC1 comms line (with isolation symbol) -->
  <line x1="130" y1="250" x2="185" y2="250" stroke="#1a6eb5" stroke-width="2" marker-end="url(#dcarr)"/>
  <line x1="130" y1="265" x2="185" y2="265" stroke="#2a8a2a" stroke-width="2" marker-end="url(#dcrarr)"/>
  <!-- isolation barrier symbol -->
  <ellipse cx="158" cy="258" rx="10" ry="16" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="158" y="290" text-anchor="middle" font-size="8" fill="#888">ISO</text>
  <text x="155" y="244" font-size="8" fill="#1a6eb5">TX</text>
  <text x="155" y="280" font-size="8" fill="#2a8a2a">RX</text>

  <!-- ── AFE IC 1 (bottom of stack) ── -->
  <rect x="186" y="100" width="160" height="300" rx="8" fill="white" stroke="#1a6eb5" stroke-width="2.5"/>
  <text x="266" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6eb5">AFE IC 1</text>
  <text x="266" y="138" text-anchor="middle" font-size="10" fill="#555">(Cells 1–15)</text>
  <!-- cell bars -->
  <rect x="196" y="148" width="140" height="18" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <text x="266" y="161" text-anchor="middle" font-size="9" fill="#333">Cells 1–5 (V1–V5)</text>
  <rect x="196" y="172" width="140" height="18" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <text x="266" y="185" text-anchor="middle" font-size="9" fill="#333">Cells 6–10 (V6–V10)</text>
  <rect x="196" y="196" width="140" height="18" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <text x="266" y="209" text-anchor="middle" font-size="9" fill="#333">Cells 11–15 (V11–V15)</text>
  <!-- ADC inside -->
  <rect x="210" y="225" width="112" height="30" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1"/>
  <text x="266" y="245" text-anchor="middle" font-size="9" fill="#003a7a">16-bit ADC + temp</text>
  <!-- protection logic -->
  <rect x="210" y="265" width="112" height="30" rx="4" fill="#ffe0d0" stroke="#c04000" stroke-width="1"/>
  <text x="266" y="285" text-anchor="middle" font-size="9" fill="#802000">OV/UV protection logic</text>
  <!-- passive balance FETs -->
  <rect x="210" y="305" width="112" height="30" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1"/>
  <text x="266" y="325" text-anchor="middle" font-size="9" fill="#1a5a1a">Balance FET drivers</text>
  <!-- COMMLOW/HIGH pins -->
  <text x="266" y="365" text-anchor="middle" font-size="9" fill="#333">COMMHIGH →</text>
  <text x="266" y="380" text-anchor="middle" font-size="9" fill="#333">← COMMLOW</text>

  <!-- IC1 → IC2 daisy chain link -->
  <line x1="346" y1="245" x2="400" y2="245" stroke="#1a6eb5" stroke-width="2" stroke-dasharray="5,2" marker-end="url(#dcarr)"/>
  <line x1="346" y1="260" x2="400" y2="260" stroke="#2a8a2a" stroke-width="2" stroke-dasharray="5,2" marker-end="url(#dcrarr)"/>
  <text x="373" y="238" text-anchor="middle" font-size="8" fill="#1a6eb5">COMM</text>
  <text x="373" y="275" text-anchor="middle" font-size="8" fill="#555">capacitor-coupled</text>
  <text x="373" y="285" text-anchor="middle" font-size="8" fill="#555">isolation</text>

  <!-- ── AFE IC 2 (middle) ── -->
  <rect x="401" y="100" width="160" height="300" rx="8" fill="white" stroke="#1a7a50" stroke-width="2.5"/>
  <text x="481" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a7a50">AFE IC 2</text>
  <text x="481" y="138" text-anchor="middle" font-size="10" fill="#555">(Cells 16–30)</text>
  <rect x="411" y="148" width="140" height="18" rx="3" fill="#b0d8c8" stroke="#666" stroke-width="1"/>
  <text x="481" y="161" text-anchor="middle" font-size="9" fill="#333">Cells 16–20</text>
  <rect x="411" y="172" width="140" height="18" rx="3" fill="#b0d8c8" stroke="#666" stroke-width="1"/>
  <text x="481" y="185" text-anchor="middle" font-size="9" fill="#333">Cells 21–25</text>
  <rect x="411" y="196" width="140" height="18" rx="3" fill="#b0d8c8" stroke="#666" stroke-width="1"/>
  <text x="481" y="209" text-anchor="middle" font-size="9" fill="#333">Cells 26–30</text>
  <rect x="425" y="225" width="112" height="30" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1"/>
  <text x="481" y="245" text-anchor="middle" font-size="9" fill="#003a7a">16-bit ADC + temp</text>
  <rect x="425" y="265" width="112" height="30" rx="4" fill="#ffe0d0" stroke="#c04000" stroke-width="1"/>
  <text x="481" y="285" text-anchor="middle" font-size="9" fill="#802000">OV/UV protection logic</text>
  <rect x="425" y="305" width="112" height="30" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1"/>
  <text x="481" y="325" text-anchor="middle" font-size="9" fill="#1a5a1a">Balance FET drivers</text>

  <!-- IC2 → IC3 -->
  <line x1="561" y1="245" x2="615" y2="245" stroke="#1a6eb5" stroke-width="2" stroke-dasharray="5,2" marker-end="url(#dcarr)"/>
  <line x1="561" y1="260" x2="615" y2="260" stroke="#2a8a2a" stroke-width="2" stroke-dasharray="5,2" marker-end="url(#dcrarr)"/>
  <text x="588" y="238" text-anchor="middle" font-size="8" fill="#1a6eb5">COMM</text>
  <text x="588" y="275" text-anchor="middle" font-size="8" fill="#555">cap-coupled</text>

  <!-- ── AFE IC 3 (top of stack) ── -->
  <rect x="616" y="100" width="160" height="300" rx="8" fill="white" stroke="#c04000" stroke-width="2.5"/>
  <text x="696" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#c04000">AFE IC 3</text>
  <text x="696" y="138" text-anchor="middle" font-size="10" fill="#555">(Cells 31–45)</text>
  <rect x="626" y="148" width="140" height="18" rx="3" fill="#f0c8b0" stroke="#666" stroke-width="1"/>
  <text x="696" y="161" text-anchor="middle" font-size="9" fill="#333">Cells 31–35</text>
  <rect x="626" y="172" width="140" height="18" rx="3" fill="#f0c8b0" stroke="#666" stroke-width="1"/>
  <text x="696" y="185" text-anchor="middle" font-size="9" fill="#333">Cells 36–40</text>
  <rect x="626" y="196" width="140" height="18" rx="3" fill="#f0c8b0" stroke="#666" stroke-width="1"/>
  <text x="696" y="209" text-anchor="middle" font-size="9" fill="#333">Cells 41–45</text>
  <rect x="640" y="225" width="112" height="30" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1"/>
  <text x="696" y="245" text-anchor="middle" font-size="9" fill="#003a7a">16-bit ADC + temp</text>
  <rect x="640" y="265" width="112" height="30" rx="4" fill="#ffe0d0" stroke="#c04000" stroke-width="1"/>
  <text x="696" y="285" text-anchor="middle" font-size="9" fill="#802000">OV/UV protection logic</text>
  <rect x="640" y="305" width="112" height="30" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1"/>
  <text x="696" y="325" text-anchor="middle" font-size="9" fill="#1a5a1a">Balance FET drivers</text>

  <!-- Pack voltage annotation -->
  <line x1="20" y1="60" x2="776" y2="60" stroke="#c00" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="398" y="56" text-anchor="middle" font-size="10" fill="#c00" font-weight="bold">Pack total voltage (45S × 3.6V = 162V nominal)</text>

  <!-- Key insight box -->
  <rect x="20" y="430" width="780" height="70" rx="8" fill="#fff8e0" stroke="#e0a000" stroke-width="1.5"/>
  <text x="410" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5000">Why daisy-chain instead of separate SPI lines?</text>
  <text x="410" y="468" text-anchor="middle" font-size="10" fill="#555">Each IC floats at a different potential (IC3 can be at 120V+ above MCU ground). Capacitor-coupled</text>
  <text x="410" y="482" text-anchor="middle" font-size="10" fill="#555">COMMHIGH/COMMLOW pins provide 1 Mbps isolated comms without needing a separate opto or digital iso per IC.</text>
  <text x="410" y="496" text-anchor="middle" font-size="10" fill="#555">MCU sends a wake token → IC1 relays to IC2 → IC2 relays to IC3 → all scan simultaneously, return data back down the chain.</text>
</svg>
