<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="560" fill="#f8f9fa"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">SOH Degradation Mechanisms — How Cells Age</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#555">Capacity fade and resistance rise from multiple simultaneous physical processes</text>

  <defs>
    <marker id="soharr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Centre cell graphic -->
  <rect x="340" y="60" width="180" height="300" rx="10" fill="white" stroke="#555" stroke-width="2.5"/>
  <text x="430" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Li-ion Cell</text>
  <!-- Anode layer -->
  <rect x="350" y="95" width="60" height="240" rx="4" fill="#b0c4de" stroke="#4470a0" stroke-width="1.5"/>
  <text x="380" y="220" text-anchor="middle" font-size="10" fill="#1a1a2e" transform="rotate(-90,380,220)">Graphite Anode</text>
  <!-- Separator -->
  <rect x="413" y="95" width="14" height="240" rx="2" fill="#ffe0b0" stroke="#e07b00" stroke-width="1"/>
  <text x="420" y="220" text-anchor="middle" font-size="7" fill="#7a3a00" transform="rotate(-90,420,220)">SEP</text>
  <!-- Cathode layer -->
  <rect x="430" y="95" width="80" height="240" rx="4" fill="#d0c8f0" stroke="#6633cc" stroke-width="1.5"/>
  <text x="470" y="220" text-anchor="middle" font-size="10" fill="#330080" transform="rotate(-90,470,220)">NMC/LFP Cathode</text>

  <!-- SEI layer (thin, on anode surface) -->
  <rect x="408" y="95" width="5" height="240" fill="#ffcc00" fill-opacity="0.7" stroke="none"/>
  <text x="340" y="122" text-anchor="end" font-size="9" fill="#c8a000" font-weight="bold">SEI layer</text>
  <line x1="342" y1="120" x2="408" y2="120" stroke="#c8a000" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ── Left side mechanisms ── -->

  <!-- SEI Growth -->
  <rect x="20" y="65" width="290" height="80" rx="6" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="165" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5000">① SEI Growth</text>
  <text x="30" y="99" font-size="9" fill="#333">• Solid-electrolyte interphase thickens with cycles</text>
  <text x="30" y="112" font-size="9" fill="#333">• Consumes Li+ irreversibly → capacity fade</text>
  <text x="30" y="125" font-size="9" fill="#333">• Accelerated by: high T, high SOC storage, fast charge</text>
  <text x="30" y="138" font-size="9" fill="#555">Rate doubles per 10°C rise (Arrhenius)</text>
  <line x1="310" y1="105" x2="340" y2="120" stroke="#c8a000" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#soharr)"/>

  <!-- Li Plating -->
  <rect x="20" y="165" width="290" height="80" rx="6" fill="#ffe0d0" stroke="#c04000" stroke-width="2"/>
  <text x="165" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#802000">② Lithium Plating</text>
  <text x="30" y="199" font-size="9" fill="#333">• Li+ deposits as metal on anode surface (dendrites)</text>
  <text x="30" y="212" font-size="9" fill="#333">• Happens during fast charge at low T (&lt;10°C)</text>
  <text x="30" y="225" font-size="9" fill="#c00">• Dendrites can pierce separator → internal short</text>
  <text x="30" y="238" font-size="9" fill="#555">→ Irreversible capacity loss, safety risk</text>
  <line x1="310" y1="205" x2="340" y2="200" stroke="#c04000" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#soharr)"/>

  <!-- Graphite cracking -->
  <rect x="20" y="265" width="290" height="80" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="165" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#003a7a">③ Graphite Particle Cracking</text>
  <text x="30" y="299" font-size="9" fill="#333">• Li intercalation/deintercalation causes 10% volume swing</text>
  <text x="30" y="312" font-size="9" fill="#333">• Mechanical stress fractures graphite particles</text>
  <text x="30" y="325" font-size="9" fill="#333">• Exposes fresh surface → more SEI forms</text>
  <text x="30" y="338" font-size="9" fill="#555">→ Cascading capacity fade at high cycle count</text>
  <line x1="310" y1="310" x2="340" y2="280" stroke="#1a6eb5" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#soharr)"/>

  <!-- ── Right side mechanisms ── -->

  <!-- Cathode dissolution -->
  <rect x="550" y="65" width="290" height="80" rx="6" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="695" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#330080">④ Cathode Dissolution (NMC)</text>
  <text x="560" y="99" font-size="9" fill="#333">• Mn, Ni, Co dissolve into electrolyte at high T</text>
  <text x="560" y="112" font-size="9" fill="#333">• Metal ions migrate to anode, catalyze SEI decomp</text>
  <text x="560" y="125" font-size="9" fill="#333">• Worse above 4.15V cell voltage</text>
  <text x="560" y="138" font-size="9" fill="#555">LFP nearly immune (Fe stable, lower voltage)</text>
  <line x1="550" y1="105" x2="520" y2="125" stroke="#6633cc" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#soharr)"/>

  <!-- Electrolyte oxidation -->
  <rect x="550" y="165" width="290" height="80" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="695" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">⑤ Electrolyte Oxidation</text>
  <text x="560" y="199" font-size="9" fill="#333">• Electrolyte decomposes at cathode surface (&gt;4.2V)</text>
  <text x="560" y="212" font-size="9" fill="#333">• Produces resistive film on cathode → R_int rises</text>
  <text x="560" y="225" font-size="9" fill="#333">• Also: binder decomposition in electrode</text>
  <text x="560" y="238" font-size="9" fill="#555">→ Power fade (SOP ↓) even when SOH still OK</text>
  <line x1="550" y1="205" x2="520" y2="200" stroke="#2a8a2a" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#soharr)"/>

  <!-- Current collector corrosion -->
  <rect x="550" y="265" width="290" height="80" rx="6" fill="#e8f8f0" stroke="#1a7a50" stroke-width="2"/>
  <text x="695" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">⑥ Current Collector Corrosion</text>
  <text x="560" y="299" font-size="9" fill="#333">• Al cathode collector corrodes in acidic electrolyte</text>
  <text x="560" y="312" font-size="9" fill="#333">• Cu anode collector dissolves at deep discharge (&lt;2V)</text>
  <text x="560" y="325" font-size="9" fill="#c00">• Cu ions plate on anode → shorts and dendrites</text>
  <text x="560" y="338" font-size="9" fill="#555">→ Why BMS enforces V_min = 2.5V absolute floor</text>
  <line x1="550" y1="310" x2="520" y2="280" stroke="#1a7a50" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#soharr)"/>

  <!-- SOH equation and measurement boxes -->
  <rect x="20" y="375" width="820" height="55" rx="6" fill="#e8f4fd" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="430" y="396" text-anchor="middle" font-size="12" font-weight="bold" fill="#003a7a">SOH Definition</text>
  <text x="430" y="415" text-anchor="middle" font-size="11" fill="#333">SOH_capacity = Q_measured / Q_nominal × 100%     |     SOH_resistance = R_int_new / R_int_now × 100%</text>
  <text x="430" y="430" text-anchor="middle" font-size="10" fill="#555">EV warranty threshold: typically 70–80% SOH_capacity (e.g. 8 yr / 160,000 km for many models)</text>

  <!-- Bottom summary table -->
  <rect x="20" y="448" width="820" height="90" rx="6" fill="#f0fff0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="430" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">Dominant degradation vs. condition</text>
  <line x1="20" y1="470" x2="840" y2="470" stroke="#ccc" stroke-width="1"/>
  <!-- headers -->
  <text x="120" y="484" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Condition</text>
  <text x="300" y="484" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Primary mechanism</text>
  <text x="520" y="484" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Condition</text>
  <text x="700" y="484" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Primary mechanism</text>
  <line x1="20" y1="488" x2="840" y2="488" stroke="#ddd" stroke-width="1"/>
  <text x="120" y="502" text-anchor="middle" font-size="9" fill="#333">High temp storage</text>
  <text x="300" y="502" text-anchor="middle" font-size="9" fill="#c00">SEI growth, cathode dissolution</text>
  <text x="520" y="502" text-anchor="middle" font-size="9" fill="#333">Fast charging at cold</text>
  <text x="700" y="502" text-anchor="middle" font-size="9" fill="#c00">Li plating, dendrites</text>
  <text x="120" y="516" text-anchor="middle" font-size="9" fill="#333">High cycle count</text>
  <text x="300" y="516" text-anchor="middle" font-size="9" fill="#e07b00">Particle cracking, SEI cascade</text>
  <text x="520" y="516" text-anchor="middle" font-size="9" fill="#333">Deep discharge (&lt;2.5V)</text>
  <text x="700" y="516" text-anchor="middle" font-size="9" fill="#c00">Cu dissolution, collector corrosion</text>
  <text x="120" y="530" text-anchor="middle" font-size="9" fill="#333">100% SOC storage</text>
  <text x="300" y="530" text-anchor="middle" font-size="9" fill="#e07b00">Electrolyte oxidation, SEI</text>
  <text x="520" y="530" text-anchor="middle" font-size="9" fill="#333">Repeated 80–100% cycles</text>
  <text x="700" y="530" text-anchor="middle" font-size="9" fill="#e07b00">NMC cathode stress</text>
</svg>
