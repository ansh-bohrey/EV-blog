  <!-- EV Nodes → Why Range -->
  <line x1="530" y1="564" x2="555" y2="564" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- CAN → EV Nodes -->
  <line x1="180" y1="564" x2="400" y2="564" stroke="#555" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- EV Nodes → BMS During a Drive -->
  <line x1="465" y1="582" x2="400" y2="632" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- Why Range → BMS During a Drive -->
