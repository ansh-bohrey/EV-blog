<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="sans-serif">
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">HPPC Pulse Test — Parameter Extraction (R₀, R₁, C₁)</text>
  <text x="400" y="43" text-anchor="middle" font-size="10" fill="#64748b">Hybrid Pulse Power Characterization — voltage response to a controlled current pulse</text>

  <!-- ===== AXIS AREA ===== -->
  <!-- Plot region: x: 80–730, y: 65–390  (top-left is higher voltage) -->
  <!-- Y range: 3.30 V (bottom, y=390) to 3.80 V (top, y=65) -->
  <!-- X range: 0 s (x=80) to 80 s (x=730) -->

  <!-- Grid lines (horizontal) -->
  <!-- 3.30, 3.40, 3.50, 3.60, 3.70, 3.80 -->
  <defs>
    <style>
      .axis-label { font-size: 10px; fill: #475569; }
      .grid-line  { stroke: #e2e8f0; stroke-width: 1; }
      .tick-line  { stroke: #94a3b8; stroke-width: 1; }
    </style>
  </defs>

  <!-- Voltage → pixel: py = 390 - (V - 3.30)/(0.50) * (390-65) = 390 - (V-3.30)*650 -->
  <!-- Time → pixel:    px = 80 + t/80 * (730-80) = 80 + t*8.125 -->

  <!-- Helper: t=0→px=80, t=10→px=161.25, t=20→px=242.5, t=30→px=323.75, t=40→px=405,
               t=50→px=486.25, t=60→px=567.5, t=70→px=648.75, t=80→px=730 -->
  <!-- Helper: V=3.80→py=65, V=3.75→py=97.5, V=3.70→py=130, V=3.65→py=162.5, V=3.60→py=195,
               V=3.55→py=227.5, V=3.50→py=260, V=3.45→py=292.5, V=3.40→py=325, V=3.35→py=357.5, V=3.30→py=390 -->

  <!-- Horizontal grid -->
  <line x1="80" y1="65"  x2="730" y2="65"  class="grid-line"/>
  <line x1="80" y1="97"  x2="730" y2="97"  class="grid-line"/>
  <line x1="80" y1="130" x2="730" y2="130" class="grid-line"/>
  <line x1="80" y1="162" x2="730" y2="162" class="grid-line"/>
  <line x1="80" y1="195" x2="730" y2="195" class="grid-line"/>
  <line x1="80" y1="227" x2="730" y2="227" class="grid-line"/>
  <line x1="80" y1="260" x2="730" y2="260" class="grid-line"/>
  <line x1="80" y1="292" x2="730" y2="292" class="grid-line"/>
  <line x1="80" y1="325" x2="730" y2="325" class="grid-line"/>
  <line x1="80" y1="357" x2="730" y2="357" class="grid-line"/>
  <line x1="80" y1="390" x2="730" y2="390" class="grid-line"/>

  <!-- Vertical grid at t = 0,10,20,30,40,50,60,70,80 -->
  <line x1="80"  y1="65" x2="80"  y2="390" class="grid-line" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="161" y1="65" x2="161" y2="390" class="grid-line"/>
  <line x1="243" y1="65" x2="243" y2="390" class="grid-line"/>
  <line x1="324" y1="65" x2="324" y2="390" class="grid-line"/>
  <line x1="405" y1="65" x2="405" y2="390" class="grid-line"/>
  <line x1="486" y1="65" x2="486" y2="390" class="grid-line"/>
  <line x1="568" y1="65" x2="568" y2="390" class="grid-line"/>
  <line x1="649" y1="65" x2="649" y2="390" class="grid-line"/>
  <line x1="730" y1="65" x2="730" y2="390" class="grid-line" stroke="#94a3b8" stroke-width="1.2"/>

  <!-- Y axis labels -->
  <text x="72" y="69"  text-anchor="end" class="axis-label">3.80</text>
  <text x="72" y="101" text-anchor="end" class="axis-label">3.75</text>
  <text x="72" y="134" text-anchor="end" class="axis-label">3.70</text>
  <text x="72" y="166" text-anchor="end" class="axis-label">3.65</text>
  <text x="72" y="199" text-anchor="end" class="axis-label">3.60</text>
  <text x="72" y="231" text-anchor="end" class="axis-label">3.55</text>
  <text x="72" y="264" text-anchor="end" class="axis-label">3.50</text>
  <text x="72" y="296" text-anchor="end" class="axis-label">3.45</text>
  <text x="72" y="329" text-anchor="end" class="axis-label">3.40</text>
  <text x="72" y="361" text-anchor="end" class="axis-label">3.35</text>
  <text x="72" y="394" text-anchor="end" class="axis-label">3.30</text>

  <!-- X axis labels -->
  <text x="80"  y="406" text-anchor="middle" class="axis-label">0</text>
  <text x="161" y="406" text-anchor="middle" class="axis-label">10</text>
  <text x="243" y="406" text-anchor="middle" class="axis-label">20</text>
  <text x="324" y="406" text-anchor="middle" class="axis-label">30</text>
  <text x="405" y="406" text-anchor="middle" class="axis-label">40</text>
  <text x="486" y="406" text-anchor="middle" class="axis-label">50</text>
  <text x="568" y="406" text-anchor="middle" class="axis-label">60</text>
  <text x="649" y="406" text-anchor="middle" class="axis-label">70</text>
  <text x="730" y="406" text-anchor="middle" class="axis-label">80</text>

  <!-- Axis titles -->
  <text x="405" y="424" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">Time (s)</text>
  <text x="22" y="228" text-anchor="middle" font-size="11" fill="#334155" font-weight="600" transform="rotate(-90, 22, 228)">Voltage (V)</text>

  <!-- ===== WAVEFORM PATH =====
    Segments:
    1. Pre-pulse flat at OCV 3.75V:  t=0→97px  to  t=10→161px,  y=97px
    2. Instant drop to 3.55V at t=10:  vertical from y=97 to y=228px  at x=161
    3. RC decay from 3.55V to 3.45V:  t=10(161) to t=20(243), from y=228 curving to y=293
       Use exponential decay: V(t) = 3.45 + 0.10*exp(-(t-10)/10)
       t=10: 3.55  t=12: 3.45+0.10*exp(-0.2)=3.45+0.082=3.532 → y=228-(3.532-3.30)*650=228... recalc
       py = 390 - (V-3.30)*650
       t=10: V=3.55  → py = 390 - 0.25*650 = 390-162.5 = 227.5 ≈ 228
       t=12: V=3.45+0.10*e^(-0.2)=3.45+0.0819=3.5319 → py=390-0.2319*650=390-150.7=239
       t=14: V=3.45+0.10*e^(-0.4)=3.45+0.0670=3.517  → py=390-0.217*650=390-141=249
       t=16: V=3.45+0.10*e^(-0.6)=3.45+0.0549=3.505  → py=390-0.205*650=390-133=257
       t=18: V=3.45+0.10*e^(-0.8)=3.45+0.0449=3.495  → py=390-0.195*650=390-127=263
       t=20: V=3.45+0.10*e^(-1.0)=3.45+0.0368=3.487  → py=390-0.187*650=390-121.5=269
       (held at 3.45 for annotation; actual t=20 end ~3.487)
    4. Instant jump at t=20: from 3.487 to 3.487+0.20=3.687 → py=390-0.387*650=390-251.5=138.5≈139
    5. Slow recovery from 3.687 toward 3.75V (OCV):
       V(t) = 3.75 - 0.063*exp(-(t-20)/10)
       t=20: 3.75-0.063=3.687  py=139
       t=25: 3.75-0.063*e^(-0.5)=3.75-0.038=3.712 → py=390-0.412*650=390-267.8=122
       t=30: 3.75-0.063*e^(-1)=3.75-0.023=3.727   → py=390-0.427*650=390-277.6=112
       t=40: 3.75-0.063*e^(-2)=3.75-0.0085=3.7415 → py=390-0.4415*650=390-287=103
       t=50: ~3.748 → py=390-0.448*650=390-291.2=99
       t=60: ~3.749 → py≈98
       t=80: ~3.750 → py=97
  -->

  <!-- Waveform: blue/orange gradient line -->
  <polyline
    points="
      80,97
      161,97
      161,228
      163,239
      167,249
      171,257
      176,263
      181,269
      243,269
      243,139
      264,122
      324,112
      405,103
      486,99
      568,98
      730,97
    "
    fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Highlight the RC decay segment in blue -->
  <polyline
    points="161,228 163,239 167,249 171,257 176,263 181,269 243,269"
    fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Highlight recovery segment in blue -->
  <polyline
    points="243,139 264,122 324,112 405,103 486,99 568,98 730,97"
    fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== ANNOTATIONS ===== -->

  <!-- 1. "OCV before pulse" at flat start -->
  <line x1="110" y1="88" x2="110" y2="70" stroke="#64748b" stroke-width="1" marker-end="url(#annArr)"/>
  <rect x="62" y="56" width="110" height="16" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="117" y="67" text-anchor="middle" font-size="9" fill="#334155" font-weight="600">OCV before pulse = 3.75 V</text>

  <!-- 2. ΔV₀ = I×R₀  double-headed arrow for instant drop -->
  <!-- Drop: from y=97 to y=228 at x=161 -->
  <line x1="155" y1="97"  x2="155" y2="228" stroke="#e11d48" stroke-width="1.5" marker-start="url(#annArrRev)" marker-end="url(#annArrRed)"/>
  <rect x="22" y="148" width="90" height="28" rx="4" fill="#fff1f2" stroke="#fda4af" stroke-width="1"/>
  <text x="67" y="162" text-anchor="middle" font-size="9" font-weight="bold" fill="#be123c">ΔV₀ = I × R₀</text>
  <text x="67" y="172" text-anchor="middle" font-size="9" fill="#be123c">= 2 A × 0.1 Ω = 0.2 V</text>
  <!-- Leader line to arrow -->
  <line x1="112" y1="162" x2="155" y2="162" stroke="#fda4af" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 3. "RC decay (τ₁, τ₂)" spanning gradual drop -->
  <line x1="202" y1="248" x2="220" y2="305" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#annArrBlue)"/>
  <rect x="222" y="305" width="145" height="28" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="295" y="318" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8">RC decay (τ₁ = R₁C₁ = 10 s)</text>
  <text x="295" y="328" text-anchor="middle" font-size="9" fill="#1d4ed8">V drops further ~0.10 V</text>

  <!-- 4. R₀ = ΔV₀/I callout box -->
  <rect x="520" y="170" width="165" height="44" rx="5" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="602" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#c2410c">R₀ = ΔV₀ / I</text>
  <text x="602" y="200" text-anchor="middle" font-size="9" fill="#92400e">Measure instant jump at</text>
  <text x="602" y="211" text-anchor="middle" font-size="9" fill="#92400e">pulse ON (t=10) or OFF (t=20)</text>

  <!-- 5. "Fit exponential: V_RC × e^(−t/τ)" callout -->
  <rect x="490" y="55" width="220" height="42" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="600" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">Fit exponential after pulse OFF:</text>
  <text x="600" y="85" text-anchor="middle" font-size="9" fill="#166534">V_RC × e^(−t/τ₁),  τ₁ = R₁ × C₁</text>
  <!-- Leader line to recovery curve -->
  <line x1="600" y1="97" x2="500" y2="105" stroke="#86efac" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#annArrGreen)"/>

  <!-- 6. Instant jump at t=20 annotation -->
  <!-- Arrow at x=243, from y=269 (pre-jump) to y=139 (post-jump) -->
  <line x1="249" y1="269" x2="249" y2="139" stroke="#e11d48" stroke-width="1.5" marker-start="url(#annArrRev)" marker-end="url(#annArrRed)"/>
  <text x="260" y="200" font-size="9" fill="#be123c" font-weight="600">Instant</text>
  <text x="260" y="212" font-size="9" fill="#be123c" font-weight="600">recovery</text>
  <text x="260" y="224" font-size="9" fill="#be123c">= I × R₀</text>

  <!-- Pulse region shading -->
  <rect x="161" y="65" width="82" height="325" fill="rgba(249,115,22,0.05)" stroke="none"/>
  <text x="202" y="420" text-anchor="middle" font-size="9" fill="#ea580c" font-weight="600">← pulse applied →</text>
  <text x="202" y="432" text-anchor="middle" font-size="9" fill="#ea580c">10 s — 20 s</text>

  <!-- Axes (on top of grid) -->
  <line x1="80" y1="65" x2="80" y2="395" stroke="#334155" stroke-width="1.5"/>
  <line x1="75" y1="390" x2="735" y2="390" stroke="#334155" stroke-width="1.5"/>

  <!-- ===== MARKER DEFINITIONS ===== -->
  <defs>
    <marker id="annArr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
    <marker id="annArrRev" markerWidth="7" markerHeight="7" refX="1" refY="3" orient="auto">
      <path d="M7,0 L7,6 L0,3 z" fill="#e11d48"/>
    </marker>
    <marker id="annArrRed" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e11d48"/>
    </marker>
    <marker id="annArrBlue" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="annArrGreen" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ===== BOTTOM LEGEND ===== -->
  <line x1="90" y1="455" x2="120" y2="455" stroke="#f97316" stroke-width="2.5"/>
  <text x="126" y="459" font-size="10" fill="#334155">Pre-pulse flat / instant jumps (R₀ effect)</text>
  <line x1="350" y1="455" x2="380" y2="455" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="386" y="459" font-size="10" fill="#334155">RC decay / recovery (R₁, C₁ effect)</text>

  <text x="400" y="477" text-anchor="middle" font-size="9" fill="#94a3b8">Parameters: I_pulse = 2 A  |  R₀ = 0.10 Ω  |  R₁ = 0.05 Ω  |  C₁ = 200 F  |  τ₁ = 10 s  |  OCV = 3.75 V</text>

</svg>
