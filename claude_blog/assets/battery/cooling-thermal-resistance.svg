<svg viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="380" fill="#f8f9fa"/>
  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Cell-to-Coolant Thermal Resistance Network</text>

  <!-- heat source arrow -->
  <text x="30" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#c00">Heat</text>
  <text x="30" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#c00">Source</text>
  <text x="30" y="185" text-anchor="middle" font-size="10" fill="#c00">(I²R)</text>
  <line x1="58" y1="170" x2="85" y2="170" stroke="#c00" stroke-width="2.5" marker-end="url(#redArr)"/>
  <defs>
    <marker id="redArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c00"/>
    </marker>
    <marker id="blueArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a6eb5"/>
    </marker>
  </defs>

  <!-- Cell block -->
  <rect x="86" y="120" width="90" height="100" rx="6" fill="#b0c4de" stroke="#4470a0" stroke-width="2"/>
  <text x="131" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Cell</text>
  <text x="131" y="178" text-anchor="middle" font-size="10" fill="#333">Core temp</text>
  <text x="131" y="192" text-anchor="middle" font-size="10" fill="#333">T_cell</text>
  <!-- heat flow arrow -->
  <line x1="176" y1="170" x2="205" y2="170" stroke="#c00" stroke-width="2.5" marker-end="url(#redArr)"/>

  <!-- R_cell block -->
  <rect x="206" y="140" width="90" height="60" rx="4" fill="#ffe8cc" stroke="#e07b00" stroke-width="2"/>
  <text x="251" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3a00">R_cell</text>
  <text x="251" y="178" text-anchor="middle" font-size="9" fill="#555">5–15 K/W</text>
  <!-- node label -->
  <text x="296" y="195" font-size="9" fill="#888" text-anchor="middle">T_surface</text>
  <line x1="296" y1="170" x2="325" y2="170" stroke="#c00" stroke-width="2.5" marker-end="url(#redArr)"/>

  <!-- R_TIM block -->
  <rect x="326" y="130" width="90" height="80" rx="4" fill="#fff0b0" stroke="#c8a000" stroke-width="2"/>
  <text x="371" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a5000">R_TIM</text>
  <text x="371" y="175" text-anchor="middle" font-size="9" fill="#555">2–8 K/W</text>
  <text x="371" y="190" text-anchor="middle" font-size="9" fill="#c00" font-weight="bold">Often limiting</text>
  <line x1="416" y1="170" x2="445" y2="170" stroke="#c00" stroke-width="2.5" marker-end="url(#redArr)"/>
  <text x="416" y="224" font-size="9" fill="#888" text-anchor="middle">T_plate</text>

  <!-- R_plate block -->
  <rect x="446" y="140" width="90" height="60" rx="4" fill="#d0f0d0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="491" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">R_plate</text>
  <text x="491" y="178" text-anchor="middle" font-size="9" fill="#555">0.5–2 K/W</text>
  <line x1="536" y1="170" x2="565" y2="170" stroke="#c00" stroke-width="2.5" marker-end="url(#redArr)"/>

  <!-- R_conv block -->
  <rect x="566" y="135" width="90" height="70" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="611" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#003a7a">R_conv</text>
  <text x="611" y="175" text-anchor="middle" font-size="9" fill="#555">1–5 K/W</text>
  <text x="611" y="190" text-anchor="middle" font-size="9" fill="#555">Convection</text>
  <line x1="656" y1="170" x2="685" y2="170" stroke="#1a6eb5" stroke-width="2.5" marker-end="url(#blueArr)"/>

  <!-- Coolant sink -->
  <rect x="686" y="120" width="90" height="100" rx="6" fill="#a0c8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="731" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#003a7a">Coolant</text>
  <text x="731" y="175" text-anchor="middle" font-size="10" fill="#333">T_coolant</text>
  <text x="731" y="190" text-anchor="middle" font-size="10" fill="#333">(heat sink)</text>
  <!-- coolant flow arrows -->
  <path d="M686,148 Q670,148 670,160 Q670,172 686,172" stroke="#1a6eb5" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>

  <!-- total resistance formula box -->
  <rect x="86" y="252" width="694" height="50" rx="6" fill="#f0f0ff" stroke="#5555cc" stroke-width="1.5"/>
  <text x="433" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">R_total = R_cell + R_TIM + R_plate + R_conv</text>
  <text x="433" y="292" text-anchor="middle" font-size="11" fill="#555">ΔT = Q̇ × R_total   |   where Q̇ = I²R (heat generated in cell, Watts)</text>

  <!-- TIM callout -->
  <rect x="86" y="315" width="694" height="50" rx="6" fill="#fff8e0" stroke="#e0a000" stroke-width="1.5"/>
  <text x="433" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5000">⚠ TIM is often the thermal bottleneck</text>
  <text x="433" y="352" text-anchor="middle" font-size="10" fill="#555">Air gap thermal conductivity: ~0.025 W/m·K  |  Good TIM: 4–10 W/m·K  |  Choosing TIM is a critical design decision</text>

  <!-- hot/cold label -->
  <text x="100" y="108" font-size="10" fill="#c00" font-weight="bold">HOT</text>
  <text x="730" y="108" font-size="10" fill="#1a6eb5" font-weight="bold" text-anchor="middle">COLD</text>
  <!-- gradient bar -->
  <defs>
    <linearGradient id="heatGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#6699ff"/>
    </linearGradient>
  </defs>
  <rect x="86" y="240" width="694" height="8" rx="3" fill="url(#heatGrad)"/>
</svg>