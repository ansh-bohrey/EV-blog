<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="700" height="500" fill="white"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Li-ion Cell Cross-Section</text>

  <!-- ======== LAYER STACK (x range 60–460, y range 60–430) ======== -->

  <!-- Layer 1: Copper foil (anode current collector) -->
  <rect x="60" y="60" width="28" height="370" fill="#b87333" stroke="#7a4a1a" stroke-width="1"/>

  <!-- Layer 2: Graphite anode coating -->
  <rect x="88" y="60" width="72" height="370" fill="#888" stroke="#555" stroke-width="0.5"/>

  <!-- Layer 3: Separator (porous PE/PP) — light blue with dot pattern -->
  <rect x="160" y="60" width="36" height="370" fill="#d0eaf8" stroke="#90c0e0" stroke-width="0.5"/>
  <!-- Dots to indicate porosity -->
  <g fill="#70a8cc" opacity="0.7">
    <circle cx="168" cy="80"  r="2.5"/><circle cx="180" cy="80"  r="2.5"/><circle cx="188" cy="80"  r="2.5"/>
    <circle cx="164" cy="96"  r="2.5"/><circle cx="175" cy="96"  r="2.5"/><circle cx="186" cy="96"  r="2.5"/>
    <circle cx="168" cy="112" r="2.5"/><circle cx="180" cy="112" r="2.5"/><circle cx="188" cy="112" r="2.5"/>
    <circle cx="164" cy="128" r="2.5"/><circle cx="175" cy="128" r="2.5"/><circle cx="186" cy="128" r="2.5"/>
    <circle cx="168" cy="144" r="2.5"/><circle cx="180" cy="144" r="2.5"/><circle cx="188" cy="144" r="2.5"/>
    <circle cx="164" cy="160" r="2.5"/><circle cx="175" cy="160" r="2.5"/><circle cx="186" cy="160" r="2.5"/>
    <circle cx="168" cy="176" r="2.5"/><circle cx="180" cy="176" r="2.5"/><circle cx="188" cy="176" r="2.5"/>
    <circle cx="164" cy="192" r="2.5"/><circle cx="175" cy="192" r="2.5"/><circle cx="186" cy="192" r="2.5"/>
    <circle cx="168" cy="208" r="2.5"/><circle cx="180" cy="208" r="2.5"/><circle cx="188" cy="208" r="2.5"/>
    <circle cx="164" cy="224" r="2.5"/><circle cx="175" cy="224" r="2.5"/><circle cx="186" cy="224" r="2.5"/>
    <circle cx="168" cy="240" r="2.5"/><circle cx="180" cy="240" r="2.5"/><circle cx="188" cy="240" r="2.5"/>
    <circle cx="164" cy="256" r="2.5"/><circle cx="175" cy="256" r="2.5"/><circle cx="186" cy="256" r="2.5"/>
    <circle cx="168" cy="272" r="2.5"/><circle cx="180" cy="272" r="2.5"/><circle cx="188" cy="272" r="2.5"/>
    <circle cx="164" cy="288" r="2.5"/><circle cx="175" cy="288" r="2.5"/><circle cx="186" cy="288" r="2.5"/>
    <circle cx="168" cy="304" r="2.5"/><circle cx="180" cy="304" r="2.5"/><circle cx="188" cy="304" r="2.5"/>
    <circle cx="164" cy="320" r="2.5"/><circle cx="175" cy="320" r="2.5"/><circle cx="186" cy="320" r="2.5"/>
    <circle cx="168" cy="336" r="2.5"/><circle cx="180" cy="336" r="2.5"/><circle cx="188" cy="336" r="2.5"/>
    <circle cx="164" cy="352" r="2.5"/><circle cx="175" cy="352" r="2.5"/><circle cx="186" cy="352" r="2.5"/>
    <circle cx="168" cy="368" r="2.5"/><circle cx="180" cy="368" r="2.5"/><circle cx="188" cy="368" r="2.5"/>
    <circle cx="164" cy="384" r="2.5"/><circle cx="175" cy="384" r="2.5"/><circle cx="186" cy="384" r="2.5"/>
    <circle cx="168" cy="400" r="2.5"/><circle cx="180" cy="400" r="2.5"/><circle cx="188" cy="400" r="2.5"/>
    <circle cx="164" cy="416" r="2.5"/><circle cx="175" cy="416" r="2.5"/><circle cx="186" cy="416" r="2.5"/>
  </g>

  <!-- Layer 4: Cathode coating (NMC/LFP) -->
  <rect x="196" y="60" width="72" height="370" fill="#2a9d8f" stroke="#1a7060" stroke-width="0.5"/>

  <!-- Layer 5: Aluminum foil (cathode current collector) -->
  <rect x="268" y="60" width="20" height="370" fill="#c0c0c0" stroke="#999" stroke-width="0.5"/>

  <!-- ======== EXTERNAL CIRCUIT TABS ======== -->
  <!-- Anode tab (negative, top-left) -->
  <rect x="60" y="40" width="60" height="22" rx="3" fill="#b87333" stroke="#7a4a1a" stroke-width="1.5"/>
  <text x="90" y="55" text-anchor="middle" font-size="10" fill="white" font-weight="bold">− (Anode tab)</text>

  <!-- Cathode tab (positive, top-right of layers) -->
  <rect x="228" y="40" width="60" height="22" rx="3" fill="#c0c0c0" stroke="#888" stroke-width="1.5"/>
  <text x="258" y="55" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">+ (Cathode tab)</text>

  <!-- External circuit wire + electron arrow -->
  <path d="M 90 40 L 90 20 L 258 20 L 258 40" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Electron flow arrow (rightward on top wire) -->
  <polygon points="174,14 166,20 174,26" fill="#e76f51" stroke="#e76f51"/>
  <text x="174" y="12" text-anchor="middle" font-size="11" fill="#e76f51" font-weight="bold">e⁻ (discharge)</text>
  <!-- Reverse electron arrow for charging (leftward) -->
  <polygon points="134,14 142,8 142,20" fill="#457b9d" stroke="#457b9d"/>
  <text x="115" y="8" text-anchor="middle" font-size="10" fill="#457b9d">e⁻ (charge)</text>

  <!-- ======== Li+ ION ARROWS ======== -->
  <!-- Charging: Li+ moves right (anode to cathode, i.e. left to right in this diagram) -->
  <g stroke="#e76f51" stroke-width="2" fill="#e76f51">
    <line x1="130" y1="180" x2="205" y2="180"/>
    <polygon points="205,175 215,180 205,185"/>
  </g>
  <text x="162" y="172" text-anchor="middle" font-size="10" fill="#e76f51" font-weight="bold">Li⁺ (charging)</text>

  <!-- Discharging: Li+ moves left (cathode to anode) -->
  <g stroke="#2a9d8f" stroke-width="2" fill="#2a9d8f">
    <line x1="208" y1="260" x2="133" y2="260"/>
    <polygon points="133,255 123,260 133,265"/>
  </g>
  <text x="168" y="278" text-anchor="middle" font-size="10" fill="#2a9d8f" font-weight="bold">Li⁺ (discharging)</text>

  <!-- Li+ passing through separator indicator -->
  <g stroke="#70a8cc" stroke-width="1.5" stroke-dasharray="4,2" fill="#70a8cc">
    <line x1="163" y1="210" x2="193" y2="210"/>
    <polygon points="193,206 200,210 193,214"/>
  </g>
  <text x="178" y="205" text-anchor="middle" font-size="8" fill="#457b9d">via pores</text>

  <!-- ======== LABELS (leader lines to right side) ======== -->
  <!-- Right side label panel starts at x=310 -->

  <!-- 1. Copper foil label -->
  <line x1="88" y1="100" x2="310" y2="100" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="315" y="97" font-size="12" fill="#7a4a1a" font-weight="bold">Anode Current Collector (Cu)</text>
  <rect x="60" y="65" width="26" height="12" fill="none" stroke="#b87333" stroke-width="1.5"/>

  <!-- 2. Graphite anode label -->
  <line x1="160" y1="150" x2="310" y2="150" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="315" y="147" font-size="12" fill="#444" font-weight="bold">Anode (Graphite)</text>
  <text x="315" y="163" font-size="10" fill="#666">Li intercalation: LiC₆</text>

  <!-- 3. Separator label -->
  <line x1="196" y1="200" x2="310" y2="200" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="315" y="197" font-size="12" fill="#457b9d" font-weight="bold">Separator (porous PE/PP)</text>
  <text x="315" y="213" font-size="10" fill="#666">Allows Li⁺, blocks electrons</text>

  <!-- 4. Cathode label -->
  <line x1="268" y1="300" x2="310" y2="300" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="315" y="297" font-size="12" fill="#1a7060" font-weight="bold">Cathode (NMC/LFP)</text>
  <text x="315" y="313" font-size="10" fill="#666">Li₁₋ₓNiMnCoO₂ or LiFePO₄</text>

  <!-- 5. Aluminum foil label -->
  <line x1="288" y1="370" x2="310" y2="370" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="315" y="367" font-size="12" fill="#666" font-weight="bold">Cathode Current Collector (Al)</text>

  <!-- ======== ELECTROLYTE LABEL (overlaid on separator region) ======== -->
  <text x="178" y="340" text-anchor="middle" font-size="9" fill="#1a3a5c" transform="rotate(-90,178,340)">← Electrolyte fills pores →</text>

  <!-- ======== OUTER BORDER ======== -->
  <rect x="60" y="60" width="228" height="370" fill="none" stroke="#333" stroke-width="2" rx="2"/>

  <!-- Bottom scale bar -->
  <line x1="60" y1="450" x2="288" y2="450" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="445" x2="60" y2="455" stroke="#555" stroke-width="1.5"/>
  <line x1="288" y1="445" x2="288" y2="455" stroke="#555" stroke-width="1.5"/>
  <text x="174" y="468" text-anchor="middle" font-size="10" fill="#555">~100–200 µm total layer stack thickness</text>

  <!-- ======== LEGEND ======== -->
  <rect x="380" y="370" width="290" height="110" rx="6" fill="#f4f8fc" stroke="#ccd" stroke-width="1"/>
  <text x="390" y="388" font-size="11" font-weight="bold" fill="#1a1a2e">Legend</text>
  <rect x="390" y="396" width="14" height="10" fill="#b87333"/><text x="410" y="405" font-size="10" fill="#333">Copper (Cu) — Anode collector</text>
  <rect x="390" y="411" width="14" height="10" fill="#888"/><text x="410" y="420" font-size="10" fill="#333">Graphite — Anode active material</text>
  <rect x="390" y="426" width="14" height="10" fill="#d0eaf8" stroke="#90c0e0"/><text x="410" y="435" font-size="10" fill="#333">Separator (PE/PP)</text>
  <rect x="390" y="441" width="14" height="10" fill="#2a9d8f"/><text x="410" y="450" font-size="10" fill="#333">Cathode active material (NMC/LFP)</text>
  <rect x="390" y="456" width="14" height="10" fill="#c0c0c0" stroke="#999"/><text x="410" y="465" font-size="10" fill="#333">Aluminum (Al) — Cathode collector</text>

</svg>
