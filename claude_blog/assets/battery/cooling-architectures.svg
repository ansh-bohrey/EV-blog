<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="960" height="520" fill="#f8f9fa"/>
  <text x="480" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a2e">Battery Cooling Architectures</text>

  <!-- ── PASSIVE (left) ── -->
  <rect x="30" y="50" width="270" height="280" rx="10" fill="white" stroke="#aaa" stroke-width="2"/>
  <text x="165" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">Passive Air Cooling</text>
  <!-- module outline -->
  <rect x="60" y="90" width="210" height="160" rx="6" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <!-- cells inside -->
  <rect x="75"  y="105" width="25" height="130" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="107" y="105" width="25" height="130" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="139" y="105" width="25" height="130" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="171" y="105" width="25" height="130" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="203" y="105" width="25" height="130" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <!-- convection arrows (wavy up) -->
  <path d="M87 90 Q82 78 87 66 Q92 54 87 42" stroke="#e07b00" stroke-width="1.8" fill="none" stroke-dasharray="4,2"/>
  <path d="M120 90 Q115 78 120 66 Q125 54 120 42" stroke="#e07b00" stroke-width="1.8" fill="none" stroke-dasharray="4,2"/>
  <path d="M153 90 Q148 78 153 66 Q158 54 153 42" stroke="#e07b00" stroke-width="1.8" fill="none" stroke-dasharray="4,2"/>
  <path d="M186 90 Q181 78 186 66 Q191 54 186 42" stroke="#e07b00" stroke-width="1.8" fill="none" stroke-dasharray="4,2"/>
  <text x="165" y="34" text-anchor="middle" font-size="9" fill="#e07b00">Heat lost by natural convection</text>
  <!-- pros/cons -->
  <rect x="40" y="262" width="250" height="60" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="55" y="277" font-size="10" fill="#2a7a2a">+ Zero cost, zero complexity</text>
  <text x="55" y="291" font-size="10" fill="#c00000">− No control, no heating</text>
  <text x="55" y="305" font-size="10" fill="#c00000">− Fails in hot or cold climates</text>
  <text x="165" y="338" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Use: e-bikes, low-power storage</text>

  <!-- ── AIR COOLING (centre) ── -->
  <rect x="340" y="50" width="280" height="280" rx="10" fill="white" stroke="#aaa" stroke-width="2"/>
  <text x="480" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6eb5">Forced Air Cooling</text>
  <!-- fan symbol -->
  <circle cx="375" cy="170" r="28" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="375" y="166" text-anchor="middle" font-size="18" fill="#1a6eb5">⟳</text>
  <text x="375" y="180" text-anchor="middle" font-size="9" fill="#1a6eb5">FAN</text>
  <!-- module outline with channels -->
  <rect x="410" y="90" width="195" height="160" rx="6" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <!-- cells with gaps for airflow -->
  <rect x="418" y="100" width="22" height="140" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="450" y="100" width="22" height="140" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="482" y="100" width="22" height="140" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="514" y="100" width="22" height="140" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="546" y="100" width="22" height="140" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <!-- airflow arrows through gaps -->
  <line x1="404" y1="135" x2="413" y2="135" stroke="#1a6eb5" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="404" y1="170" x2="413" y2="170" stroke="#1a6eb5" stroke-width="1.5"/>
  <!-- gradient: inlet blue → outlet orange to show ΔT -->
  <defs>
    <linearGradient id="airGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0d0ff"/>
      <stop offset="100%" stop-color="#ffb870"/>
    </linearGradient>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1a6eb5"/>
    </marker>
  </defs>
  <rect x="410" y="245" width="195" height="5" rx="2" fill="url(#airGrad)"/>
  <text x="412" y="258" font-size="9" fill="#1a6eb5">Cool inlet</text>
  <text x="560" y="258" font-size="9" fill="#e07b00" text-anchor="end">Warm outlet</text>
  <text x="505" y="265" text-anchor="middle" font-size="9" fill="#777">ΔT gradient along airflow</text>
  <!-- airflow arrows out right -->
  <line x1="605" y1="135" x2="618" y2="135" stroke="#e07b00" stroke-width="1.5"/>
  <line x1="605" y1="170" x2="618" y2="170" stroke="#e07b00" stroke-width="1.5"/>

  <rect x="350" y="262" width="260" height="60" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="365" y="277" font-size="10" fill="#2a7a2a">+ Simple, low cost</text>
  <text x="365" y="291" font-size="10" fill="#c00000">− Non-uniform temp (inlet vs outlet)</text>
  <text x="365" y="305" font-size="10" fill="#c00000">− Not suitable for fast charging</text>
  <text x="480" y="338" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Use: Nissan Leaf Gen 1</text>

  <!-- ── LIQUID COOLING (right) ── -->
  <rect x="660" y="50" width="280" height="280" rx="10" fill="white" stroke="#aaa" stroke-width="2"/>
  <text x="800" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a7a50">Liquid Cooling Plate</text>
  <!-- cells -->
  <rect x="680" y="90" width="240" height="135" rx="6" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <rect x="690" y="100" width="28" height="115" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="726" y="100" width="28" height="115" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="762" y="100" width="28" height="115" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="798" y="100" width="28" height="115" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <rect x="834" y="100" width="28" height="115" rx="3" fill="#b0c4de" stroke="#666" stroke-width="1"/>
  <!-- TIM layer -->
  <rect x="680" y="225" width="240" height="8" rx="2" fill="#ffdc80" stroke="#c8a000" stroke-width="1"/>
  <text x="800" y="221" text-anchor="middle" font-size="9" fill="#c8a000">TIM (Thermal Interface Material)</text>
  <!-- cooling plate with serpentine channel -->
  <rect x="680" y="233" width="240" height="32" rx="4" fill="#a0d8b0" stroke="#1a7a50" stroke-width="1.5"/>
  <!-- serpentine channel dashes -->
  <path d="M695 242 L870 242 L870 250 L695 250 L695 258 L870 258" stroke="#1a7a50" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <!-- coolant in/out -->
  <line x1="680" y1="249" x2="655" y2="249" stroke="#1a6eb5" stroke-width="3"/>
  <text x="650" y="245" text-anchor="end" font-size="10" fill="#1a6eb5" font-weight="bold">IN</text>
  <line x1="920" y1="249" x2="938" y2="249" stroke="#e07b00" stroke-width="3"/>
  <text x="942" y="253" font-size="10" fill="#e07b00" font-weight="bold">OUT</text>
  <text x="800" y="276" text-anchor="middle" font-size="9" fill="#1a7a50">Serpentine coolant channel (50:50 water-glycol)</text>

  <rect x="668" y="285" width="260" height="48" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="683" y="300" font-size="10" fill="#2a7a2a">+ Precise temp control, can heat &amp; cool</text>
  <text x="683" y="314" font-size="10" fill="#2a7a2a">+ Uniform temperature, supports fast charge</text>
  <text x="683" y="328" font-size="10" fill="#c00000">− Higher cost and system complexity</text>
  <text x="800" y="348" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Use: Tesla, VW MEB, GM Ultium, Hyundai E-GMP</text>

  <!-- Heat path annotation for liquid -->
  <text x="800" y="382" text-anchor="middle" font-size="10" fill="#333">Heat path: Cell → TIM → Cooling plate → Coolant</text>

  <!-- Nissan leaf note for air -->
  <rect x="30" y="370" width="600" height="110" rx="8" fill="#fff8e7" stroke="#e0c060" stroke-width="1.5"/>
  <text x="330" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5000">Why Nissan Leaf (Gen 1) degraded faster in hot climates</text>
  <text x="330" y="408" text-anchor="middle" font-size="10" fill="#555">Air cooling cannot remove heat fast enough in Arizona/Texas summers (ambient 40°C+)</text>
  <text x="330" y="423" text-anchor="middle" font-size="10" fill="#555">Cell temperatures regularly exceeded 40°C → SEI growth rate doubles per 10°C rise</text>
  <text x="330" y="438" text-anchor="middle" font-size="10" fill="#555">No battery heater either → cold morning lithium plating risk during fast charge</text>
  <text x="330" y="453" text-anchor="middle" font-size="10" fill="#c00">Result: 20–30% faster capacity fade vs liquid-cooled Tesla in same climate</text>
  <text x="330" y="468" text-anchor="middle" font-size="10" fill="#2a7a2a">Fix (Gen 2+): Added optional liquid cooling in some markets</text>
</svg>