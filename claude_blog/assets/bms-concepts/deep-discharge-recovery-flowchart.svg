<svg viewBox="0 0 620 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="620" height="700" fill="#f8f9fa"/>
  <text x="310" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Deep Discharge — Detection, Protection &amp; Recovery</text>

  <defs>
    <marker id="ddarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="310" cy="65" rx="90" ry="22" fill="#2a8a2a" stroke="#1a5a1a" stroke-width="2"/>
  <text x="310" y="70" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Normal Operation</text>
  <line x1="310" y1="87" x2="310" y2="112" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>

  <!-- Decision: V < 3.0V? -->
  <polygon points="310,113 430,148 310,183 190,148" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="310" y="143" text-anchor="middle" font-size="11" fill="#5a4000">V_cell &lt; 3.0 V?</text>
  <text x="310" y="157" text-anchor="middle" font-size="9" fill="#5a4000">(early warning threshold)</text>

  <!-- NO path right -->
  <line x1="430" y1="148" x2="490" y2="148" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>
  <text x="460" y="143" text-anchor="middle" font-size="10" fill="#2a8a2a" font-weight="bold">NO</text>
  <line x1="490" y1="148" x2="490" y2="65" stroke="#555" stroke-width="1.5"/>
  <line x1="490" y1="65" x2="400" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#ddarr)"/>
  <text x="530" y="108" font-size="9" fill="#2a8a2a" text-anchor="middle">Continue</text>

  <!-- YES path down -->
  <line x1="310" y1="183" x2="310" y2="210" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>
  <text x="326" y="202" font-size="10" fill="#c00000" font-weight="bold">YES</text>

  <!-- Action: Warn + reduce load -->
  <rect x="160" y="211" width="300" height="50" rx="6" fill="#fff0d0" stroke="#e07b00" stroke-width="2"/>
  <text x="310" y="230" text-anchor="middle" font-size="11" fill="#7a3a00" font-weight="bold">Issue CAN warning to VCU</text>
  <text x="310" y="246" text-anchor="middle" font-size="10" fill="#555">Reduce SOP (limit discharge power)</text>
  <text x="310" y="258" text-anchor="middle" font-size="9" fill="#888">e.g. restrict to 20% of rated power</text>
  <line x1="310" y1="261" x2="310" y2="285" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>

  <!-- Decision: V < 2.7V (hard limit) -->
  <polygon points="310,286 430,316 310,346 190,316" fill="#ffcccc" stroke="#c00" stroke-width="2"/>
  <text x="310" y="311" text-anchor="middle" font-size="11" fill="#800">V_cell &lt; 2.7 V?</text>
  <text x="310" y="324" text-anchor="middle" font-size="9" fill="#800">(hard cutoff — Cu dissolution risk)</text>

  <!-- NO path -->
  <line x1="190" y1="316" x2="120" y2="316" stroke="#555" stroke-width="1.5" marker-end="url(#ddarr)"/>
  <text x="155" y="310" text-anchor="middle" font-size="10" fill="#2a8a2a" font-weight="bold">NO</text>
  <rect x="25" y="295" width="95" height="42" rx="5" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="72" y="314" text-anchor="middle" font-size="9" fill="#1a5a1a">Stay in</text>
  <text x="72" y="327" text-anchor="middle" font-size="9" fill="#1a5a1a">warning mode</text>

  <!-- YES path down -->
  <line x1="310" y1="346" x2="310" y2="372" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>
  <text x="326" y="365" font-size="10" fill="#c00000" font-weight="bold">YES</text>

  <!-- OPEN DSG FET -->
  <rect x="150" y="373" width="320" height="52" rx="6" fill="#ffcccc" stroke="#c00" stroke-width="2"/>
  <text x="310" y="393" text-anchor="middle" font-size="12" font-weight="bold" fill="#900">Open DSG FET Immediately</text>
  <text x="310" y="410" text-anchor="middle" font-size="10" fill="#555">Discharge circuit open — pack offline</text>
  <text x="310" y="422" text-anchor="middle" font-size="9" fill="#888">Log fault code: UNDERVOLT_HARD</text>
  <line x1="310" y1="425" x2="310" y2="450" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>

  <!-- Recovery flowchart begins -->
  <polygon points="310,451 430,481 310,511 190,481" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="310" y="476" text-anchor="middle" font-size="11" fill="#5a4000">External charger</text>
  <text x="310" y="490" text-anchor="middle" font-size="9" fill="#5a4000">connected?</text>

  <!-- NO -->
  <line x1="190" y1="481" x2="100" y2="481" stroke="#555" stroke-width="1.5" marker-end="url(#ddarr)"/>
  <text x="145" y="476" text-anchor="middle" font-size="10" fill="#c00" font-weight="bold">NO</text>
  <rect x="15" y="461" width="85" height="40" rx="5" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="57" y="479" text-anchor="middle" font-size="9" fill="#802000">Remain</text>
  <text x="57" y="492" text-anchor="middle" font-size="9" fill="#802000">in fault</text>

  <!-- YES -->
  <line x1="310" y1="511" x2="310" y2="535" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>
  <text x="326" y="530" font-size="10" fill="#2a8a2a" font-weight="bold">YES</text>

  <!-- Pre-charge trickle -->
  <rect x="150" y="536" width="320" height="52" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="310" y="556" text-anchor="middle" font-size="11" font-weight="bold" fill="#003a7a">Trickle Pre-charge</text>
  <text x="310" y="571" text-anchor="middle" font-size="10" fill="#333">C/20 (very slow) until V_cell &gt; 2.9V</text>
  <text x="310" y="583" text-anchor="middle" font-size="9" fill="#555">Monitor temp — abort if T rises rapidly</text>
  <line x1="310" y1="588" x2="310" y2="610" stroke="#555" stroke-width="2" marker-end="url(#ddarr)"/>

  <!-- Resume normal charging -->
  <rect x="170" y="611" width="280" height="42" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="310" y="629" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">Resume CC-CV charging</text>
  <text x="310" y="645" text-anchor="middle" font-size="10" fill="#555">Flag SOH check required next cycle</text>

  <!-- Right side note: copper dissolution warning -->
  <rect x="470" y="373" width="140" height="90" rx="6" fill="#fff0f0" stroke="#c00" stroke-width="1.5"/>
  <text x="540" y="390" text-anchor="middle" font-size="9" font-weight="bold" fill="#c00">⚠ Below 2.5V:</text>
  <text x="540" y="405" text-anchor="middle" font-size="9" fill="#555">Cu current collector</text>
  <text x="540" y="418" text-anchor="middle" font-size="9" fill="#555">dissolves into</text>
  <text x="540" y="431" text-anchor="middle" font-size="9" fill="#555">electrolyte →</text>
  <text x="540" y="444" text-anchor="middle" font-size="9" fill="#c00">shorts on recharge</text>
  <text x="540" y="457" text-anchor="middle" font-size="9" fill="#555">Cell is unsafe to use</text>
</svg>
