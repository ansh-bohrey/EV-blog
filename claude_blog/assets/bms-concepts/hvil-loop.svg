<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="520" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">HVIL — High Voltage Interlock Loop</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#555">A low-voltage safety circuit that detects open HV connectors and opens contactors before anyone touches a live pin</text>

  <defs>
    <marker id="hviarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a6eb5"/>
    </marker>
    <marker id="hviarr_r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c00"/>
    </marker>
  </defs>

  <!-- HVIL source in BMS -->
  <rect x="30" y="210" width="130" height="70" rx="8" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="95" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#330080">BMS MCU</text>
  <text x="95" y="249" text-anchor="middle" font-size="9" fill="#333">HVIL source:</text>
  <text x="95" y="262" text-anchor="middle" font-size="9" fill="#333">12V / ~10 mA</text>
  <text x="95" y="274" text-anchor="middle" font-size="9" fill="#555">Monitors return signal</text>

  <!-- HVIL wire going out (right from BMS) -->
  <line x1="160" y1="235" x2="205" y2="235" stroke="#1a6eb5" stroke-width="2.5" marker-end="url(#hviarr)"/>
  <text x="182" y="228" text-anchor="middle" font-size="8" fill="#1a6eb5">12V pilot</text>

  <!-- Connector 1: Battery pack connector -->
  <rect x="206" y="210" width="90" height="70" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="251" y="232" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">Pack</text>
  <text x="251" y="246" text-anchor="middle" font-size="9" fill="#003a7a">Connector</text>
  <!-- HVIL pin inside connector — looped -->
  <path d="M218,258 L218,270 L285,270 L285,258" stroke="#1a6eb5" stroke-width="2" fill="none"/>
  <text x="251" y="267" text-anchor="middle" font-size="8" fill="#1a6eb5">loop pin</text>

  <!-- wire continues to Connector 2 -->
  <line x1="296" y1="245" x2="335" y2="245" stroke="#1a6eb5" stroke-width="2.5" marker-end="url(#hviarr)"/>

  <!-- Connector 2: Inverter connector -->
  <rect x="336" y="210" width="90" height="70" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="381" y="232" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">Inverter</text>
  <text x="381" y="246" text-anchor="middle" font-size="9" fill="#003a7a">Connector</text>
  <path d="M348,258 L348,270 L415,270 L415,258" stroke="#1a6eb5" stroke-width="2" fill="none"/>
  <text x="381" y="267" text-anchor="middle" font-size="8" fill="#1a6eb5">loop pin</text>

  <!-- wire to Connector 3: OBC -->
  <line x1="426" y1="245" x2="465" y2="245" stroke="#1a6eb5" stroke-width="2.5" marker-end="url(#hviarr)"/>

  <!-- Connector 3: OBC -->
  <rect x="466" y="210" width="90" height="70" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="511" y="232" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">OBC</text>
  <text x="511" y="246" text-anchor="middle" font-size="9" fill="#003a7a">Connector</text>
  <path d="M478,258 L478,270 L545,270 L545,258" stroke="#1a6eb5" stroke-width="2" fill="none"/>
  <text x="511" y="267" text-anchor="middle" font-size="8" fill="#1a6eb5">loop pin</text>

  <!-- wire to Connector 4: Service disconnect -->
  <line x1="556" y1="245" x2="595" y2="245" stroke="#1a6eb5" stroke-width="2.5" marker-end="url(#hviarr)"/>

  <!-- Connector 4: Service disconnect plug -->
  <rect x="596" y="210" width="110" height="70" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="651" y="232" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">Service</text>
  <text x="651" y="246" text-anchor="middle" font-size="9" fill="#003a7a">Disconnect</text>
  <path d="M608,258 L608,270 L695,270 L695,258" stroke="#1a6eb5" stroke-width="2" fill="none"/>
  <text x="651" y="267" text-anchor="middle" font-size="8" fill="#1a6eb5">loop pin</text>

  <!-- Return wire back to BMS (along bottom) -->
  <line x1="706" y1="245" x2="740" y2="245" stroke="#2a8a2a" stroke-width="2.5"/>
  <line x1="740" y1="245" x2="740" y2="320" stroke="#2a8a2a" stroke-width="2.5"/>
  <line x1="740" y1="320" x2="30" y2="320" stroke="#2a8a2a" stroke-width="2.5"/>
  <line x1="30" y1="320" x2="30" y2="270" stroke="#2a8a2a" stroke-width="2.5" marker-end="url(#hviarr)"/>
  <text x="385" y="338" text-anchor="middle" font-size="9" fill="#2a8a2a" font-weight="bold">HVIL return (12V seen → loop intact)</text>

  <!-- Broken connector scenario (bottom left) -->
  <rect x="30" y="360" width="360" height="110" rx="8" fill="#fff0f0" stroke="#c00" stroke-width="2"/>
  <text x="210" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#c00">Scenario A: Connector Unplugged</text>
  <!-- Small diagram: break in wire -->
  <line x1="50" y1="415" x2="100" y2="415" stroke="#1a6eb5" stroke-width="2"/>
  <rect x="101" y="402" width="50" height="26" rx="3" fill="white" stroke="#c00" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="126" y="419" text-anchor="middle" font-size="10" fill="#c00">OPEN</text>
  <line x1="151" y1="415" x2="200" y2="415" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="280" y="400" text-anchor="middle" font-size="9" fill="#c00">HVIL return = 0V</text>
  <text x="280" y="415" text-anchor="middle" font-size="9" fill="#555">BMS detects: no 12V return</text>
  <text x="280" y="430" text-anchor="middle" font-size="9" fill="#c00">→ Open all contactors in &lt;1 ms</text>
  <text x="280" y="445" text-anchor="middle" font-size="9" fill="#555">HV never present on disconnected pin</text>
  <text x="210" y="462" text-anchor="middle" font-size="9" fill="#555">This is the core safety guarantee of HVIL</text>

  <!-- Service mode scenario -->
  <rect x="410" y="360" width="370" height="110" rx="8" fill="#fff8e0" stroke="#e07b00" stroke-width="2"/>
  <text x="595" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5000">Scenario B: Service Disconnect Pulled</text>
  <text x="420" y="400" font-size="9" fill="#333">Service technician pulls the orange service plug → breaks HVIL loop</text>
  <text x="420" y="415" font-size="9" fill="#c00">→ Contactors open immediately (within 1 ms)</text>
  <text x="420" y="430" font-size="9" fill="#333">Pack HV is isolated before any manual work</text>
  <text x="420" y="445" font-size="9" fill="#555">Additional wait: 5 min discharge time for inverter bus caps</text>
  <text x="420" y="460" font-size="9" fill="#555">Check with CAT III multimeter before touching any orange wire</text>

  <!-- Standards note -->
  <rect x="30" y="485" width="750" height="28" rx="5" fill="#f0f0ff" stroke="#5555cc" stroke-width="1"/>
  <text x="405" y="503" text-anchor="middle" font-size="10" fill="#333">HVIL required by: ISO 6469-3, IEC 62196 (Type 2 connector), FMVSS 305, UN GTR 20 — all mandate connector-level interlock for &gt;60V DC systems</text>
</svg>
