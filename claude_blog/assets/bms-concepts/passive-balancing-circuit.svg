<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="500" fill="white"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Passive Balancing Circuit — 4-Cell Series Pack</text>

  <!-- ===== CELL STACK (left column) ===== -->
  <!-- Positive terminal of stack -->
  <rect x="95" y="55" width="50" height="10" rx="2" fill="#2c3e50"/>
  <text x="120" y="63" text-anchor="middle" font-size="9" fill="#ffffff">+</text>
  <line x1="120" y1="65" x2="120" y2="78"/>

  <!-- Cell 1 — highest V, switch CLOSED -->
  <rect x="85" y="78" width="70" height="50" rx="4" fill="#fef9e7" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="120" y="98" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">Cell 1</text>
  <text x="120" y="112" text-anchor="middle" font-size="9" fill="#e74c3c">4.18V ▲ HIGH</text>
  <line x1="120" y1="128" x2="120" y2="140" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- Cell 2 -->
  <rect x="85" y="140" width="70" height="50" rx="4" fill="#eaf4fb" stroke="#2c3e50" stroke-width="2"/>
  <text x="120" y="160" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">Cell 2</text>
  <text x="120" y="174" text-anchor="middle" font-size="9" fill="#2c3e50">4.05V</text>
  <line x1="120" y1="190" x2="120" y2="202" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- Cell 3 -->
  <rect x="85" y="202" width="70" height="50" rx="4" fill="#eaf4fb" stroke="#2c3e50" stroke-width="2"/>
  <text x="120" y="222" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">Cell 3</text>
  <text x="120" y="236" text-anchor="middle" font-size="9" fill="#2c3e50">4.08V</text>
  <line x1="120" y1="252" x2="120" y2="264" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- Cell 4 -->
  <rect x="85" y="264" width="70" height="50" rx="4" fill="#eaf4fb" stroke="#2c3e50" stroke-width="2"/>
  <text x="120" y="284" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">Cell 4</text>
  <text x="120" y="298" text-anchor="middle" font-size="9" fill="#2c3e50">4.10V</text>

  <!-- Negative terminal of stack -->
  <line x1="120" y1="314" x2="120" y2="327" stroke="#2c3e50" stroke-width="1.5"/>
  <rect x="95" y="327" width="50" height="10" rx="2" fill="#2c3e50"/>
  <text x="120" y="335" text-anchor="middle" font-size="9" fill="#ffffff">−</text>

  <!-- ===== BLEED BRANCHES (parallel to each cell) ===== -->
  <!-- CELL 1 BRANCH — ACTIVE (switch closed) -->
  <!-- Tap lines from cell terminals -->
  <line x1="155" y1="88" x2="195" y2="88" stroke="#e74c3c" stroke-width="2"/>
  <line x1="155" y1="128" x2="195" y2="128" stroke="#e74c3c" stroke-width="2"/>

  <!-- Vertical wire left side of branch -->
  <line x1="195" y1="88" x2="195" y2="100" stroke="#e74c3c" stroke-width="2"/>

  <!-- MOSFET symbol Cell 1 (closed = conducting) -->
  <!-- Gate, source, drain lines -->
  <line x1="195" y1="100" x2="215" y2="100" stroke="#e74c3c" stroke-width="2"/><!-- drain lead -->
  <line x1="215" y1="96" x2="215" y2="116" stroke="#e74c3c" stroke-width="2.5"/><!-- drain bar -->
  <line x1="218" y1="98" x2="218" y2="114" stroke="#e74c3c" stroke-width="1.5"/><!-- gate insulator gap -->
  <line x1="222" y1="99" x2="222" y2="106" stroke="#e74c3c" stroke-width="2"/><!-- top source segment -->
  <line x1="222" y1="109" x2="222" y2="115" stroke="#e74c3c" stroke-width="2"/><!-- bottom source segment -->
  <line x1="222" y1="103" x2="230" y2="103" stroke="#e74c3c" stroke-width="2"/><!-- source drain tap top -->
  <line x1="222" y1="112" x2="230" y2="112" stroke="#e74c3c" stroke-width="2"/><!-- source drain tap bot -->
  <line x1="230" y1="103" x2="230" y2="112" stroke="#e74c3c" stroke-width="2"/><!-- output merge -->
  <line x1="230" y1="107" x2="248" y2="107" stroke="#e74c3c" stroke-width="2"/><!-- to resistor -->
  <!-- Gate control line (going right to MCU) -->
  <line x1="218" y1="107" x2="218" y2="94" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="218" y1="94" x2="200" y2="94" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- CLOSED label -->
  <text x="210" y="90" font-size="8" fill="#e74c3c" font-weight="bold">CLOSED</text>

  <!-- Resistor Cell 1 (zigzag) -->
  <line x1="248" y1="107" x2="255" y2="107" stroke="#e74c3c" stroke-width="2"/>
  <polyline points="255,107 258,100 262,114 266,100 270,114 274,100 278,114 282,107 288,107" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <line x1="288" y1="107" x2="310" y2="107" stroke="#e74c3c" stroke-width="2"/>
  <line x1="310" y1="88" x2="310" y2="128" stroke="#e74c3c" stroke-width="2"/>
  <line x1="310" y1="88" x2="310" y2="88" stroke="#e74c3c" stroke-width="2"/>
  <text x="270" y="96" text-anchor="middle" font-size="8" fill="#c0392b" font-weight="bold">R_bleed</text>
  <text x="270" y="86" text-anchor="middle" font-size="7.5" fill="#c0392b">100Ω, 50mA</text>

  <!-- Heat symbol over Cell 1 resistor -->
  <text x="268" y="78" text-anchor="middle" font-size="13" fill="#e74c3c">🔥</text>
  <text x="320" y="105" font-size="8" fill="#e74c3c" font-weight="bold">Energy wasted</text>
  <text x="320" y="116" font-size="8" fill="#e74c3c">as heat</text>

  <!-- Current arrow on Cell 1 branch -->
  <text x="345" y="110" font-size="10" fill="#e74c3c">→</text>
  <text x="355" y="109" font-size="8" fill="#e74c3c">50mA</text>

  <!-- CELL 2 BRANCH — OPEN -->
  <line x1="155" y1="150" x2="195" y2="150" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="155" y1="190" x2="195" y2="190" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="195" y1="150" x2="195" y2="162" stroke="#95a5a6" stroke-width="1.5"/>
  <!-- MOSFET open (simplified) -->
  <line x1="195" y1="162" x2="215" y2="162" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="215" y1="158" x2="215" y2="178" stroke="#95a5a6" stroke-width="2"/>
  <line x1="218" y1="160" x2="218" y2="176" stroke="#95a5a6" stroke-width="1"/>
  <line x1="222" y1="161" x2="230" y2="161" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="222" y1="172" x2="230" y2="172" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="230" y1="161" x2="230" y2="172" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="230" y1="166" x2="248" y2="166" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="215" y="155" font-size="8" fill="#95a5a6">OPEN</text>
  <!-- Resistor (grey) -->
  <line x1="248" y1="166" x2="255" y2="166" stroke="#95a5a6" stroke-width="1.5"/>
  <polyline points="255,166 258,160 262,172 266,160 270,172 274,160 278,172 282,166 288,166" fill="none" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="288" y1="166" x2="310" y2="166" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="310" y1="150" x2="310" y2="190" stroke="#95a5a6" stroke-width="1.5"/>

  <!-- CELL 3 BRANCH — OPEN -->
  <line x1="155" y1="212" x2="195" y2="212" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="155" y1="252" x2="195" y2="252" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="195" y1="212" x2="195" y2="224" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="195" y1="224" x2="215" y2="224" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="215" y1="220" x2="215" y2="240" stroke="#95a5a6" stroke-width="2"/>
  <line x1="218" y1="222" x2="218" y2="238" stroke="#95a5a6" stroke-width="1"/>
  <line x1="222" y1="223" x2="230" y2="223" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="222" y1="234" x2="230" y2="234" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="230" y1="223" x2="230" y2="234" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="230" y1="228" x2="248" y2="228" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="215" y="218" font-size="8" fill="#95a5a6">OPEN</text>
  <line x1="248" y1="228" x2="255" y2="228" stroke="#95a5a6" stroke-width="1.5"/>
  <polyline points="255,228 258,222 262,234 266,222 270,234 274,222 278,234 282,228 288,228" fill="none" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="288" y1="228" x2="310" y2="228" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="310" y1="212" x2="310" y2="252" stroke="#95a5a6" stroke-width="1.5"/>

  <!-- CELL 4 BRANCH — OPEN -->
  <line x1="155" y1="274" x2="195" y2="274" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="155" y1="314" x2="195" y2="314" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="195" y1="274" x2="195" y2="286" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="195" y1="286" x2="215" y2="286" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="215" y1="282" x2="215" y2="302" stroke="#95a5a6" stroke-width="2"/>
  <line x1="218" y1="284" x2="218" y2="300" stroke="#95a5a6" stroke-width="1"/>
  <line x1="222" y1="285" x2="230" y2="285" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="222" y1="296" x2="230" y2="296" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="230" y1="285" x2="230" y2="296" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="230" y1="290" x2="248" y2="290" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="215" y="280" font-size="8" fill="#95a5a6">OPEN</text>
  <line x1="248" y1="290" x2="255" y2="290" stroke="#95a5a6" stroke-width="1.5"/>
  <polyline points="255,290 258,284 262,296 266,284 270,296 274,284 278,296 282,290 288,290" fill="none" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="288" y1="290" x2="310" y2="290" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="310" y1="274" x2="310" y2="314" stroke="#95a5a6" stroke-width="1.5"/>

  <!-- Gate control lines from MOSFETs to MCU -->
  <!-- Collect gate lines at x=380 -->
  <line x1="218" y1="169" x2="380" y2="169" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="4,2"/>
  <line x1="218" y1="231" x2="380" y2="231" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="4,2"/>
  <line x1="218" y1="293" x2="380" y2="293" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="4,2"/>
  <!-- Cell 1 gate already drawn above in red but add MCU connection -->
  <line x1="218" y1="94" x2="380" y2="94" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- BMS MCU block -->
  <rect x="380" y="75" width="120" height="240" rx="6" fill="#2c3e50" stroke="#9b59b6" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">BMS MCU</text>
  <text x="440" y="118" text-anchor="middle" font-size="8.5" fill="#ecf0f1">Gate Control</text>
  <text x="440" y="132" text-anchor="middle" font-size="8.5" fill="#ecf0f1">Signals</text>

  <!-- Gate labels next to MCU -->
  <text x="385" y="92" font-size="7.5" fill="#9b59b6">G1 →</text>
  <text x="385" y="168" font-size="7.5" fill="#9b59b6">G2 →</text>
  <text x="385" y="230" font-size="7.5" fill="#9b59b6">G3 →</text>
  <text x="385" y="292" font-size="7.5" fill="#9b59b6">G4 →</text>

  <!-- MCU logic text -->
  <text x="440" y="160" text-anchor="middle" font-size="8" fill="#27ae60">Cell 1: BLEED ON</text>
  <text x="440" y="175" text-anchor="middle" font-size="8" fill="#7f8c8d">Cell 2: off</text>
  <text x="440" y="190" text-anchor="middle" font-size="8" fill="#7f8c8d">Cell 3: off</text>
  <text x="440" y="205" text-anchor="middle" font-size="8" fill="#7f8c8d">Cell 4: off</text>
  <text x="440" y="230" text-anchor="middle" font-size="7.5" fill="#bdc3c7">Monitors V each cell</text>
  <text x="440" y="244" text-anchor="middle" font-size="7.5" fill="#bdc3c7">Opens switch when</text>
  <text x="440" y="258" text-anchor="middle" font-size="7.5" fill="#bdc3c7">cell V = target</text>
  <text x="440" y="278" text-anchor="middle" font-size="7.5" fill="#e67e22">Runs during CV</text>
  <text x="440" y="291" text-anchor="middle" font-size="7.5" fill="#e67e22">charge phase</text>
  <text x="440" y="305" text-anchor="middle" font-size="7.5" fill="#bdc3c7">(typically)</text>

  <!-- Annotation box -->
  <rect x="20" y="360" width="370" height="125" rx="6" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="205" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Passive Balancing:</text>
  <text x="30" y="398" font-size="9.5" fill="#2c3e50">• Bleed charge from high cells via resistor</text>
  <text x="30" y="414" font-size="9.5" fill="#2c3e50">• Simple, cheap, reliable</text>
  <text x="30" y="430" font-size="9.5" fill="#c0392b">• Energy dissipated as heat (inefficient)</text>
  <text x="30" y="446" font-size="9.5" fill="#2c3e50">• Only runs during charging (CV phase typical)</text>
  <text x="30" y="462" font-size="9.5" fill="#2c3e50">• Balancing current: 50–200 mA</text>

  <!-- Annotation box right -->
  <rect x="410" y="360" width="270" height="125" rx="6" fill="#fef9e7" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="545" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">Cell 1 — Balancing Active</text>
  <text x="420" y="396" font-size="9" fill="#2c3e50">Bleed current path:</text>
  <text x="420" y="411" font-size="9" fill="#e74c3c">Cell 1 (+) → MOSFET → R_bleed → Cell 1 (−)</text>
  <text x="420" y="427" font-size="9" fill="#2c3e50">Power dissipated = I² × R</text>
  <text x="420" y="443" font-size="9" fill="#2c3e50">= (50mA)² × 100Ω = 0.25W</text>
  <text x="420" y="462" font-size="9" fill="#7f8c8d">All converted to heat — no energy recovery</text>
</svg>
