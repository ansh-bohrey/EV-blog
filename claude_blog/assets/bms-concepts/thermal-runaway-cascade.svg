<svg viewBox="0 0 760 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="620" fill="#f8f9fa"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Thermal Runaway Cascade — Cell to Pack</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#555">How a single cell failure can propagate to pack destruction in seconds</text>

  <defs>
    <marker id="trarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c00"/>
    </marker>
    <marker id="yarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e07b00"/>
    </marker>
  </defs>

  <!-- Stage 0: Trigger -->
  <rect x="230" y="58" width="300" height="52" rx="8" fill="#ffe0d0" stroke="#c04000" stroke-width="2"/>
  <text x="380" y="79" text-anchor="middle" font-size="12" font-weight="bold" fill="#802000">Stage 0: Trigger Event</text>
  <text x="380" y="97" text-anchor="middle" font-size="10" fill="#555">Overcharge · Mechanical crush · External heat · Internal short</text>
  <line x1="380" y1="110" x2="380" y2="130" stroke="#c00" stroke-width="2" marker-end="url(#trarr)"/>

  <!-- Stage 1: SEI decomposition -->
  <rect x="200" y="131" width="360" height="58" rx="6" fill="#ffcccc" stroke="#c00" stroke-width="2"/>
  <text x="380" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#900">Stage 1: SEI Decomposition (~80°C)</text>
  <text x="380" y="167" text-anchor="middle" font-size="10" fill="#333">SEI (solid-electrolyte interphase) breaks down</text>
  <text x="380" y="180" text-anchor="middle" font-size="10" fill="#555">releases heat (exothermic) → T rises further</text>
  <line x1="380" y1="189" x2="380" y2="210" stroke="#c00" stroke-width="2" marker-end="url(#trarr)"/>

  <!-- Stage 2: Electrolyte decomposition -->
  <rect x="175" y="211" width="410" height="58" rx="6" fill="#ff9999" stroke="#c00" stroke-width="2"/>
  <text x="380" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#800">Stage 2: Electrolyte Decomposition (~110°C)</text>
  <text x="380" y="247" text-anchor="middle" font-size="10" fill="#333">Electrolyte (LiPF₆ in EC/DMC) reacts with anode</text>
  <text x="380" y="261" text-anchor="middle" font-size="10" fill="#555">CO₂, CO, H₂ gas venting begins — cell swells</text>
  <line x1="380" y1="269" x2="380" y2="289" stroke="#c00" stroke-width="2" marker-end="url(#trarr)"/>

  <!-- Stage 3: Cathode breakdown -->
  <rect x="150" y="290" width="460" height="58" rx="6" fill="#ff6666" stroke="#900" stroke-width="2"/>
  <text x="380" y="311" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Stage 3: Cathode Breakdown (~180°C)</text>
  <text x="380" y="326" text-anchor="middle" font-size="10" fill="white">Cathode (NMC/NCA) releases O₂ → reacts with flammable electrolyte</text>
  <text x="380" y="341" text-anchor="middle" font-size="10" fill="#ffe0e0">Rate: self-sustaining — thermal runaway is now uncontrollable</text>
  <line x1="380" y1="348" x2="380" y2="368" stroke="#c00" stroke-width="2.5" marker-end="url(#trarr)"/>

  <!-- Stage 4: Venting + fire -->
  <rect x="130" y="369" width="500" height="60" rx="6" fill="#cc0000" stroke="#800" stroke-width="2.5"/>
  <text x="380" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Stage 4: Venting + Fire (200–500°C)</text>
  <text x="380" y="407" text-anchor="middle" font-size="10" fill="white">Safety vent ruptures → flammable electrolyte vapor ignites</text>
  <text x="380" y="421" text-anchor="middle" font-size="10" fill="#ffcccc">Cell internal pressure: 10+ bar. Ejected material hits adjacent cells.</text>

  <!-- Propagation arrows -->
  <line x1="380" y1="429" x2="380" y2="453" stroke="#c00" stroke-width="2.5" marker-end="url(#trarr)"/>

  <!-- Stage 5: Propagation -->
  <rect x="110" y="454" width="540" height="60" rx="6" fill="#800000" stroke="#600" stroke-width="2.5"/>
  <text x="380" y="476" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Stage 5: Cell-to-Cell Propagation</text>
  <text x="380" y="492" text-anchor="middle" font-size="10" fill="#ffcccc">Ejected hot gas/material heats adjacent cells above trigger temp</text>
  <text x="380" y="506" text-anchor="middle" font-size="10" fill="#ff8888">Pack → module → vehicle: once propagating, impossible to stop</text>

  <!-- Prevention annotations (left) -->
  <rect x="10" y="131" width="175" height="380" rx="8" fill="#f0fff0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="97" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">BMS Prevention</text>
  <text x="97" y="170" text-anchor="middle" font-size="9" fill="#2a7a2a">Stage 1:</text>
  <text x="20" y="184" font-size="9" fill="#333">→ Monitor T every 100ms</text>
  <text x="20" y="196" font-size="9" fill="#333">→ Open DSG FET if T&gt;65°C</text>
  <text x="97" y="216" text-anchor="middle" font-size="9" fill="#2a7a2a">Stage 2:</text>
  <text x="20" y="230" font-size="9" fill="#333">→ Detect gas via pressure sensor</text>
  <text x="20" y="242" font-size="9" fill="#333">→ CAN alert to VCU</text>
  <text x="97" y="262" text-anchor="middle" font-size="9" fill="#2a7a2a">Stage 3:</text>
  <text x="20" y="276" font-size="9" fill="#333">→ T sensor array triggers</text>
  <text x="20" y="288" font-size="9" fill="#333">→ Contactor opens (too late!)</text>
  <text x="97" y="308" text-anchor="middle" font-size="9" fill="#2a7a2a">Stages 4–5:</text>
  <text x="20" y="322" font-size="9" fill="#c00">→ Fire suppression only</text>
  <text x="20" y="334" font-size="9" fill="#c00">→ Pack design must include</text>
  <text x="20" y="346" font-size="9" fill="#c00">   thermal barriers between</text>
  <text x="20" y="358" font-size="9" fill="#c00">   cells (firewall gaps, intumescent</text>
  <text x="20" y="370" font-size="9" fill="#c00">   foam, mica sheets)</text>
  <text x="97" y="395" text-anchor="middle" font-size="9" fill="#1a5a1a">AIS-156 requirement:</text>
  <text x="20" y="410" font-size="9" fill="#333">→ Cell-to-cell propagation</text>
  <text x="20" y="422" font-size="9" fill="#333">   must not destroy the</text>
  <text x="20" y="434" font-size="9" fill="#333">   pack within 5 minutes</text>
  <text x="20" y="446" font-size="9" fill="#333">   (gives occupant escape time)</text>
  <text x="20" y="462" font-size="9" fill="#555">(AIS-156 India EV safety std)</text>
  <text x="20" y="478" font-size="9" fill="#555">(FMVSS 305, ECE R100 similar)</text>
  <text x="20" y="495" font-size="9" fill="#555">also applied globally</text>

  <!-- Timeline on right -->
  <rect x="616" y="131" width="134" height="380" rx="8" fill="#fff8f0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="683" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3a00">Timeline</text>
  <text x="683" y="168" text-anchor="middle" font-size="9" fill="#555">Stage 1: t = 0 s</text>
  <text x="683" y="183" text-anchor="middle" font-size="9" fill="#555">~30–120°C rise</text>
  <text x="683" y="210" text-anchor="middle" font-size="9" fill="#e07b00">Stage 2: +5–60 s</text>
  <text x="683" y="225" text-anchor="middle" font-size="9" fill="#555">Venting begins</text>
  <text x="683" y="252" text-anchor="middle" font-size="9" fill="#c00">Stage 3: +30–120 s</text>
  <text x="683" y="267" text-anchor="middle" font-size="9" fill="#555">Self-sustaining</text>
  <text x="683" y="305" text-anchor="middle" font-size="9" fill="#c00">Stage 4: +60–180 s</text>
  <text x="683" y="320" text-anchor="middle" font-size="9" fill="#555">Fire visible</text>
  <text x="683" y="480" text-anchor="middle" font-size="9" fill="#800">Stage 5: +2–10 min</text>
  <text x="683" y="495" text-anchor="middle" font-size="9" fill="#555">Pack involved</text>

  <!-- Bottom safety note -->
  <rect x="110" y="528" width="540" height="70" rx="8" fill="#fff0f0" stroke="#c00" stroke-width="1.5"/>
  <text x="380" y="546" text-anchor="middle" font-size="11" font-weight="bold" fill="#c00">Key insight: BMS can only prevent Stages 1–2</text>
  <text x="380" y="562" text-anchor="middle" font-size="10" fill="#555">Once Stage 3 begins, the reaction is self-sustaining — pack mechanical design (cell spacing,</text>
  <text x="380" y="576" text-anchor="middle" font-size="10" fill="#555">vent channels, fire barriers) determines whether propagation is contained or catastrophic.</text>
  <text x="380" y="590" text-anchor="middle" font-size="10" fill="#555">LFP chemistry has significantly lower O₂ release at Stage 3 — much safer against cascade.</text>
</svg>
