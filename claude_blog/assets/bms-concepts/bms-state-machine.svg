<svg viewBox="0 0 820 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="620" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">BMS Operational State Machine</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#555">States, transitions, and guard conditions</text>

  <defs>
    <marker id="smarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <marker id="smarr_b" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a6eb5"/>
    </marker>
    <marker id="smarr_r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c00"/>
    </marker>
    <marker id="smarr_g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2a8a2a"/>
    </marker>
  </defs>

  <!-- INIT state -->
  <rect x="315" y="60" width="190" height="62" rx="8" fill="#e8e8e8" stroke="#555" stroke-width="2"/>
  <text x="410" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">INIT</text>
  <text x="410" y="99" text-anchor="middle" font-size="9" fill="#555">Self-test, read NV memory,</text>
  <text x="410" y="111" text-anchor="middle" font-size="9" fill="#555">restore last SOC from flash</text>

  <!-- INIT → IDLE -->
  <line x1="410" y1="122" x2="410" y2="155" stroke="#555" stroke-width="2" marker-end="url(#smarr)"/>
  <text x="420" y="143" font-size="9" fill="#2a7a2a">[self-test pass]</text>

  <!-- IDLE state -->
  <rect x="310" y="156" width="200" height="62" rx="8" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2.5"/>
  <text x="410" y="179" text-anchor="middle" font-size="12" font-weight="bold" fill="#003a7a">IDLE</text>
  <text x="410" y="195" text-anchor="middle" font-size="9" fill="#555">Monitor V, T, SoC every 10ms</text>
  <text x="410" y="207" text-anchor="middle" font-size="9" fill="#555">Contactors OPEN, FETs ready</text>

  <!-- IDLE → STANDBY_FAULT path -->
  <line x1="310" y1="187" x2="200" y2="187" stroke="#c00" stroke-width="1.5" marker-end="url(#smarr_r)"/>
  <text x="255" y="182" text-anchor="middle" font-size="9" fill="#c00">[fault detected]</text>

  <!-- STANDBY_FAULT -->
  <rect x="80" y="168" width="120" height="52" rx="8" fill="#ffe0e0" stroke="#c00" stroke-width="2"/>
  <text x="140" y="191" text-anchor="middle" font-size="10" font-weight="bold" fill="#900">FAULT</text>
  <text x="140" y="205" text-anchor="middle" font-size="9" fill="#555">All FETs off</text>
  <text x="140" y="216" text-anchor="middle" font-size="9" fill="#555">DTC logged</text>

  <!-- FAULT → IDLE recovery -->
  <line x1="140" y1="168" x2="140" y2="140" stroke="#2a8a2a" stroke-width="1.5"/>
  <line x1="140" y1="140" x2="310" y2="140" stroke="#2a8a2a" stroke-width="1.5" marker-end="url(#smarr_g)"/>
  <text x="225" y="135" text-anchor="middle" font-size="9" fill="#2a8a2a">[fault cleared + reset]</text>

  <!-- IDLE → CHARGE -->
  <line x1="510" y1="180" x2="600" y2="180" stroke="#1a6eb5" stroke-width="2" marker-end="url(#smarr_b)"/>
  <text x="555" y="172" text-anchor="middle" font-size="9" fill="#1a6eb5">[charger present</text>
  <text x="555" y="184" text-anchor="middle" font-size="9" fill="#1a6eb5">+ V_OBC OK]</text>

  <!-- CHARGE state -->
  <rect x="600" y="156" width="190" height="62" rx="8" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2.5"/>
  <text x="695" y="179" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5a1a">CHARGE</text>
  <text x="695" y="195" text-anchor="middle" font-size="9" fill="#555">Close CHG contactor</text>
  <text x="695" y="207" text-anchor="middle" font-size="9" fill="#555">CC-CV, cell balancing active</text>

  <!-- CHARGE → IDLE (full / disconnect) -->
  <line x1="695" y1="156" x2="695" y2="128" stroke="#555" stroke-width="1.5"/>
  <line x1="695" y1="128" x2="510" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#smarr)"/>
  <text x="600" y="122" text-anchor="middle" font-size="9" fill="#555">[SOC=100% or charger removed]</text>

  <!-- CHARGE → FAULT -->
  <line x1="790" y1="187" x2="820" y2="187" stroke="#c00" stroke-width="1.5"/>
  <line x1="820" y1="187" x2="820" y2="500" stroke="#c00" stroke-width="1.5"/>
  <line x1="820" y1="500" x2="730" y2="500" stroke="#c00" stroke-width="1.5" marker-end="url(#smarr_r)"/>
  <!-- label -->
  <text x="825" y="345" font-size="9" fill="#c00" text-anchor="start">[OV/OT/OCC</text>
  <text x="825" y="357" font-size="9" fill="#c00" text-anchor="start">fault]</text>

  <!-- IDLE → PRECHARGE -->
  <line x1="410" y1="218" x2="410" y2="268" stroke="#555" stroke-width="2" marker-end="url(#smarr)"/>
  <text x="425" y="248" font-size="9" fill="#555">[key-ON signal]</text>

  <!-- PRECHARGE state -->
  <rect x="295" y="269" width="230" height="65" rx="8" fill="#fff0d0" stroke="#e07b00" stroke-width="2.5"/>
  <text x="410" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3a00">PRE-CHARGE</text>
  <text x="410" y="306" text-anchor="middle" font-size="9" fill="#555">Close POS contactor via R_pre</text>
  <text x="410" y="318" text-anchor="middle" font-size="9" fill="#555">Limit inrush to inverter caps</text>
  <text x="410" y="330" text-anchor="middle" font-size="9" fill="#555">V_bus rising (RC curve)</text>

  <!-- PRECHARGE → DRIVE -->
  <line x1="410" y1="334" x2="410" y2="375" stroke="#555" stroke-width="2" marker-end="url(#smarr)"/>
  <text x="425" y="360" font-size="9" fill="#555">[V_bus ≥ 95% V_pack]</text>

  <!-- DRIVE state -->
  <rect x="295" y="376" width="230" height="70" rx="8" fill="#e8d0ff" stroke="#6633cc" stroke-width="2.5"/>
  <text x="410" y="399" text-anchor="middle" font-size="12" font-weight="bold" fill="#330080">DRIVE</text>
  <text x="410" y="415" text-anchor="middle" font-size="9" fill="#555">Main POS + NEG contactors closed</text>
  <text x="410" y="427" text-anchor="middle" font-size="9" fill="#555">SOP published on CAN every 100ms</text>
  <text x="410" y="439" text-anchor="middle" font-size="9" fill="#555">Balancing active (passive)</text>

  <!-- DRIVE → IDLE (key-off) -->
  <line x1="295" y1="411" x2="200" y2="411" stroke="#555" stroke-width="2"/>
  <line x1="200" y1="411" x2="200" y2="580" stroke="#555" stroke-width="2"/>
  <line x1="200" y1="580" x2="390" y2="580" stroke="#555" stroke-width="2"/>
  <line x1="390" y1="580" x2="390" y2="540" stroke="#555" stroke-width="2" marker-end="url(#smarr)"/>
  <text x="155" y="500" font-size="9" fill="#555" text-anchor="middle">[key-OFF]</text>

  <!-- SLEEP state -->
  <rect x="295" y="490" width="230" height="60" rx="8" fill="#f0f0f0" stroke="#888" stroke-width="2"/>
  <text x="410" y="514" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">SLEEP / KEY-OFF</text>
  <text x="410" y="530" text-anchor="middle" font-size="9" fill="#555">Store SOC to NV memory</text>
  <text x="410" y="542" text-anchor="middle" font-size="9" fill="#555">Contactors open, minimal current draw</text>

  <!-- SLEEP → IDLE (wake) -->
  <line x1="525" y1="520" x2="650" y2="520" stroke="#555" stroke-width="1.5"/>
  <line x1="650" y1="520" x2="650" y2="350" stroke="#555" stroke-width="1.5"/>
  <line x1="650" y1="350" x2="700" y2="312" stroke="#555" stroke-width="1.5"/>
  <!-- annotation -->
  <text x="685" y="440" font-size="9" fill="#555" text-anchor="start">[charger</text>
  <text x="685" y="452" font-size="9" fill="#555" text-anchor="start">plugged in →</text>
  <text x="685" y="464" font-size="9" fill="#555" text-anchor="start">CHARGE state]</text>

  <!-- DRIVE → FAULT -->
  <line x1="525" y1="411" x2="600" y2="411" stroke="#c00" stroke-width="1.5"/>
  <line x1="600" y1="411" x2="600" y2="480" stroke="#c00" stroke-width="1.5"/>
  <rect x="600" y="450" width="130" height="60" rx="6" fill="#ffe0e0" stroke="#c00" stroke-width="2"/>
  <text x="665" y="473" text-anchor="middle" font-size="10" font-weight="bold" fill="#900">DRIVE FAULT</text>
  <text x="665" y="487" text-anchor="middle" font-size="9" fill="#555">Open contactors</text>
  <text x="665" y="499" text-anchor="middle" font-size="9" fill="#555">Issue CAN fault msg</text>
  <text x="595" y="430" font-size="9" fill="#c00">[fault during drive]</text>

  <!-- PRECHARGE → FAULT (precharge timeout) -->
  <line x1="295" y1="300" x2="200" y2="300" stroke="#c00" stroke-width="1.5" marker-end="url(#smarr_r)"/>
  <text x="248" y="294" text-anchor="middle" font-size="9" fill="#c00">[timeout or</text>
  <text x="248" y="306" text-anchor="middle" font-size="9" fill="#c00">V_bus err]</text>
  <line x1="200" y1="300" x2="200" y2="220" stroke="#c00" stroke-width="1.5" marker-end="url(#smarr_r)"/>

  <!-- Legend -->
  <rect x="20" y="550" width="240" height="56" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="140" y="566" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Transition Legend</text>
  <circle cx="35" cy="580" r="4" fill="#555"/>
  <line x1="35" y1="580" x2="55" y2="580" stroke="#555" stroke-width="2" marker-end="url(#smarr)"/>
  <text x="62" y="584" font-size="9" fill="#555">Normal transition</text>
  <circle cx="35" cy="596" r="4" fill="#c00"/>
  <line x1="35" y1="596" x2="55" y2="596" stroke="#c00" stroke-width="1.5" marker-end="url(#smarr_r)"/>
  <text x="62" y="600" font-size="9" fill="#c00">Fault transition (open FETs)</text>
</svg>
