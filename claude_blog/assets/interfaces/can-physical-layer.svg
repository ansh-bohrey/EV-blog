<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="500" fill="#f8f9fa"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">CAN Physical Layer — ISO 11898-2</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#555">Differential signaling, bus topology, and termination — why CAN survives automotive EMI</text>

  <defs>
    <marker id="cparr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Bus line (center horizontal) -->
  <line x1="60" y1="190" x2="800" y2="190" stroke="#c00" stroke-width="3"/>
  <line x1="60" y1="210" x2="800" y2="210" stroke="#1a6eb5" stroke-width="3"/>
  <text x="830" y="194" font-size="10" fill="#c00" font-weight="bold">CANH</text>
  <text x="830" y="214" font-size="10" fill="#1a6eb5" font-weight="bold">CANL</text>

  <!-- Left terminator -->
  <rect x="55" y="175" width="10" height="50" rx="2" fill="#e07b00" stroke="#e07b00" stroke-width="1"/>
  <text x="50" y="220" text-anchor="end" font-size="9" fill="#e07b00">120Ω</text>
  <line x1="60" y1="175" x2="60" y2="155" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="225" x2="60" y2="245" stroke="#555" stroke-width="1.5"/>

  <!-- Right terminator -->
  <rect x="795" y="175" width="10" height="50" rx="2" fill="#e07b00" stroke="#e07b00" stroke-width="1"/>
  <text x="818" y="220" font-size="9" fill="#e07b00">120Ω</text>
  <line x1="800" y1="175" x2="800" y2="155" stroke="#555" stroke-width="1.5"/>
  <line x1="800" y1="225" x2="800" y2="245" stroke="#555" stroke-width="1.5"/>

  <!-- Node 1: BMS -->
  <line x1="180" y1="190" x2="180" y2="128" stroke="#555" stroke-width="1.5"/>
  <line x1="180" y1="210" x2="180" y2="128" stroke="#555" stroke-width="1.5"/>
  <rect x="120" y="60" width="120" height="68" rx="6" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="180" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#330080">BMS</text>
  <text x="180" y="97" text-anchor="middle" font-size="9" fill="#555">CAN transceiver</text>
  <text x="180" y="110" text-anchor="middle" font-size="9" fill="#555">TJA1050 / SN65HVD</text>
  <text x="180" y="123" text-anchor="middle" font-size="8" fill="#888">Tx: SOC, V, T, fault</text>

  <!-- Node 2: VCU -->
  <line x1="340" y1="190" x2="340" y2="128" stroke="#555" stroke-width="1.5"/>
  <line x1="340" y1="210" x2="340" y2="128" stroke="#555" stroke-width="1.5"/>
  <rect x="280" y="60" width="120" height="68" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="340" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">VCU</text>
  <text x="340" y="97" text-anchor="middle" font-size="9" fill="#555">CAN transceiver</text>
  <text x="340" y="110" text-anchor="middle" font-size="9" fill="#555">TJA1050</text>
  <text x="340" y="123" text-anchor="middle" font-size="8" fill="#888">Rx: SOC, limits</text>

  <!-- Node 3: Instrument cluster -->
  <line x1="500" y1="190" x2="500" y2="128" stroke="#555" stroke-width="1.5"/>
  <line x1="500" y1="210" x2="500" y2="128" stroke="#555" stroke-width="1.5"/>
  <rect x="440" y="60" width="120" height="68" rx="6" fill="#ffe0d0" stroke="#c04000" stroke-width="2"/>
  <text x="500" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#802000">Display</text>
  <text x="500" y="97" text-anchor="middle" font-size="9" fill="#802000">cluster</text>
  <text x="500" y="110" text-anchor="middle" font-size="9" fill="#555">Rx: SOC%, range</text>
  <text x="500" y="123" text-anchor="middle" font-size="8" fill="#888">Rx only</text>

  <!-- Node 4: OBC -->
  <line x1="660" y1="190" x2="660" y2="128" stroke="#555" stroke-width="1.5"/>
  <line x1="660" y1="210" x2="660" y2="128" stroke="#555" stroke-width="1.5"/>
  <rect x="600" y="60" width="120" height="68" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="660" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#003a7a">OBC</text>
  <text x="660" y="97" text-anchor="middle" font-size="9" fill="#555">On-board charger</text>
  <text x="660" y="110" text-anchor="middle" font-size="9" fill="#555">Rx: charge limits</text>
  <text x="660" y="123" text-anchor="middle" font-size="8" fill="#888">Tx: charge status</text>

  <!-- Voltage waveforms (bottom half) -->
  <text x="430" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Signal Levels</text>

  <!-- Axes for waveform -->
  <line x1="60" y1="380" x2="500" y2="380" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="290" x2="60" y2="380" stroke="#333" stroke-width="1.5"/>
  <text x="30" y="310" text-anchor="middle" font-size="9" fill="#333">3.5V</text>
  <text x="30" y="335" text-anchor="middle" font-size="9" fill="#333">2.5V</text>
  <text x="30" y="360" text-anchor="middle" font-size="9" fill="#333">1.5V</text>
  <line x1="56" y1="310" x2="62" y2="310" stroke="#555" stroke-width="1"/>
  <line x1="56" y1="335" x2="62" y2="335" stroke="#555" stroke-width="1"/>
  <line x1="56" y1="360" x2="62" y2="360" stroke="#555" stroke-width="1"/>

  <!-- CANH waveform: recessive=2.5V, dominant=3.5V -->
  <polyline points="60,335 100,335 100,310 160,310 160,335 220,335 220,310 260,310 260,335 320,335 320,310 380,310 380,335 500,335"
            stroke="#c00" stroke-width="2" fill="none"/>
  <!-- CANL waveform: recessive=2.5V, dominant=1.5V -->
  <polyline points="60,335 100,335 100,360 160,360 160,335 220,335 220,360 260,360 260,335 320,335 320,360 380,360 380,335 500,335"
            stroke="#1a6eb5" stroke-width="2" fill="none"/>

  <!-- Differential voltage annotations -->
  <!-- At recessive state: CANH=CANL=2.5V, diff=0 -->
  <text x="80" y="377" text-anchor="middle" font-size="8" fill="#555">Rec</text>
  <!-- At dominant: CANH=3.5, CANL=1.5, diff=2V -->
  <text x="130" y="377" text-anchor="middle" font-size="8" fill="#555">Dom</text>
  <text x="130" y="306" text-anchor="middle" font-size="8" fill="#c00">CANH=3.5V</text>
  <text x="130" y="364" text-anchor="middle" font-size="8" fill="#1a6eb5">CANL=1.5V</text>
  <!-- diff arrow -->
  <line x1="165" y1="310" x2="165" y2="360" stroke="#e07b00" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="175" y="337" font-size="9" fill="#e07b00" font-weight="bold">2V diff</text>

  <!-- Explanation of differential advantage -->
  <rect x="530" y="270" width="305" height="140" rx="6" fill="#fff8e0" stroke="#e0a000" stroke-width="1.5"/>
  <text x="682" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5000">Why differential?</text>
  <text x="540" y="304" font-size="9" fill="#333">EMI (motor noise, switching) hits</text>
  <text x="540" y="317" font-size="9" fill="#333">BOTH wires equally (common-mode)</text>
  <text x="540" y="330" font-size="9" fill="#333">Receiver reads CANH − CANL only</text>
  <text x="540" y="343" font-size="9" fill="#2a7a2a">→ EMI cancels in the difference!</text>
  <text x="540" y="358" font-size="9" fill="#333">Recessive: ≤ |0.5V| difference</text>
  <text x="540" y="371" font-size="9" fill="#333">Dominant: ≥ |0.9V| difference</text>
  <text x="540" y="386" font-size="9" fill="#555">Minimum driver output: 1.5V diff</text>
  <text x="540" y="399" font-size="9" fill="#555">EMI immunity: tested to ±200V/m</text>

  <!-- Bus arbitration note -->
  <rect x="60" y="400" width="450" height="52" rx="6" fill="#f0f0ff" stroke="#5555cc" stroke-width="1.5"/>
  <text x="285" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Non-destructive arbitration (CSMA/CD)</text>
  <text x="285" y="434" text-anchor="middle" font-size="9" fill="#555">All nodes start transmitting simultaneously. Dominant bit (0) wins over recessive (1).</text>
  <text x="285" y="447" text-anchor="middle" font-size="9" fill="#555">Lower CAN ID = higher priority. Loser backs off without destroying the winning frame.</text>
</svg>
