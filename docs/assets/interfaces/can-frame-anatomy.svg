<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="460" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">CAN 2.0B Extended Data Frame Anatomy</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#555">Every field has a purpose — this is why CAN is so robust in automotive environments</text>

  <!-- Frame start -->
  <!-- Fields at y=80, height=65 -->
  <!-- SOF -->
  <rect x="30" y="80" width="30" height="65" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="45" y="107" text-anchor="middle" font-size="8" font-weight="bold" fill="#1a5a1a" transform="rotate(-90,45,107)">SOF</text>
  <text x="45" y="115" text-anchor="middle" font-size="7" fill="#555">1 b</text>

  <!-- Identifier A (11 bits) -->
  <rect x="60" y="80" width="70" height="65" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="95" y="105" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">ID-A</text>
  <text x="95" y="119" text-anchor="middle" font-size="8" fill="#003a7a">11 bits</text>
  <text x="95" y="133" text-anchor="middle" font-size="7" fill="#555">base ID</text>

  <!-- SRR + IDE -->
  <rect x="130" y="80" width="30" height="65" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <text x="145" y="105" text-anchor="middle" font-size="7" fill="#555">SRR</text>
  <text x="145" y="116" text-anchor="middle" font-size="7" fill="#555">IDE</text>
  <text x="145" y="127" text-anchor="middle" font-size="7" fill="#888">2 b</text>

  <!-- Identifier B (18 bits extended) -->
  <rect x="160" y="80" width="100" height="65" fill="#b0d0ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="210" y="103" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">ID-B</text>
  <text x="210" y="117" text-anchor="middle" font-size="8" fill="#003a7a">18 bits</text>
  <text x="210" y="131" text-anchor="middle" font-size="7" fill="#555">extended ID</text>
  <text x="210" y="141" text-anchor="middle" font-size="7" fill="#555">(total: 29 bits)</text>

  <!-- RTR + r1 + r0 -->
  <rect x="260" y="80" width="36" height="65" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <text x="278" y="105" text-anchor="middle" font-size="7" fill="#555">RTR</text>
  <text x="278" y="116" text-anchor="middle" font-size="7" fill="#555">r1,r0</text>
  <text x="278" y="127" text-anchor="middle" font-size="7" fill="#888">3 b</text>

  <!-- DLC -->
  <rect x="296" y="80" width="50" height="65" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="321" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#802000">DLC</text>
  <text x="321" y="121" text-anchor="middle" font-size="8" fill="#802000">4 bits</text>
  <text x="321" y="135" text-anchor="middle" font-size="7" fill="#555">data len</text>

  <!-- DATA (0-8 bytes) -->
  <rect x="346" y="80" width="200" height="65" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="446" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5000">DATA</text>
  <text x="446" y="121" text-anchor="middle" font-size="9" fill="#7a5000">0–8 bytes (64 bits max)</text>
  <text x="446" y="135" text-anchor="middle" font-size="8" fill="#555">Payload (BMS SOC, voltage data, etc.)</text>

  <!-- CRC -->
  <rect x="546" y="80" width="90" height="65" fill="#e8d0ff" stroke="#6633cc" stroke-width="1.5"/>
  <text x="591" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#330080">CRC</text>
  <text x="591" y="121" text-anchor="middle" font-size="8" fill="#330080">15 bits</text>
  <text x="591" y="135" text-anchor="middle" font-size="8" fill="#555">+ 1 delim</text>

  <!-- ACK -->
  <rect x="636" y="80" width="50" height="65" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="661" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a5a1a">ACK</text>
  <text x="661" y="121" text-anchor="middle" font-size="8" fill="#1a5a1a">2 bits</text>
  <text x="661" y="135" text-anchor="middle" font-size="7" fill="#555">slot + del</text>

  <!-- EOF -->
  <rect x="686" y="80" width="50" height="65" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <text x="711" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#555">EOF</text>
  <text x="711" y="121" text-anchor="middle" font-size="8" fill="#555">7 bits</text>
  <text x="711" y="135" text-anchor="middle" font-size="7" fill="#888">all recessive</text>

  <!-- IFS -->
  <rect x="736" y="80" width="50" height="65" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <text x="761" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#555">IFS</text>
  <text x="761" y="121" text-anchor="middle" font-size="8" fill="#555">3 bits</text>
  <text x="761" y="135" text-anchor="middle" font-size="7" fill="#888">interframe</text>

  <!-- Total frame length annotation -->
  <line x1="30" y1="155" x2="786" y2="155" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="408" y="168" text-anchor="middle" font-size="9" fill="#555">Total (8-byte payload): ~130 bits @ 500kbps = ~260 µs/frame | ~3846 frames/sec</text>

  <!-- 29-bit ID brace -->
  <line x1="60" y1="75" x2="260" y2="75" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="160" y="72" text-anchor="middle" font-size="9" fill="#1a6eb5" font-weight="bold">29-bit CAN ID (extended) — uniquely identifies message type on bus</text>

  <!-- Annotations (bottom) -->
  <!-- ID explanation -->
  <rect x="30" y="185" width="220" height="110" rx="6" fill="#e8f4fd" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="140" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6eb5">CAN ID (29-bit extended)</text>
  <text x="40" y="218" font-size="9" fill="#333">Used by J1939 for PGN addressing</text>
  <text x="40" y="231" font-size="9" fill="#333">BMS SOC message: 0x18F21402</text>
  <text x="40" y="244" font-size="9" fill="#555">  bits 28-26: priority (0–7)</text>
  <text x="40" y="257" font-size="9" fill="#555">  bits 25-8: PGN (parameter group)</text>
  <text x="40" y="270" font-size="9" fill="#555">  bits 7-0: source address (0x02=BMS)</text>
  <text x="40" y="283" font-size="9" fill="#888">Lower ID = higher priority on bus</text>

  <!-- DATA layout for BMS SOC message -->
  <rect x="262" y="185" width="360" height="110" rx="6" fill="#fffaee" stroke="#c8a000" stroke-width="1.5"/>
  <text x="442" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a5000">Example: BMS SOC message payload</text>
  <text x="272" y="218" font-size="9" fill="#333">Byte 0: SOC (0–200 = 0–100%, res 0.5%)</text>
  <text x="272" y="231" font-size="9" fill="#333">Byte 1–2: Pack voltage (uint16, 0.1V res)</text>
  <text x="272" y="244" font-size="9" fill="#333">Byte 3–4: Pack current (int16, 0.1A res)</text>
  <text x="272" y="257" font-size="9" fill="#333">Byte 5: Max cell temp (uint8, 1°C offset)</text>
  <text x="272" y="270" font-size="9" fill="#333">Byte 6: Fault flags (bitmask)</text>
  <text x="272" y="283" font-size="9" fill="#555">Byte 7: Reserved / checksum</text>

  <!-- CRC and ACK explanation -->
  <rect x="634" y="185" width="238" height="110" rx="6" fill="#f0fff0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="753" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5a1a">CRC + ACK reliability</text>
  <text x="644" y="218" font-size="9" fill="#333">CRC-15: detects up to 5 random bit</text>
  <text x="644" y="231" font-size="9" fill="#333">errors per frame (Hamming distance 6)</text>
  <text x="644" y="244" font-size="9" fill="#333">ACK: ANY node receiving correctly</text>
  <text x="644" y="257" font-size="9" fill="#333">must pull the ACK bit dominant</text>
  <text x="644" y="270" font-size="9" fill="#555">→ Transmitter retransmits on NACK</text>
  <text x="644" y="283" font-size="9" fill="#888">→ Error frame if too many errors</text>

  <!-- Bit stuffing note -->
  <rect x="30" y="308" width="840" height="36" rx="6" fill="#fff0f0" stroke="#c00" stroke-width="1"/>
  <text x="450" y="325" text-anchor="middle" font-size="10" font-weight="bold" fill="#c00">Bit Stuffing Rule: After 5 identical bits, one complementary bit is inserted. Prevents long runs that confuse clock sync.</text>
  <text x="450" y="338" text-anchor="middle" font-size="9" fill="#555">Stuffed bits are NOT part of the data — receiver strips them. Bit stuffing can increase frame length by up to 20%.</text>

  <!-- Physical layer note -->
  <rect x="30" y="358" width="840" height="72" rx="6" fill="#f0f0ff" stroke="#5555cc" stroke-width="1"/>
  <text x="450" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Physical Layer (ISO 11898-2)</text>
  <text x="450" y="391" text-anchor="middle" font-size="10" fill="#555">Differential pair: CANH and CANL  |  Dominant = 0 (CANH−CANL ≈ +2V)  |  Recessive = 1 (CANH≈CANL)</text>
  <text x="450" y="407" text-anchor="middle" font-size="10" fill="#555">120Ω termination at each end  |  Bus wired-AND: any node can pull dominant  |  Open-drain = CSMA/CD bus access</text>
  <text x="450" y="423" text-anchor="middle" font-size="9" fill="#888">Typical bus length: 40m @ 1Mbps  |  500m @ 125kbps  |  EV BMS typically uses 500kbps or 1Mbps for real-time safety data</text>
</svg>
