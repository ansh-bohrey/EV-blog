<svg viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="460" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">RS-485 Termination &amp; DE/RE Direction Control</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#555">Proper termination prevents reflections; DE/RE control switches the bus between TX and RX</text>

  <defs>
    <marker id="rs485arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ── BUS TOPOLOGY with termination ── -->
  <!-- Main bus lines -->
  <line x1="100" y1="145" x2="720" y2="145" stroke="#c00" stroke-width="2.5"/>
  <line x1="100" y1="165" x2="720" y2="165" stroke="#1a6eb5" stroke-width="2.5"/>
  <text x="56" y="149" text-anchor="end" font-size="9" fill="#c00" font-weight="bold">A</text>
  <text x="56" y="169" text-anchor="end" font-size="9" fill="#1a6eb5" font-weight="bold">B</text>

  <!-- Left termination (master end) -->
  <rect x="88" y="138" width="12" height="34" rx="2" fill="#e07b00" stroke="#e07b00" stroke-width="1"/>
  <text x="80" y="190" text-anchor="end" font-size="9" fill="#e07b00">Rt=120Ω</text>
  <text x="80" y="202" text-anchor="end" font-size="8" fill="#888">(end of bus)</text>

  <!-- Right termination -->
  <rect x="720" y="138" width="12" height="34" rx="2" fill="#e07b00" stroke="#e07b00" stroke-width="1"/>
  <text x="748" y="190" font-size="9" fill="#e07b00">Rt=120Ω</text>
  <text x="748" y="202" font-size="8" fill="#888">(far end)</text>

  <!-- Bias resistors (pullup/pulldown on A and B) -->
  <line x1="200" y1="145" x2="200" y2="100" stroke="#888" stroke-width="1.5"/>
  <rect x="190" y="75" width="20" height="25" rx="2" fill="#fff0d0" stroke="#888" stroke-width="1"/>
  <text x="225" y="91" font-size="8" fill="#888">Rb≈560Ω</text>
  <text x="225" y="102" font-size="8" fill="#888">(pull to Vcc)</text>
  <line x1="200" y1="75" x2="200" y2="65" stroke="#888" stroke-width="1.5"/>
  <text x="200" y="62" text-anchor="middle" font-size="8" fill="#c00">+5V</text>

  <line x1="200" y1="165" x2="200" y2="210" stroke="#888" stroke-width="1.5"/>
  <rect x="190" y="210" width="20" height="25" rx="2" fill="#fff0d0" stroke="#888" stroke-width="1"/>
  <text x="225" y="226" font-size="8" fill="#888">Rb≈560Ω</text>
  <text x="225" y="237" font-size="8" fill="#888">(pull to GND)</text>
  <line x1="200" y1="235" x2="200" y2="250" stroke="#888" stroke-width="1.5"/>
  <text x="200" y="262" text-anchor="middle" font-size="8" fill="#555">GND</text>

  <!-- Master node -->
  <line x1="140" y1="145" x2="140" y2="80" stroke="#555" stroke-width="1.5"/>
  <line x1="140" y1="165" x2="140" y2="200" stroke="#555" stroke-width="1.5"/>
  <rect x="80" y="55" width="120" height="60" rx="6" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="140" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#330080">Master MCU</text>
  <text x="140" y="90" text-anchor="middle" font-size="9" fill="#555">MAX485 transceiver</text>
  <text x="140" y="103" text-anchor="middle" font-size="8" fill="#2a7a2a">DE=1, RE=0 → TX</text>
  <text x="140" y="113" text-anchor="middle" font-size="8" fill="#1a6eb5">DE=0, RE=0 → RX</text>

  <!-- Slave 1 -->
  <line x1="400" y1="145" x2="400" y2="80" stroke="#555" stroke-width="1.5"/>
  <line x1="400" y1="165" x2="400" y2="200" stroke="#555" stroke-width="1.5"/>
  <rect x="340" y="55" width="120" height="60" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="400" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5a1a">Slave 1</text>
  <text x="400" y="90" text-anchor="middle" font-size="9" fill="#555">MAX485</text>
  <text x="400" y="103" text-anchor="middle" font-size="8" fill="#c00">Addr: 0x01</text>
  <text x="400" y="113" text-anchor="middle" font-size="8" fill="#555">Default: RX mode</text>

  <!-- Slave 2 -->
  <line x1="600" y1="145" x2="600" y2="80" stroke="#555" stroke-width="1.5"/>
  <line x1="600" y1="165" x2="600" y2="200" stroke="#555" stroke-width="1.5"/>
  <rect x="540" y="55" width="120" height="60" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="600" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5a1a">Slave 2</text>
  <text x="600" y="90" text-anchor="middle" font-size="9" fill="#555">MAX485</text>
  <text x="600" y="103" text-anchor="middle" font-size="8" fill="#c00">Addr: 0x02</text>
  <text x="600" y="113" text-anchor="middle" font-size="8" fill="#555">Default: RX mode</text>

  <!-- ── DE/RE TIMING DIAGRAM ── -->
  <text x="410" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Half-duplex direction switching (DE/RE timing)</text>
  <!-- axes -->
  <line x1="60" y1="380" x2="760" y2="380" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="310" x2="60" y2="380" stroke="#333" stroke-width="1.5"/>

  <!-- DE signal (master): 0 at rest, 1 during TX, back to 0 -->
  <text x="55" y="328" text-anchor="end" font-size="9" fill="#333">DE</text>
  <polyline points="60,355 160,355 160,320 300,320 300,355 760,355" stroke="#2a8a2a" stroke-width="2" fill="none"/>
  <!-- TX DATA envelope -->
  <text x="55" y="350" text-anchor="end" font-size="9" fill="#333">Data</text>
  <polyline points="60,380 160,380 160,355 165,345 180,365 200,345 220,365 240,345 260,365 280,345 300,365 300,380 760,380"
            stroke="#1a6eb5" stroke-width="1.5" fill="none"/>

  <!-- RE signal -->
  <text x="55" y="365" text-anchor="end" font-size="9" fill="#333">RE</text>
  <polyline points="60,340 155,340 155,375 305,375 305,340 760,340" stroke="#c00" stroke-width="1.5" fill="none"/>

  <!-- T_DE and T_TA annotations -->
  <line x1="155" y1="385" x2="165" y2="385" stroke="#e07b00" stroke-width="1.5"/>
  <line x1="155" y1="380" x2="155" y2="395" stroke="#e07b00" stroke-width="1"/>
  <line x1="165" y1="380" x2="165" y2="395" stroke="#e07b00" stroke-width="1"/>
  <text x="160" y="408" text-anchor="middle" font-size="8" fill="#e07b00">T_DE setup</text>
  <text x="160" y="418" text-anchor="middle" font-size="8" fill="#555">≥200 ns</text>

  <line x1="298" y1="385" x2="308" y2="385" stroke="#e07b00" stroke-width="1.5"/>
  <line x1="298" y1="380" x2="298" y2="395" stroke="#e07b00" stroke-width="1"/>
  <line x1="308" y1="380" x2="308" y2="395" stroke="#e07b00" stroke-width="1"/>
  <text x="303" y="408" text-anchor="middle" font-size="8" fill="#e07b00">T_hold</text>
  <text x="303" y="418" text-anchor="middle" font-size="8" fill="#555">≥200 ns</text>

  <!-- Timing labels -->
  <text x="230" y="316" text-anchor="middle" font-size="9" fill="#2a7a2a">TX active (DE=1, RE=1)</text>
  <text x="530" y="336" text-anchor="middle" font-size="9" fill="#1a6eb5">RX mode (DE=0, RE=0)</text>

  <!-- Warning about bus idle -->
  <rect x="60" y="428" width="700" height="28" rx="5" fill="#fff8e0" stroke="#e0a000" stroke-width="1"/>
  <text x="410" y="446" text-anchor="middle" font-size="9" fill="#7a5000">⚠ Without bias resistors: bus floats during idle (no transmitter active) → noise interpreted as data. Always add Rb pull-up/pull-down on master node.</text>
</svg>
