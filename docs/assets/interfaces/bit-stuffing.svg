<svg viewBox="0 0 820 540" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="540" fill="#f8f9fa"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">CAN Bit Stuffing — Why It Exists and How It Works</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#555">After 5 consecutive identical bits, CAN inserts a complementary stuff bit to maintain clock sync</text>

  <!-- ===== SECTION 1: Without stuffing (raw data) ===== -->
  <text x="16" y="82" font-size="12" font-weight="bold" fill="#1a1a2e">1 — Raw data bits (before stuffing)</text>
  <text x="16" y="97" font-size="10" fill="#555">Example payload: 11111_0_110000_1 (underscores mark groups of 5)</text>

  <!-- Bit boxes - raw -->
  <!-- 5 ones -->
  <rect x="16" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="35" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="56" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="75" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="96" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="115" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="136" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="155" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="176" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="195" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <!-- zero -->
  <rect x="216" y="104" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="235" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <!-- 1 -->
  <rect x="256" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="275" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="296" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="315" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <!-- 4 zeros -->
  <rect x="336" y="104" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="355" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <rect x="376" y="104" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="395" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <rect x="416" y="104" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="435" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <rect x="456" y="104" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="475" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <!-- 1 -->
  <rect x="496" y="104" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="515" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>

  <!-- 5-bit group annotations -->
  <line x1="16" y1="142" x2="213" y2="142" stroke="#c00" stroke-width="1.5"/>
  <line x1="16" y1="139" x2="16" y2="145" stroke="#c00" stroke-width="1.5"/>
  <line x1="213" y1="139" x2="213" y2="145" stroke="#c00" stroke-width="1.5"/>
  <text x="114" y="155" text-anchor="middle" font-size="9" fill="#c00">5 consecutive 1s — triggers stuff</text>

  <line x1="336" y1="142" x2="533" y2="142" stroke="#c00" stroke-width="1.5"/>
  <line x1="336" y1="139" x2="336" y2="145" stroke="#c00" stroke-width="1.5"/>
  <line x1="533" y1="139" x2="533" y2="145" stroke="#c00" stroke-width="1.5"/>
  <text x="435" y="155" text-anchor="middle" font-size="9" fill="#c00">wait — only 4 zeros here, no stuff needed</text>

  <!-- ===== SECTION 2: After stuffing ===== -->
  <text x="16" y="178" font-size="12" font-weight="bold" fill="#1a1a2e">2 — After bit stuffing (transmitted on bus)</text>
  <text x="16" y="193" font-size="10" fill="#555">Stuff bits (yellow) are inserted automatically — receiver strips them</text>

  <!-- same bits but with stuff bit inserted after position 5 -->
  <!-- 5 ones -->
  <rect x="16" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="35" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="56" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="75" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="96" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="115" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="136" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="155" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="176" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="195" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <!-- STUFF BIT: complementary zero -->
  <rect x="216" y="200" width="38" height="34" rx="3" fill="#f5c518" stroke="#c8a000" stroke-width="2"/>
  <text x="235" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a4000">STUFF</text>
  <text x="235" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a4000">0</text>
  <!-- zero (original) -->
  <rect x="256" y="200" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="275" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <!-- 1, 1 -->
  <rect x="296" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="315" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <rect x="336" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="355" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <!-- 4 zeros -->
  <rect x="376" y="200" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="395" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <rect x="416" y="200" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="435" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <rect x="456" y="200" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="475" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <rect x="496" y="200" width="38" height="34" rx="3" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="515" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">0</text>
  <!-- 1 -->
  <rect x="536" y="200" width="38" height="34" rx="3" fill="#1a6eb5" stroke="#0a4a8a" stroke-width="1.5"/>
  <text x="555" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>

  <!-- Annotation: total bits -->
  <text x="580" y="212" font-size="10" fill="#555">13 data bits</text>
  <text x="580" y="226" font-size="10" fill="#c8a000">+1 stuff bit</text>
  <text x="580" y="240" font-size="10" fill="#1a1a2e">= 14 total</text>

  <!-- ===== SECTION 3: Bus waveform ===== -->
  <text x="16" y="264" font-size="12" font-weight="bold" fill="#1a1a2e">3 — Bus waveform (CANH − CANL differential)</text>

  <!-- Waveform -->
  <rect x="16" y="272" width="760" height="100" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="16" y1="322" x2="776" y2="322" stroke="#eee" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="6" y="326" text-anchor="end" font-size="9" fill="#888">0V</text>
  <text x="6" y="286" text-anchor="end" font-size="9" fill="#888">2V</text>

  <!-- Waveform path: 1=high (2V diff), 0=low (0V diff) -->
  <!-- bit positions: 1  1  1  1  1  S0  0  1  1  0  0  0  0  1 -->
  <!-- Each bit ~50px wide -->
  <polyline stroke="#1a6eb5" stroke-width="2.5" fill="none" points="
    26,280 76,280
    76,280 76,364 126,364
    126,364 126,280 176,280
    176,280 176,280 226,280
    226,280 226,280 276,280
    276,280 276,280 326,280
    326,280 326,364 376,364
    376,364 376,364 426,364
    426,364 426,280 476,280
    476,280 476,280 526,280
    526,280 526,364 576,364
    576,364 576,364 626,364
    626,364 626,364 676,364
    676,364 676,364 726,364
    726,364 726,280 776,280
  "/>
  <!-- Labels for recessive/dominant -->
  <text x="40" y="276" text-anchor="middle" font-size="8" fill="#1a6eb5">DOM</text>
  <text x="90" y="368" text-anchor="middle" font-size="8" fill="#888">REC</text>

  <!-- Bit position labels -->
  <text x="51" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>
  <text x="101" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>
  <text x="151" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>
  <text x="201" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>
  <text x="251" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>
  <text x="301" y="386" text-anchor="middle" font-size="9" fill="#c8a000" font-weight="bold">S:0</text>
  <text x="351" y="386" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="401" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>
  <text x="451" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>
  <text x="501" y="386" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="551" y="386" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="601" y="386" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="651" y="386" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="701" y="386" text-anchor="middle" font-size="9" fill="#1a6eb5">1</text>

  <!-- Annotation: stuff bit -->
  <rect x="276" y="270" width="50" height="110" rx="0" fill="rgba(245,197,24,0.2)" stroke="#c8a000" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="301" y="395" text-anchor="middle" font-size="9" fill="#c8a000" font-weight="bold">stuff bit</text>

  <!-- ===== INFO CARDS ===== -->
  <rect x="16" y="408" width="185" height="114" rx="6" fill="white" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="108" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6eb5">Why bit stuffing?</text>
  <text x="26" y="440" font-size="9" fill="#333">CAN uses NRZ encoding — no clock</text>
  <text x="26" y="453" font-size="9" fill="#333">embedded in signal. Long runs of</text>
  <text x="26" y="466" font-size="9" fill="#333">identical bits cause receivers to</text>
  <text x="26" y="479" font-size="9" fill="#333">drift (no edge to re-sync on).</text>
  <text x="26" y="495" font-size="9" fill="#333">Stuffing guarantees an edge every</text>
  <text x="26" y="508" font-size="9" fill="#c00">≤5 bits — keeps nodes in sync.</text>

  <rect x="213" y="408" width="185" height="114" rx="6" fill="white" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="305" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a8a2a">Rule (ISO 11898-1)</text>
  <text x="223" y="440" font-size="9" fill="#333">Applies to: SOF through CRC</text>
  <text x="223" y="453" font-size="9" fill="#555">(NOT to ACK, EOF, IFS fields)</text>
  <text x="223" y="470" font-size="9" fill="#333">After 5 same bits: insert opposite.</text>
  <text x="223" y="483" font-size="9" fill="#333">Receiver detects 6-in-a-row as</text>
  <text x="223" y="496" font-size="9" fill="#c00">stuff error → fault confinement.</text>
  <text x="223" y="512" font-size="9" fill="#555">Max frame overhead: ~20%</text>

  <rect x="410" y="408" width="185" height="114" rx="6" fill="white" stroke="#e07b00" stroke-width="1.5"/>
  <text x="502" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#e07b00">Worst-case frame size</text>
  <text x="420" y="440" font-size="9" fill="#333">Standard frame: 44 control bits</text>
  <text x="420" y="453" font-size="9" fill="#333">+ 64 data bits = 108 bits before</text>
  <text x="420" y="466" font-size="9" fill="#333">stuffing (fields that are stuffed).</text>
  <text x="420" y="482" font-size="9" fill="#333">Worst case: every 5th bit stuffed</text>
  <text x="420" y="495" font-size="9" fill="#c00">→ +108/5 = 21 extra bits max.</text>
  <text x="420" y="511" font-size="9" fill="#555">Total: 129 bits + EOF/IFS overhead</text>

  <rect x="607" y="408" width="175" height="114" rx="6" fill="white" stroke="#c00" stroke-width="1.5"/>
  <text x="694" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#c00">Stuff error detection</text>
  <text x="617" y="440" font-size="9" fill="#333">Any node seeing 6 identical bits</text>
  <text x="617" y="453" font-size="9" fill="#333">where a stuff bit was expected</text>
  <text x="617" y="466" font-size="9" fill="#333">flags a stuff error.</text>
  <text x="617" y="482" font-size="9" fill="#333">The node sends an error frame</text>
  <text x="617" y="495" font-size="9" fill="#555">(6 dominant bits) to abort.</text>
  <text x="617" y="511" font-size="9" fill="#555">TEC/REC counter incremented.</text>
</svg>
