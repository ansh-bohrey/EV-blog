<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="880" height="520" fill="#f8f9fa"/>
  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">RS-485 vs RS-232 — Physical Layer Comparison</text>
  <text x="440" y="48" text-anchor="middle" font-size="11" fill="#555">RS-232 for debug/PC links | RS-485 for multi-drop and long cable runs in BMS</text>

  <!-- ── RS-232 (left) ── -->
  <rect x="20" y="60" width="380" height="340" rx="10" fill="white" stroke="#1a6eb5" stroke-width="2"/>
  <text x="210" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6eb5">RS-232</text>

  <!-- Point-to-point diagram -->
  <rect x="40" y="100" width="90" height="50" rx="5" fill="#e8d0ff" stroke="#6633cc" stroke-width="1.5"/>
  <text x="85" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#330080">MCU</text>
  <!-- TX line (single ended) -->
  <line x1="130" y1="118" x2="270" y2="118" stroke="#c00" stroke-width="2"/>
  <text x="200" y="113" text-anchor="middle" font-size="9" fill="#c00">TX → (single-ended)</text>
  <!-- RX line -->
  <line x1="130" y1="135" x2="270" y2="135" stroke="#1a6eb5" stroke-width="2"/>
  <text x="200" y="148" text-anchor="middle" font-size="9" fill="#1a6eb5">← RX</text>
  <!-- GND -->
  <line x1="130" y1="145" x2="270" y2="145" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="200" y="160" text-anchor="middle" font-size="8" fill="#555">GND (common)</text>

  <rect x="270" y="100" width="90" height="50" rx="5" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="315" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5a1a">PC</text>

  <!-- Voltage levels -->
  <text x="210" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Voltage levels</text>
  <rect x="35" y="192" width="350" height="50" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <text x="210" y="208" text-anchor="middle" font-size="9" fill="#c00">Logic 0 (SPACE): +3V to +15V (typ +12V)</text>
  <text x="210" y="222" text-anchor="middle" font-size="9" fill="#1a6eb5">Logic 1 (MARK): −3V to −15V (typ −12V)</text>
  <text x="210" y="234" text-anchor="middle" font-size="8" fill="#888">Inverted logic! +V = 0, −V = 1</text>

  <!-- Specs -->
  <text x="35" y="262" font-size="10" fill="#333">Max speed:       115,200 bps (practical) / 1 Mbps (theory)</text>
  <text x="35" y="277" font-size="10" fill="#333">Max cable length: ~15 m at 9600 bps</text>
  <text x="35" y="292" font-size="10" fill="#333">Topology:         Point-to-point only (1 TX, 1 RX)</text>
  <text x="35" y="307" font-size="10" fill="#333">Nodes:            2 (master + slave)</text>
  <text x="35" y="322" font-size="10" fill="#333">Noise immunity:   Poor (single-ended, high swing)</text>
  <text x="35" y="337" font-size="10" fill="#555">Connector:        DB-9 (male, DTE) or 3-pin header</text>
  <text x="35" y="352" font-size="10" fill="#2a7a2a">BMS use case:     Debug console, factory programming</text>
  <text x="35" y="367" font-size="10" fill="#c00">Not used on bus — dedicated cable only</text>
  <text x="35" y="385" font-size="9" fill="#888">Example: BMS UART debug port → USB-serial adapter → laptop</text>

  <!-- ── RS-485 (right) ── -->
  <rect x="470" y="60" width="390" height="340" rx="10" fill="white" stroke="#2a8a2a" stroke-width="2"/>
  <text x="665" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a8a2a">RS-485 (EIA-485)</text>

  <!-- Multi-drop bus diagram -->
  <!-- Horizontal bus lines -->
  <line x1="490" y1="118" x2="840" y2="118" stroke="#c00" stroke-width="2.5"/>
  <line x1="490" y1="135" x2="840" y2="135" stroke="#1a6eb5" stroke-width="2.5"/>
  <text x="490" y="112" font-size="9" fill="#c00" font-weight="bold">A (−)</text>
  <text x="490" y="144" font-size="9" fill="#1a6eb5" font-weight="bold">B (+)</text>

  <!-- 4 nodes hanging off bus -->
  <!-- Node 1: Master BMS -->
  <line x1="530" y1="118" x2="530" y2="100" stroke="#555" stroke-width="1.5"/>
  <line x1="530" y1="135" x2="530" y2="153" stroke="#555" stroke-width="1.5"/>
  <rect x="490" y="60" width="80" height="40" rx="4" fill="#e8d0ff" stroke="#6633cc" stroke-width="1.5"/>
  <text x="530" y="83" text-anchor="middle" font-size="9" font-weight="bold" fill="#330080">Master BMS</text>
  <text x="530" y="95" text-anchor="middle" font-size="8" fill="#555">DE=1 TX</text>

  <!-- Node 2 -->
  <line x1="620" y1="118" x2="620" y2="100" stroke="#555" stroke-width="1.5"/>
  <line x1="620" y1="135" x2="620" y2="153" stroke="#555" stroke-width="1.5"/>
  <rect x="580" y="60" width="80" height="40" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="620" y="83" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a5a1a">Slave 1</text>
  <text x="620" y="95" text-anchor="middle" font-size="8" fill="#555">Addr: 0x01</text>

  <!-- Node 3 -->
  <line x1="710" y1="118" x2="710" y2="100" stroke="#555" stroke-width="1.5"/>
  <line x1="710" y1="135" x2="710" y2="153" stroke="#555" stroke-width="1.5"/>
  <rect x="670" y="60" width="80" height="40" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="710" y="83" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a5a1a">Slave 2</text>
  <text x="710" y="95" text-anchor="middle" font-size="8" fill="#555">Addr: 0x02</text>

  <!-- Node 4 -->
  <line x1="800" y1="118" x2="800" y2="100" stroke="#555" stroke-width="1.5"/>
  <line x1="800" y1="135" x2="800" y2="153" stroke="#555" stroke-width="1.5"/>
  <rect x="760" y="60" width="80" height="40" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="800" y="83" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a5a1a">Slave 3</text>
  <text x="800" y="95" text-anchor="middle" font-size="8" fill="#555">Addr: 0x03</text>

  <!-- Termination resistors -->
  <rect x="486" y="121" width="6" height="10" fill="#e07b00"/>
  <text x="480" y="160" text-anchor="end" font-size="8" fill="#e07b00">120Ω</text>
  <rect x="836" y="121" width="6" height="10" fill="#e07b00"/>
  <text x="856" y="160" font-size="8" fill="#e07b00">120Ω</text>

  <!-- Specs -->
  <text x="480" y="185" font-size="10" fill="#333">Differential:     A−B (+ = 1, − = 0), ±200V CM range</text>
  <text x="480" y="200" font-size="10" fill="#333">Max speed:         10 Mbps (short run) / 100kbps (1200m)</text>
  <text x="480" y="215" font-size="10" fill="#333">Max cable length:  1200 m at low baud</text>
  <text x="480" y="230" font-size="10" fill="#333">Topology:          Multi-drop bus (up to 32 unit loads)</text>
  <text x="480" y="245" font-size="10" fill="#333">Nodes:             1 master, up to 31 slaves (classic)</text>
  <text x="480" y="260" font-size="10" fill="#333">Noise immunity:    Excellent (differential, CMRR &gt;60dB)</text>
  <text x="480" y="275" font-size="10" fill="#2a7a2a">BMS use case:     Modular BMS: master↔cell modules</text>
  <text x="480" y="290" font-size="10" fill="#2a7a2a">                  Industrial chargers (Modbus RTU)</text>
  <text x="480" y="305" font-size="10" fill="#555">Protocol:          Modbus RTU is common overlay</text>
  <text x="480" y="320" font-size="10" fill="#555">DE/RE pin:         Controls TX enable (high=TX, low=RX)</text>
  <text x="480" y="335" font-size="9" fill="#888">Example: Orion BMS uses CAN + RS-232/485 for config</text>
  <text x="480" y="348" font-size="9" fill="#888">BMS slave modules report cell data to master via RS-485</text>
  <text x="480" y="363" font-size="9" fill="#888">at 115.2kbps with hardware flow control</text>
  <text x="480" y="378" font-size="9" fill="#888">Half-duplex: only one node transmits at a time</text>

  <!-- Comparison table at bottom -->
  <rect x="20" y="415" width="840" height="90" rx="8" fill="#f0f0ff" stroke="#5555cc" stroke-width="1.5"/>
  <text x="440" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Head-to-head comparison</text>
  <line x1="20" y1="437" x2="860" y2="437" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="451" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Property</text>
  <text x="260" y="451" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a6eb5">RS-232</text>
  <text x="440" y="451" text-anchor="middle" font-size="9" font-weight="bold" fill="#2a8a2a">RS-485</text>
  <text x="680" y="451" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Notes</text>
  <line x1="20" y1="454" x2="860" y2="454" stroke="#eee" stroke-width="1"/>

  <text x="90" y="466" text-anchor="middle" font-size="9" fill="#555">Nodes</text>
  <text x="260" y="466" text-anchor="middle" font-size="9" fill="#c00">2 only</text>
  <text x="440" y="466" text-anchor="middle" font-size="9" fill="#2a7a2a">Up to 32 (255 w/ repeaters)</text>
  <text x="680" y="466" text-anchor="middle" font-size="9" fill="#555">RS-485 scales; RS-232 doesn't</text>

  <text x="90" y="480" text-anchor="middle" font-size="9" fill="#555">Max distance</text>
  <text x="260" y="480" text-anchor="middle" font-size="9" fill="#c00">~15 m</text>
  <text x="440" y="480" text-anchor="middle" font-size="9" fill="#2a7a2a">1200 m</text>
  <text x="680" y="480" text-anchor="middle" font-size="9" fill="#555">RS-485 for industrial/EV runs</text>

  <text x="90" y="494" text-anchor="middle" font-size="9" fill="#555">Signaling</text>
  <text x="260" y="494" text-anchor="middle" font-size="9" fill="#c00">Single-ended ±12V</text>
  <text x="440" y="494" text-anchor="middle" font-size="9" fill="#2a7a2a">Differential ±5V</text>
  <text x="680" y="494" text-anchor="middle" font-size="9" fill="#555">RS-485 immune to common-mode noise</text>
</svg>
