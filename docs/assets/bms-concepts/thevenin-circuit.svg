<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="350" fill="#ffffff"/>

  <!-- Outer bounding box with label -->
  <rect x="12" y="12" width="676" height="326" rx="8" ry="8"
        fill="none" stroke="#3a3a5c" stroke-width="1.8" stroke-dasharray="8,4"/>
  <rect x="240" y="4" width="220" height="18" fill="#ffffff"/>
  <text x="350" y="17" text-anchor="middle" font-size="11" fill="#3a3a5c" font-weight="600"
        letter-spacing="0.04em">2RC THEVENIN ECM — STANDARD BMS MODEL</text>

  <!-- ─────────────────────────────────────────────
       CIRCUIT WIRING
       Top rail: V+ (right) ← R2 ← node B ← R1 ← node A ← R0 ← OCV+ (left)
       Bottom rail: connects OCV− (left) → V− (right)
  ───────────────────────────────────────────────── -->

  <!-- Top rail segments -->
  <!-- V+ terminal to right end of RC2 -->
  <line x1="648" y1="105" x2="590" y2="105" stroke="#2c2c5e" stroke-width="2.2"/>
  <!-- Between RC2 right and RC2 component node -->
  <!-- RC2 spans x=490..590, midpoint node x=490 -->
  <!-- Between RC2 left and RC1 right -->
  <line x1="490" y1="105" x2="430" y2="105" stroke="#2c2c5e" stroke-width="2.2"/>
  <!-- RC1 spans x=330..430, node x=330 -->
  <!-- Between RC1 left and right of R0 -->
  <line x1="330" y1="105" x2="270" y2="105" stroke="#2c2c5e" stroke-width="2.2"/>
  <!-- R0 spans x=200..270 -->
  <!-- Between R0 left and OCV+ (top of circle) -->
  <line x1="200" y1="105" x2="120" y2="105" stroke="#2c2c5e" stroke-width="2.2"/>
  <!-- OCV circle top wire -->
  <line x1="80" y1="83" x2="80" y2="105" stroke="#2c2c5e" stroke-width="2.2"/>

  <!-- Bottom rail: OCV- to V- -->
  <line x1="80" y1="227" x2="648" y2="227" stroke="#2c2c5e" stroke-width="2.2"/>
  <!-- OCV circle bottom wire -->
  <line x1="80" y1="195" x2="80" y2="227" stroke="#2c2c5e" stroke-width="2.2"/>

  <!-- RC1: vertical wires for parallel C1 -->
  <line x1="330" y1="105" x2="330" y2="145" stroke="#2c2c5e" stroke-width="1.8"/>
  <line x1="330" y1="195" x2="330" y2="227" stroke="#2c2c5e" stroke-width="1.8"/>
  <line x1="430" y1="105" x2="430" y2="145" stroke="#2c2c5e" stroke-width="1.8"/>
  <line x1="430" y1="195" x2="430" y2="227" stroke="#2c2c5e" stroke-width="1.8"/>
  <!-- RC1 bottom connector -->
  <line x1="330" y1="227" x2="430" y2="227" stroke="#2c2c5e" stroke-width="1.8"/>

  <!-- RC2: vertical wires for parallel C2 -->
  <line x1="490" y1="105" x2="490" y2="145" stroke="#2c2c5e" stroke-width="1.8"/>
  <line x1="490" y1="195" x2="490" y2="227" stroke="#2c2c5e" stroke-width="1.8"/>
  <line x1="590" y1="105" x2="590" y2="145" stroke="#2c2c5e" stroke-width="1.8"/>
  <line x1="590" y1="195" x2="590" y2="227" stroke="#2c2c5e" stroke-width="1.8"/>
  <!-- RC2 bottom connector -->
  <line x1="490" y1="227" x2="590" y2="227" stroke="#2c2c5e" stroke-width="1.8"/>

  <!-- ─────────────────────────────────────────────
       OCV VOLTAGE SOURCE  (circle, centered x=80 y=139)
  ───────────────────────────────────────────────── -->
  <circle cx="80" cy="139" r="44" fill="#f0f4ff" stroke="#2255aa" stroke-width="2.2"/>
  <!-- Plus and minus symbols -->
  <text x="80" y="116" text-anchor="middle" font-size="16" fill="#2255aa" font-weight="700">+</text>
  <text x="80" y="168" text-anchor="middle" font-size="16" fill="#2255aa" font-weight="700">−</text>
  <!-- OCV label inside -->
  <text x="80" y="140" text-anchor="middle" font-size="9.5" fill="#2255aa" font-weight="600">OCV</text>
  <text x="80" y="152" text-anchor="middle" font-size="8.5" fill="#3a5a9a">(SOC, T)</text>

  <!-- ─────────────────────────────────────────────
       R0 RESISTOR  (rectangle) x=200..270 centered on y=105
  ───────────────────────────────────────────────── -->
  <rect x="200" y="93" width="70" height="24" rx="4" ry="4"
        fill="#fff8e8" stroke="#b05000" stroke-width="2"/>
  <text x="235" y="108" text-anchor="middle" font-size="10" fill="#7a3500" font-weight="700">R₀</text>

  <!-- R0 annotation below -->
  <text x="235" y="130" text-anchor="middle" font-size="9" fill="#8a4000" font-weight="600">R₀</text>
  <text x="235" y="141" text-anchor="middle" font-size="8.5" fill="#555">Ohmic resistance</text>
  <text x="235" y="152" text-anchor="middle" font-size="8.5" fill="#555">(SEI + electrolyte)</text>

  <!-- ─────────────────────────────────────────────
       RC PAIR 1  — R1 (top branch) ‖ C1 (bottom branch)
       x range 330..430, top rail y=105, bottom rail y=227
       R1: top branch, y=105 → rectangle
       C1: parallel, bottom position
  ───────────────────────────────────────────────── -->
  <!-- R1 resistor (top half of RC1) -->
  <rect x="345" y="93" width="70" height="24" rx="4" ry="4"
        fill="#fff8e8" stroke="#b05000" stroke-width="2"/>
  <text x="380" y="108" text-anchor="middle" font-size="10" fill="#7a3500" font-weight="700">R₁</text>

  <!-- Horizontal wire for R1 at y=105 -->
  <!-- already covered by top-rail segments above -->

  <!-- C1 capacitor (bottom branch of RC1) — two horizontal plates -->
  <line x1="330" y1="175" x2="420" y2="175" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="330" y1="165" x2="420" y2="165" stroke="#2c2c5e" stroke-width="1.6"/>
  <!-- Vertical connections inside RC1 loop for C1 -->
  <line x1="330" y1="145" x2="330" y2="165" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="330" y1="175" x2="330" y2="195" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="420" y1="145" x2="420" y2="165" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="420" y1="175" x2="420" y2="195" stroke="#2c2c5e" stroke-width="1.6"/>

  <!-- Wait — C1 is in parallel with R1. The parallel branch needs its own horizontal wire -->
  <!-- Left vertical: x=330 from top-rail (y=105) down through R1-bypass and C1 to bottom-rail (y=227) -->
  <!-- Right vertical: x=430 same -->
  <!-- The R1 rect is already on the top branch (top rail). C1 is mid-section. -->
  <!-- Add horizontal bypass wires from x=330 down to C1 and from x=430 -->

  <!-- RC1 annotation box -->
  <rect x="323" y="236" width="114" height="66" rx="4" fill="#f0f4ff" stroke="#2255aa" stroke-width="1"/>
  <text x="380" y="249" text-anchor="middle" font-size="9.5" fill="#2255aa" font-weight="700">R₁ ‖ C₁</text>
  <text x="380" y="261" text-anchor="middle" font-size="8.5" fill="#333">Charge transfer</text>
  <text x="380" y="272" text-anchor="middle" font-size="8.5" fill="#333">τ₁ = R₁C₁</text>
  <text x="380" y="283" text-anchor="middle" font-size="8.5" fill="#555">~ 10–100 s</text>
  <text x="380" y="295" text-anchor="middle" font-size="8" fill="#777">(fast dynamics)</text>

  <!-- ─────────────────────────────────────────────
       RC PAIR 2  — R2 ‖ C2   x range 490..590
  ───────────────────────────────────────────────── -->
  <!-- R2 resistor (top branch) -->
  <rect x="505" y="93" width="70" height="24" rx="4" ry="4"
        fill="#fff8e8" stroke="#b05000" stroke-width="2"/>
  <text x="540" y="108" text-anchor="middle" font-size="10" fill="#7a3500" font-weight="700">R₂</text>

  <!-- C2 capacitor plates -->
  <line x1="490" y1="175" x2="580" y2="175" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="490" y1="165" x2="580" y2="165" stroke="#2c2c5e" stroke-width="1.6"/>
  <!-- C2 internal vertical wires -->
  <line x1="490" y1="145" x2="490" y2="165" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="490" y1="175" x2="490" y2="195" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="580" y1="145" x2="580" y2="165" stroke="#2c2c5e" stroke-width="1.6"/>
  <line x1="580" y1="175" x2="580" y2="195" stroke="#2c2c5e" stroke-width="1.6"/>

  <!-- RC2 annotation box -->
  <rect x="482" y="236" width="116" height="66" rx="4" fill="#f0f4ff" stroke="#2255aa" stroke-width="1"/>
  <text x="540" y="249" text-anchor="middle" font-size="9.5" fill="#2255aa" font-weight="700">R₂ ‖ C₂</text>
  <text x="540" y="261" text-anchor="middle" font-size="8.5" fill="#333">Diffusion</text>
  <text x="540" y="272" text-anchor="middle" font-size="8.5" fill="#333">τ₂ = R₂C₂</text>
  <text x="540" y="283" text-anchor="middle" font-size="8.5" fill="#555">~ 100–1000 s</text>
  <text x="540" y="295" text-anchor="middle" font-size="8" fill="#777">(slow dynamics)</text>

  <!-- ─────────────────────────────────────────────
       TERMINALS V+ and V−
  ───────────────────────────────────────────────── -->
  <!-- V+ terminal (top-right) -->
  <circle cx="648" cy="105" r="7" fill="#2255aa" stroke="#ffffff" stroke-width="1.5"/>
  <text x="663" y="109" font-size="12" fill="#2255aa" font-weight="700">V+</text>

  <!-- V− terminal (bottom-right) -->
  <circle cx="648" cy="227" r="7" fill="#aa2222" stroke="#ffffff" stroke-width="1.5"/>
  <text x="663" y="231" font-size="12" fill="#aa2222" font-weight="700">V−</text>

  <!-- Right vertical connecting V+ to V− (terminal wire) -->
  <line x1="648" y1="112" x2="648" y2="220" stroke="#2c2c5e" stroke-width="2.2" stroke-dasharray="5,3"/>

  <!-- ─────────────────────────────────────────────
       TERMINAL VOLTAGE FORMULA — bottom banner
  ───────────────────────────────────────────────── -->
  <rect x="22" y="314" width="460" height="18" rx="3" fill="#e8f0ff" stroke="#2255aa" stroke-width="1"/>
  <text x="252" y="327" text-anchor="middle" font-size="10.5" fill="#1a2a6e" font-weight="700"
        font-family="'Courier New', monospace">
    V_terminal = OCV − I×R₀ − V_C1 − V_C2
  </text>

  <!-- Node dots -->
  <circle cx="330" cy="105" r="4" fill="#2c2c5e"/>
  <circle cx="430" cy="105" r="4" fill="#2c2c5e"/>
  <circle cx="490" cy="105" r="4" fill="#2c2c5e"/>
  <circle cx="590" cy="105" r="4" fill="#2c2c5e"/>
  <circle cx="330" cy="227" r="4" fill="#2c2c5e"/>
  <circle cx="430" cy="227" r="4" fill="#2c2c5e"/>
  <circle cx="490" cy="227" r="4" fill="#2c2c5e"/>
  <circle cx="590" cy="227" r="4" fill="#2c2c5e"/>
</svg>
