<svg viewBox="0 0 600 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="600" height="780" fill="#f8f9fa"/>
  <text x="300" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">BMS SOC Estimation Algorithm</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="300" cy="62" rx="80" ry="22" fill="#2a8a2a" stroke="#1a5a1a" stroke-width="2"/>
  <text x="300" y="67" text-anchor="middle" font-size="12" fill="white" font-weight="bold">BMS Powers On</text>

  <line x1="300" y1="84" x2="300" y2="108" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 1 -->
  <rect x="160" y="109" width="280" height="46" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="300" y="127" text-anchor="middle" font-size="11" fill="#003a7a">Read all cell voltages via AFE</text>
  <text x="300" y="144" text-anchor="middle" font-size="10" fill="#555">(SPI scan — all cells every 10 ms)</text>

  <line x1="300" y1="155" x2="300" y2="180" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision 1 -->
  <polygon points="300,181 430,218 300,255 170,218" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="300" y="213" text-anchor="middle" font-size="11" fill="#5a4000">Car parked &gt; 30 min?</text>
  <text x="300" y="228" text-anchor="middle" font-size="10" fill="#5a4000">(voltage relaxed to OCV?)</text>

  <!-- YES branch (right) -->
  <line x1="430" y1="218" x2="500" y2="218" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="212" text-anchor="middle" font-size="10" fill="#2a8a2a" font-weight="bold">YES</text>
  <rect x="501" y="196" width="85" height="45" rx="5" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="543" y="214" text-anchor="middle" font-size="10" fill="#1a5a1a">OCV Lookup</text>
  <text x="543" y="228" text-anchor="middle" font-size="10" fill="#1a5a1a">SOC₀=f(OCV,T)</text>
  <line x1="543" y1="241" x2="543" y2="290" stroke="#555" stroke-width="1.5"/>
  <line x1="543" y1="290" x2="358" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NO branch (left) -->
  <line x1="170" y1="218" x2="100" y2="218" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="135" y="212" text-anchor="middle" font-size="10" fill="#c00000" font-weight="bold">NO</text>
  <rect x="15" y="196" width="85" height="45" rx="5" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="57" y="214" text-anchor="middle" font-size="10" fill="#802000">Last stored</text>
  <text x="57" y="228" text-anchor="middle" font-size="10" fill="#802000">SOC as SOC₀</text>
  <line x1="57" y1="241" x2="57" y2="290" stroke="#555" stroke-width="1.5"/>
  <line x1="57" y1="290" x2="242" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Merge label -->
  <text x="300" y="285" text-anchor="middle" font-size="9" fill="#888">SOC₀ initialized</text>

  <!-- Step 2 -->
  <rect x="140" y="296" width="320" height="58" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="300" y="316" text-anchor="middle" font-size="11" fill="#003a7a" font-weight="bold">Coulomb Counting</text>
  <text x="300" y="332" text-anchor="middle" font-size="10" fill="#333">ΔSOC = −(∫I dt) / Q_nominal</text>
  <text x="300" y="346" text-anchor="middle" font-size="10" fill="#555">Integrates current sensor reading every 10 ms</text>

  <line x1="300" y1="354" x2="300" y2="378" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="120" y="379" width="360" height="72" rx="6" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="300" y="399" text-anchor="middle" font-size="11" fill="#330080" font-weight="bold">Model-Based Correction (EKF)</text>
  <text x="300" y="415" text-anchor="middle" font-size="10" fill="#333">Predict V_terminal from ECM (R₀, RC pairs)</text>
  <text x="300" y="430" text-anchor="middle" font-size="10" fill="#333">Compare to measured V_terminal from AFE</text>
  <text x="300" y="445" text-anchor="middle" font-size="10" fill="#333">Apply Kalman gain correction to SOC</text>

  <line x1="300" y1="451" x2="300" y2="475" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="160" y="476" width="280" height="44" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="300" y="494" text-anchor="middle" font-size="11" fill="#003a7a">Temperature &amp; Aging Corrections</text>
  <text x="300" y="509" text-anchor="middle" font-size="10" fill="#555">Compensate for cold capacity loss, Q_nominal drift</text>

  <line x1="300" y1="520" x2="300" y2="544" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="160" y="545" width="280" height="44" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="300" y="563" text-anchor="middle" font-size="11" fill="#1a5a1a">Publish SOC on CAN bus</text>
  <text x="300" y="578" text-anchor="middle" font-size="10" fill="#555">→ VCU, Instrument Cluster, OBC</text>

  <line x1="300" y1="589" x2="300" y2="613" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision 2 -->
  <polygon points="300,614 410,642 300,670 190,642" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="300" y="647" text-anchor="middle" font-size="11" fill="#5a4000">Key off?</text>

  <!-- NO loop back -->
  <line x1="190" y1="642" x2="80" y2="642" stroke="#555" stroke-width="2"/>
  <text x="135" y="636" text-anchor="middle" font-size="10" fill="#2a8a2a" font-weight="bold">NO</text>
  <line x1="80" y1="642" x2="80" y2="325" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="325" x2="140" y2="325" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="60" y="490" font-size="9" fill="#777" text-anchor="middle">Loop</text>
  <text x="60" y="502" font-size="9" fill="#777" text-anchor="middle">10 ms</text>

  <!-- YES path -->
  <line x1="300" y1="670" x2="300" y2="694" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="316" y="688" font-size="10" fill="#c00000" font-weight="bold">YES</text>

  <!-- Store SOC -->
  <rect x="160" y="695" width="280" height="38" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="300" y="713" text-anchor="middle" font-size="11" fill="#003a7a">Store final SOC to NV memory</text>
  <text x="300" y="728" text-anchor="middle" font-size="10" fill="#555">(survives power loss)</text>

  <line x1="300" y1="733" x2="300" y2="754" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- END -->
  <ellipse cx="300" cy="766" rx="60" ry="18" fill="#c00000" stroke="#7a0000" stroke-width="2"/>
  <text x="300" y="771" text-anchor="middle" font-size="12" fill="white" font-weight="bold">End / Sleep</text>
</svg>