<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="480" fill="#f8f9fa"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">LFP OCV Hysteresis — Why SOC Is Hard to Estimate</text>

  <!-- axes -->
  <line x1="80" y1="380" x2="660" y2="380" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="60" x2="80" y2="380" stroke="#333" stroke-width="2"/>
  <!-- x axis label -->
  <text x="370" y="410" text-anchor="middle" font-size="12" fill="#333">State of Charge (%)</text>
  <!-- y axis label -->
  <text x="20" y="225" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90,20,225)">OCV (V)</text>

  <!-- x ticks -->
  <line x1="80" y1="380" x2="80" y2="388" stroke="#555" stroke-width="1"/>
  <text x="80" y="398" text-anchor="middle" font-size="10" fill="#555">0</text>
  <line x1="196" y1="380" x2="196" y2="388" stroke="#555" stroke-width="1"/>
  <text x="196" y="398" text-anchor="middle" font-size="10" fill="#555">20</text>
  <line x1="312" y1="380" x2="312" y2="388" stroke="#555" stroke-width="1"/>
  <text x="312" y="398" text-anchor="middle" font-size="10" fill="#555">40</text>
  <line x1="428" y1="380" x2="428" y2="388" stroke="#555" stroke-width="1"/>
  <text x="428" y="398" text-anchor="middle" font-size="10" fill="#555">60</text>
  <line x1="544" y1="380" x2="544" y2="388" stroke="#555" stroke-width="1"/>
  <text x="544" y="398" text-anchor="middle" font-size="10" fill="#555">80</text>
  <line x1="660" y1="380" x2="660" y2="388" stroke="#555" stroke-width="1"/>
  <text x="660" y="398" text-anchor="middle" font-size="10" fill="#555">100</text>

  <!-- y ticks: 3.20 to 3.70 V mapped to y=360 to y=80 -->
  <!-- y = 380 - (V - 3.20)/(0.50) * 300 -->
  <line x1="80" y1="360" x2="74" y2="360" stroke="#555" stroke-width="1"/>
  <text x="72" y="364" text-anchor="end" font-size="10" fill="#555">3.20</text>
  <line x1="80" y1="300" x2="74" y2="300" stroke="#555" stroke-width="1"/>
  <text x="72" y="304" text-anchor="end" font-size="10" fill="#555">3.30</text>
  <line x1="80" y1="240" x2="74" y2="240" stroke="#555" stroke-width="1"/>
  <text x="72" y="244" text-anchor="end" font-size="10" fill="#555">3.40</text>
  <line x1="80" y1="180" x2="74" y2="180" stroke="#555" stroke-width="1"/>
  <text x="72" y="184" text-anchor="end" font-size="10" fill="#555">3.50</text>
  <line x1="80" y1="120" x2="74" y2="120" stroke="#555" stroke-width="1"/>
  <text x="72" y="124" text-anchor="end" font-size="10" fill="#555">3.60</text>
  <line x1="80" y1="80" x2="74" y2="80" stroke="#555" stroke-width="1"/>
  <text x="72" y="84" text-anchor="end" font-size="10" fill="#555">3.65</text>

  <!-- Grid lines -->
  <line x1="80" y1="300" x2="660" y2="300" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="240" x2="660" y2="240" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="180" x2="660" y2="180" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="120" x2="660" y2="120" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- NMC curve (sharp, distinctive) — blue, charging only for comparison -->
  <!-- NMC: rises quickly from 3.0 at 0% to 4.2 at 100% — sigmoid-like -->
  <path d="M80,350 C120,340 150,280 200,200 C240,140 280,110 370,100 C460,92 530,90 660,80"
        stroke="#1a6eb5" stroke-width="2.5" fill="none" stroke-dasharray="8,4"/>
  <text x="640" y="70" text-anchor="end" font-size="10" fill="#1a6eb5" font-weight="bold">NMC (reference)</text>
  <text x="640" y="82" text-anchor="end" font-size="10" fill="#1a6eb5">distinctive curve → easy SOC</text>

  <!-- LFP DISCHARGE curve (upper) — orange -->
  <!-- LFP flat plateau ~3.32-3.36V from 15% to 85% -->
  <path d="M80,355 C90,348 110,330 140,315 C155,306 175,294 196,285 C220,280 250,275 280,273 C310,272 340,271 370,271 C400,271 430,271 460,271 C490,271 520,272 544,273 C565,276 580,283 600,295 C620,308 640,325 660,350"
        stroke="#e07b00" stroke-width="2.5" fill="none"/>
  <text x="420" y="258" text-anchor="middle" font-size="10" fill="#e07b00" font-weight="bold">LFP Discharge (upper)</text>

  <!-- LFP CHARGE curve (lower) — red -->
  <path d="M80,365 C90,360 110,348 140,338 C155,332 175,323 196,316 C220,312 250,307 280,305 C310,304 340,303 370,303 C400,303 430,303 460,303 C490,303 520,304 544,305 C565,308 580,315 600,327 C620,340 640,355 660,370"
        stroke="#c00000" stroke-width="2.5" fill="none"/>
  <text x="420" y="320" text-anchor="middle" font-size="10" fill="#c00000" font-weight="bold">LFP Charge (lower)</text>

  <!-- Hysteresis band shading -->
  <path d="M196,285 C220,280 250,275 280,273 C310,272 340,271 370,271 C400,271 430,271 460,271 C490,271 520,272 544,273
           L544,305 C520,304 490,303 460,303 C430,303 400,303 370,303 C340,303 310,304 280,305 C250,307 220,312 196,316 Z"
        fill="#ffcc00" fill-opacity="0.25"/>

  <!-- Hysteresis arrow and label -->
  <line x1="370" y1="271" x2="370" y2="303" stroke="#c8a000" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="380" y="288" font-size="10" fill="#c8a000" font-weight="bold">ΔV ≈ 30 mV</text>
  <text x="380" y="300" font-size="9" fill="#888">(hysteresis band)</text>

  <!-- Flat plateau annotation -->
  <rect x="185" y="413" width="380" height="20" rx="3" fill="#fff8e0" stroke="#c8a000" stroke-width="1"/>
  <text x="375" y="427" text-anchor="middle" font-size="10" fill="#7a5000">Flat plateau: 15%–85% SOC all maps to 3.32–3.36 V → 1 mV error = 30% SOC error</text>

  <!-- same SOC different charge state box -->
  <rect x="88" y="55" width="280" height="62" rx="5" fill="#fff0f0" stroke="#c00000" stroke-width="1.5"/>
  <text x="228" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#c00000">Problem: Same voltage, different SOC</text>
  <text x="100" y="87" font-size="10" fill="#333">3.32 V after discharge → SOC ~55%</text>
  <text x="100" y="101" font-size="10" fill="#333">3.32 V after charge     → SOC ~25%</text>
  <text x="100" y="115" font-size="9" fill="#777">BMS must track current direction history</text>
</svg>
