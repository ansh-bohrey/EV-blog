<svg viewBox="0 0 760 660" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="660" fill="#f8f9fa"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Fault Detection → Severity Routing Flowchart</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#555">How the BMS MCU decides what to do with each fault event</text>

  <defs>
    <marker id="fsarr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <marker id="fsarr_r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c00"/>
    </marker>
    <marker id="fsarr_g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2a8a2a"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="380" cy="68" rx="100" ry="22" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <text x="380" y="73" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Fault Event Detected</text>
  <line x1="380" y1="90" x2="380" y2="112" stroke="#555" stroke-width="2" marker-end="url(#fsarr)"/>

  <!-- D1: In lookup table? -->
  <polygon points="380,113 500,143 380,173 260,143" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="380" y="138" text-anchor="middle" font-size="10" fill="#5a4000">In fault lookup table?</text>
  <text x="380" y="152" text-anchor="middle" font-size="9" fill="#888">(known fault code)</text>

  <!-- YES → continue -->
  <line x1="380" y1="173" x2="380" y2="196" stroke="#555" stroke-width="2" marker-end="url(#fsarr)"/>
  <text x="395" y="190" font-size="9" fill="#2a7a2a" font-weight="bold">YES</text>

  <!-- NO → log unknown -->
  <line x1="500" y1="143" x2="590" y2="143" stroke="#c00" stroke-width="1.5" marker-end="url(#fsarr_r)"/>
  <text x="545" y="137" text-anchor="middle" font-size="9" fill="#c00" font-weight="bold">NO</text>
  <rect x="590" y="128" width="130" height="36" rx="5" fill="#fff0f0" stroke="#c00" stroke-width="1.5"/>
  <text x="655" y="145" text-anchor="middle" font-size="9" fill="#c00">Log unknown fault</text>
  <text x="655" y="157" text-anchor="middle" font-size="9" fill="#555">→ L1 warning</text>

  <!-- D2: Severity level -->
  <polygon points="380,197 510,232 380,267 250,232" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="380" y="227" text-anchor="middle" font-size="10" fill="#5a4000">Severity level?</text>
  <text x="380" y="241" text-anchor="middle" font-size="9" fill="#888">(from lookup table)</text>

  <!-- Severity branches -->
  <!-- L1 left -->
  <line x1="250" y1="232" x2="130" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#fsarr)"/>
  <text x="190" y="225" text-anchor="middle" font-size="9" fill="#555">L1</text>

  <!-- L2 down-left -->
  <line x1="300" y1="262" x2="230" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#fsarr)"/>
  <text x="256" y="285" text-anchor="middle" font-size="9" fill="#555">L2</text>

  <!-- L3 down -->
  <line x1="380" y1="267" x2="380" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#fsarr)"/>
  <text x="395" y="293" font-size="9" fill="#555">L3</text>

  <!-- L4 right -->
  <line x1="510" y1="232" x2="590" y2="232" stroke="#c00" stroke-width="2" marker-end="url(#fsarr_r)"/>
  <text x="550" y="226" text-anchor="middle" font-size="9" fill="#c00" font-weight="bold">L4</text>

  <!-- L1 Action box -->
  <rect x="30" y="214" width="100" height="48" rx="6" fill="#fffaee" stroke="#c8a000" stroke-width="2"/>
  <text x="80" y="232" text-anchor="middle" font-size="9" font-weight="bold" fill="#7a5000">L1 WARNING</text>
  <text x="80" y="246" text-anchor="middle" font-size="8" fill="#333">Set DTC flag</text>
  <text x="80" y="258" text-anchor="middle" font-size="8" fill="#333">CAN: warn VCU</text>

  <!-- L2 Action box -->
  <rect x="140" y="314" width="110" height="58" rx="6" fill="#fff3e0" stroke="#e07b00" stroke-width="2"/>
  <text x="195" y="332" text-anchor="middle" font-size="9" font-weight="bold" fill="#7a3a00">L2 DERATE</text>
  <text x="195" y="347" text-anchor="middle" font-size="8" fill="#333">Reduce SOP 30–50%</text>
  <text x="195" y="360" text-anchor="middle" font-size="8" fill="#333">CAN: warn VCU</text>
  <text x="195" y="372" text-anchor="middle" font-size="8" fill="#555">Log DTC</text>

  <!-- L3 Action box -->
  <rect x="310" y="314" width="140" height="68" rx="6" fill="#ffe0e0" stroke="#c00" stroke-width="2"/>
  <text x="380" y="333" text-anchor="middle" font-size="9" font-weight="bold" fill="#900">L3 SHUTDOWN</text>
  <text x="380" y="348" text-anchor="middle" font-size="8" fill="#333">Open CHG or DSG FET</text>
  <text x="380" y="361" text-anchor="middle" font-size="8" fill="#333">CAN fault broadcast</text>
  <text x="380" y="374" text-anchor="middle" font-size="8" fill="#c00">Log to NV memory</text>
  <text x="380" y="386" text-anchor="middle" font-size="8" fill="#555">Req. service clear</text>

  <!-- L4 Action box -->
  <rect x="590" y="210" width="140" height="78" rx="6" fill="#ffe0f0" stroke="#800" stroke-width="2.5"/>
  <text x="660" y="230" text-anchor="middle" font-size="9" font-weight="bold" fill="#800">L4 EMERGENCY</text>
  <text x="660" y="245" text-anchor="middle" font-size="8" fill="#333">Open ALL contactors</text>
  <text x="660" y="258" text-anchor="middle" font-size="8" fill="#c00">Fire suppression</text>
  <text x="660" y="271" text-anchor="middle" font-size="8" fill="#c00">eCall trigger</text>
  <text x="660" y="284" text-anchor="middle" font-size="8" fill="#555">CAN: THERMAL_RUNAWAY</text>

  <!-- Merge to: Is fault cleared? -->
  <line x1="80" y1="262" x2="80" y2="460" stroke="#555" stroke-width="1.5"/>
  <line x1="195" y1="372" x2="195" y2="460" stroke="#555" stroke-width="1.5"/>
  <line x1="380" y1="382" x2="380" y2="460" stroke="#555" stroke-width="1.5"/>
  <line x1="80" y1="460" x2="380" y2="460" stroke="#555" stroke-width="1.5"/>
  <line x1="300" y1="460" x2="300" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#fsarr)"/>

  <!-- D3: Fault cleared? -->
  <polygon points="300,476 420,506 300,536 180,506" fill="#fff3b0" stroke="#c8a000" stroke-width="2"/>
  <text x="300" y="501" text-anchor="middle" font-size="10" fill="#5a4000">Fault condition</text>
  <text x="300" y="515" text-anchor="middle" font-size="9" fill="#5a4000">cleared?</text>

  <!-- YES: clear DTC -->
  <line x1="300" y1="536" x2="300" y2="560" stroke="#2a8a2a" stroke-width="2" marker-end="url(#fsarr_g)"/>
  <text x="316" y="554" font-size="9" fill="#2a7a2a" font-weight="bold">YES</text>
  <rect x="190" y="561" width="220" height="46" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="300" y="580" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a5a1a">Clear active fault flag</text>
  <text x="300" y="595" text-anchor="middle" font-size="9" fill="#555">Restore SOP to normal</text>
  <text x="300" y="607" text-anchor="middle" font-size="9" fill="#555">DTC remains in history log</text>

  <!-- NO: stay in fault -->
  <line x1="420" y1="506" x2="550" y2="506" stroke="#c00" stroke-width="1.5" marker-end="url(#fsarr_r)"/>
  <text x="485" y="500" text-anchor="middle" font-size="9" fill="#c00" font-weight="bold">NO</text>
  <rect x="550" y="490" width="170" height="36" rx="6" fill="#fff0f0" stroke="#c00" stroke-width="1.5"/>
  <text x="635" y="508" text-anchor="middle" font-size="9" fill="#c00">Stay in fault state</text>
  <text x="635" y="522" text-anchor="middle" font-size="9" fill="#555">Re-check every 500ms</text>

  <!-- L4 note: no auto-recovery -->
  <line x1="660" y1="288" x2="660" y2="580" stroke="#c00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="585" y="560" width="150" height="32" rx="5" fill="#ffe0f0" stroke="#c00" stroke-width="1"/>
  <text x="660" y="576" text-anchor="middle" font-size="8" fill="#c00" font-weight="bold">L4: NO auto-recovery</text>
  <text x="660" y="588" text-anchor="middle" font-size="8" fill="#555">Requires physical inspection</text>
</svg>
