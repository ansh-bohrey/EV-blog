<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="580" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">BMS Fault Taxonomy Tree</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#555">Classification of faults by source, severity, and response action</text>

  <!-- Root -->
  <rect x="325" y="60" width="250" height="44" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="white">BMS Fault Event</text>
  <text x="450" y="96" text-anchor="middle" font-size="9" fill="#aaa">Detected by protection logic in AFE or MCU</text>

  <!-- L1 branches: 4 main categories -->
  <!-- lines from root -->
  <line x1="450" y1="104" x2="450" y2="125" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="125" x2="120" y2="125" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="125" x2="290" y2="125" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="125" x2="610" y2="125" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="125" x2="780" y2="125" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="125" x2="120" y2="145" stroke="#555" stroke-width="1.5"/>
  <line x1="290" y1="125" x2="290" y2="145" stroke="#555" stroke-width="1.5"/>
  <line x1="610" y1="125" x2="610" y2="145" stroke="#555" stroke-width="1.5"/>
  <line x1="780" y1="125" x2="780" y2="145" stroke="#555" stroke-width="1.5"/>

  <!-- L1: Voltage faults -->
  <rect x="50" y="146" width="140" height="36" rx="6" fill="#ffcccc" stroke="#c00" stroke-width="2"/>
  <text x="120" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#900">Voltage Faults</text>
  <text x="120" y="175" text-anchor="middle" font-size="9" fill="#555">Cell / Pack V errors</text>

  <!-- L1: Thermal faults -->
  <rect x="220" y="146" width="140" height="36" rx="6" fill="#ffe0b0" stroke="#e07b00" stroke-width="2"/>
  <text x="290" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3a00">Thermal Faults</text>
  <text x="290" y="175" text-anchor="middle" font-size="9" fill="#555">Temp sensor errors</text>

  <!-- L1: Current faults -->
  <rect x="540" y="146" width="140" height="36" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="610" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#003a7a">Current Faults</text>
  <text x="610" y="175" text-anchor="middle" font-size="9" fill="#555">OCC / DSC / sensor</text>

  <!-- L1: Communication faults -->
  <rect x="710" y="146" width="140" height="36" rx="6" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="780" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#330080">Comm Faults</text>
  <text x="780" y="175" text-anchor="middle" font-size="9" fill="#555">CAN / SPI / UART</text>

  <!-- L2 Voltage children -->
  <line x1="120" y1="182" x2="120" y2="205" stroke="#c00" stroke-width="1.2"/>
  <line x1="120" y1="205" x2="55" y2="205" stroke="#c00" stroke-width="1.2"/>
  <line x1="120" y1="205" x2="120" y2="205" stroke="#c00" stroke-width="1.2"/>
  <line x1="120" y1="205" x2="185" y2="205" stroke="#c00" stroke-width="1.2"/>
  <line x1="55" y1="205" x2="55" y2="220" stroke="#c00" stroke-width="1.2"/>
  <line x1="120" y1="205" x2="120" y2="220" stroke="#c00" stroke-width="1.2"/>
  <line x1="185" y1="205" x2="185" y2="220" stroke="#c00" stroke-width="1.2"/>

  <rect x="15" y="221" width="80" height="56" rx="4" fill="#fff0f0" stroke="#c00" stroke-width="1.5"/>
  <text x="55" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#900">OV</text>
  <text x="55" y="249" text-anchor="middle" font-size="8" fill="#333">Overvoltage</text>
  <text x="55" y="261" text-anchor="middle" font-size="8" fill="#c00">V_cell &gt; 4.25V</text>
  <text x="55" y="273" text-anchor="middle" font-size="8" fill="#555">Open CHG FET</text>

  <rect x="80" y="221" width="80" height="56" rx="4" fill="#fff0f0" stroke="#c00" stroke-width="1.5"/>
  <text x="120" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#900">UV</text>
  <text x="120" y="249" text-anchor="middle" font-size="8" fill="#333">Undervoltage</text>
  <text x="120" y="261" text-anchor="middle" font-size="8" fill="#c00">V_cell &lt; 2.7V</text>
  <text x="120" y="273" text-anchor="middle" font-size="8" fill="#555">Open DSG FET</text>

  <rect x="145" y="221" width="80" height="56" rx="4" fill="#fff0f0" stroke="#c00" stroke-width="1.5"/>
  <text x="185" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#900">Imbal</text>
  <text x="185" y="249" text-anchor="middle" font-size="8" fill="#333">Imbalance</text>
  <text x="185" y="261" text-anchor="middle" font-size="8" fill="#c00">ΔV &gt; 100 mV</text>
  <text x="185" y="273" text-anchor="middle" font-size="8" fill="#555">Trigger balance</text>

  <!-- L2 Thermal children -->
  <line x1="290" y1="182" x2="290" y2="205" stroke="#e07b00" stroke-width="1.2"/>
  <line x1="290" y1="205" x2="225" y2="205" stroke="#e07b00" stroke-width="1.2"/>
  <line x1="290" y1="205" x2="355" y2="205" stroke="#e07b00" stroke-width="1.2"/>
  <line x1="225" y1="205" x2="225" y2="220" stroke="#e07b00" stroke-width="1.2"/>
  <line x1="290" y1="205" x2="290" y2="220" stroke="#e07b00" stroke-width="1.2"/>
  <line x1="355" y1="205" x2="355" y2="220" stroke="#e07b00" stroke-width="1.2"/>

  <rect x="185" y="221" width="80" height="56" rx="4" fill="#fff8f0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="225" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#7a3a00">OT_CHG</text>
  <text x="225" y="249" text-anchor="middle" font-size="8" fill="#333">Over-temp</text>
  <text x="225" y="261" text-anchor="middle" font-size="8" fill="#c00">T &gt; 45°C charge</text>
  <text x="225" y="273" text-anchor="middle" font-size="8" fill="#555">Stop charging</text>

  <rect x="250" y="221" width="80" height="56" rx="4" fill="#fff8f0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="290" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#7a3a00">OT_DSG</text>
  <text x="290" y="249" text-anchor="middle" font-size="8" fill="#333">Over-temp</text>
  <text x="290" y="261" text-anchor="middle" font-size="8" fill="#c00">T &gt; 60°C disch</text>
  <text x="290" y="273" text-anchor="middle" font-size="8" fill="#555">Reduce power</text>

  <rect x="315" y="221" width="80" height="56" rx="4" fill="#fff8f0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="355" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#7a3a00">UT_CHG</text>
  <text x="355" y="249" text-anchor="middle" font-size="8" fill="#333">Under-temp</text>
  <text x="355" y="261" text-anchor="middle" font-size="8" fill="#c00">T &lt; 5°C charge</text>
  <text x="355" y="273" text-anchor="middle" font-size="8" fill="#555">Block charge/heat</text>

  <!-- L2 Current children -->
  <line x1="610" y1="182" x2="610" y2="205" stroke="#1a6eb5" stroke-width="1.2"/>
  <line x1="610" y1="205" x2="545" y2="205" stroke="#1a6eb5" stroke-width="1.2"/>
  <line x1="610" y1="205" x2="675" y2="205" stroke="#1a6eb5" stroke-width="1.2"/>
  <line x1="545" y1="205" x2="545" y2="220" stroke="#1a6eb5" stroke-width="1.2"/>
  <line x1="610" y1="205" x2="610" y2="220" stroke="#1a6eb5" stroke-width="1.2"/>
  <line x1="675" y1="205" x2="675" y2="220" stroke="#1a6eb5" stroke-width="1.2"/>

  <rect x="505" y="221" width="80" height="56" rx="4" fill="#f0f8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="545" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">OCC</text>
  <text x="545" y="249" text-anchor="middle" font-size="8" fill="#333">Over-current</text>
  <text x="545" y="261" text-anchor="middle" font-size="8" fill="#c00">I &gt; I_chg_max</text>
  <text x="545" y="273" text-anchor="middle" font-size="8" fill="#555">Open CHG FET</text>

  <rect x="570" y="221" width="80" height="56" rx="4" fill="#f0f8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="610" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">DSC</text>
  <text x="610" y="249" text-anchor="middle" font-size="8" fill="#333">Short circuit</text>
  <text x="610" y="261" text-anchor="middle" font-size="8" fill="#c00">I &gt; 200 A / ms</text>
  <text x="610" y="273" text-anchor="middle" font-size="8" fill="#555">FET off in &lt;1 ms</text>

  <rect x="635" y="221" width="80" height="56" rx="4" fill="#f0f8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="675" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#003a7a">SENS_ERR</text>
  <text x="675" y="249" text-anchor="middle" font-size="8" fill="#333">Sensor fault</text>
  <text x="675" y="261" text-anchor="middle" font-size="8" fill="#c00">Stuck/open shunt</text>
  <text x="675" y="273" text-anchor="middle" font-size="8" fill="#555">Use fallback limit</text>

  <!-- L2 Comm children -->
  <line x1="780" y1="182" x2="780" y2="205" stroke="#6633cc" stroke-width="1.2"/>
  <line x1="780" y1="205" x2="715" y2="205" stroke="#6633cc" stroke-width="1.2"/>
  <line x1="780" y1="205" x2="845" y2="205" stroke="#6633cc" stroke-width="1.2"/>
  <line x1="715" y1="205" x2="715" y2="220" stroke="#6633cc" stroke-width="1.2"/>
  <line x1="845" y1="205" x2="845" y2="220" stroke="#6633cc" stroke-width="1.2"/>

  <rect x="675" y="221" width="80" height="56" rx="4" fill="#f5f0ff" stroke="#6633cc" stroke-width="1.5"/>
  <text x="715" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#330080">CAN_TO</text>
  <text x="715" y="249" text-anchor="middle" font-size="8" fill="#333">CAN timeout</text>
  <text x="715" y="261" text-anchor="middle" font-size="8" fill="#c00">No VCU msg &gt;500ms</text>
  <text x="715" y="273" text-anchor="middle" font-size="8" fill="#555">Safe state: open</text>

  <rect x="805" y="221" width="80" height="56" rx="4" fill="#f5f0ff" stroke="#6633cc" stroke-width="1.5"/>
  <text x="845" y="236" text-anchor="middle" font-size="9" font-weight="bold" fill="#330080">AFE_ERR</text>
  <text x="845" y="249" text-anchor="middle" font-size="8" fill="#333">SPI fault</text>
  <text x="845" y="261" text-anchor="middle" font-size="8" fill="#c00">AFE not resp.</text>
  <text x="845" y="273" text-anchor="middle" font-size="8" fill="#555">MCU watchdog</text>

  <!-- Severity levels (bottom colour key) -->
  <rect x="20" y="320" width="860" height="170" rx="8" fill="white" stroke="#ccc" stroke-width="1.5"/>
  <text x="450" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Severity Levels &amp; Response Actions</text>
  <line x1="20" y1="346" x2="880" y2="346" stroke="#eee" stroke-width="1"/>

  <!-- Level 1 -->
  <rect x="30" y="352" width="190" height="120" rx="6" fill="#fffaee" stroke="#c8a000" stroke-width="1.5"/>
  <text x="125" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a5000">Level 1 — Warning</text>
  <text x="40" y="386" font-size="9" fill="#333">Trigger: threshold exceeded</text>
  <text x="40" y="399" font-size="9" fill="#333">Action: CAN DTC set, warn driver</text>
  <text x="40" y="412" font-size="9" fill="#333">Power: no reduction</text>
  <text x="40" y="425" font-size="9" fill="#555">Examples: UV warning, OT warning,</text>
  <text x="40" y="438" font-size="9" fill="#555">imbalance ΔV &gt; 50 mV</text>
  <text x="40" y="451" font-size="9" fill="#555">Log: yes. Requires service? No.</text>
  <text x="40" y="464" font-size="9" fill="#555">Vehicle: drives normally</text>

  <!-- Level 2 -->
  <rect x="235" y="352" width="190" height="120" rx="6" fill="#fff3e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="330" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a3a00">Level 2 — Derate</text>
  <text x="245" y="386" font-size="9" fill="#333">Trigger: soft limit exceeded</text>
  <text x="245" y="399" font-size="9" fill="#333">Action: reduce SOP 30–50%</text>
  <text x="245" y="412" font-size="9" fill="#333">Power: restricted</text>
  <text x="245" y="425" font-size="9" fill="#555">Examples: OT 45–55°C, UV 2.9–3.0V,</text>
  <text x="245" y="438" font-size="9" fill="#555">OCC approaching limit</text>
  <text x="245" y="451" font-size="9" fill="#555">Log: yes. Service? Likely.</text>
  <text x="245" y="464" font-size="9" fill="#555">Vehicle: limp home mode</text>

  <!-- Level 3 -->
  <rect x="440" y="352" width="190" height="120" rx="6" fill="#ffe0e0" stroke="#c00" stroke-width="1.5"/>
  <text x="535" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#900">Level 3 — Shutdown</text>
  <text x="450" y="386" font-size="9" fill="#333">Trigger: hard limit exceeded</text>
  <text x="450" y="399" font-size="9" fill="#c00">Action: open CHG or DSG FET</text>
  <text x="450" y="412" font-size="9" fill="#333">Power: cut immediately</text>
  <text x="450" y="425" font-size="9" fill="#555">Examples: OV &gt; 4.25V, UV &lt; 2.7V,</text>
  <text x="450" y="438" font-size="9" fill="#555">DSC, CAN timeout</text>
  <text x="450" y="451" font-size="9" fill="#555">Log: yes + non-volatile. Service: yes.</text>
  <text x="450" y="464" font-size="9" fill="#555">Vehicle: pull over safely</text>

  <!-- Level 4 -->
  <rect x="645" y="352" width="215" height="120" rx="6" fill="#ffe0f0" stroke="#800" stroke-width="2"/>
  <text x="752" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#800">Level 4 — Emergency</text>
  <text x="655" y="386" font-size="9" fill="#333">Trigger: thermal runaway detected</text>
  <text x="655" y="399" font-size="9" fill="#c00">Action: open ALL contactors + HV off</text>
  <text x="655" y="412" font-size="9" fill="#c00">Fire suppression trigger (if equipped)</text>
  <text x="655" y="425" font-size="9" fill="#555">Send: THERMAL_RUNAWAY DTC on CAN</text>
  <text x="655" y="438" font-size="9" fill="#555">Vehicle: eCall / hazard lights auto</text>
  <text x="655" y="451" font-size="9" fill="#555">Log: yes. Service: mandatory.</text>
  <text x="655" y="464" font-size="9" fill="#555">Pack: condemned (must be replaced)</text>
</svg>
