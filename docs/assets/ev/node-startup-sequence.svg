<svg viewBox="0 0 860 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="600" fill="#f8f9fa"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">EV Node Startup Sequence — Key-ON to Drive Ready</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#555">Chronological message sequence showing BMS, VCU, and Inverter coordination</text>

  <!-- Column headers -->
  <rect x="20" y="58" width="130" height="36" rx="4" fill="#e8d0ff" stroke="#6633cc" stroke-width="2"/>
  <text x="85" y="81" text-anchor="middle" font-size="11" font-weight="bold" fill="#330080">BMS</text>

  <rect x="330" y="58" width="200" height="36" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="430" y="81" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5a1a">VCU</text>

  <rect x="710" y="58" width="130" height="36" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="775" y="81" text-anchor="middle" font-size="11" font-weight="bold" fill="#003a7a">Inverter</text>

  <!-- Vertical lifelines -->
  <line x1="85" y1="94" x2="85" y2="570" stroke="#9966cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="430" y1="94" x2="430" y2="570" stroke="#2a8a2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="775" y1="94" x2="775" y2="570" stroke="#1a6eb5" stroke-width="1.5" stroke-dasharray="5,3"/>

  <defs>
    <marker id="seqarr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#555"/>
    </marker>
    <marker id="seqarr_g" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2a8a2a"/>
    </marker>
    <marker id="seqarr_b" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#1a6eb5"/>
    </marker>
  </defs>

  <!-- Timeline events -->
  <!-- T=0 Key-ON -->
  <rect x="155" y="108" width="270" height="22" rx="4" fill="#ffe0d0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="290" y="123" text-anchor="middle" font-size="10" fill="#802000" font-weight="bold">KEY-ON signal (15V from ignition)</text>
  <line x1="155" y1="119" x2="85" y2="119" stroke="#e07b00" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="425" y1="119" x2="430" y2="119" stroke="#e07b00" stroke-width="2"/>
  <text x="145" y="115" text-anchor="end" font-size="9" fill="#e07b00">t=0ms</text>

  <!-- BMS boots, reads NV flash SOC -->
  <rect x="20" y="140" width="130" height="30" rx="4" fill="#e8d0ff" stroke="#9966cc" stroke-width="1.5"/>
  <text x="85" y="153" text-anchor="middle" font-size="9" fill="#330080">Boot + read</text>
  <text x="85" y="164" text-anchor="middle" font-size="9" fill="#330080">NV SOC</text>
  <text x="155" y="155" text-anchor="start" font-size="8" fill="#888">~50ms</text>

  <!-- BMS self-test + OCV snapshot -->
  <rect x="20" y="180" width="130" height="30" rx="4" fill="#e8d0ff" stroke="#9966cc" stroke-width="1.5"/>
  <text x="85" y="193" text-anchor="middle" font-size="9" fill="#330080">Self-test + AFE</text>
  <text x="85" y="204" text-anchor="middle" font-size="9" fill="#330080">scan all cells</text>
  <text x="155" y="195" text-anchor="start" font-size="8" fill="#888">t=100ms</text>

  <!-- BMS → VCU: BMS_READY message -->
  <line x1="85" y1="225" x2="425" y2="225" stroke="#9966cc" stroke-width="2" marker-end="url(#seqarr_g)"/>
  <rect x="155" y="213" width="210" height="22" rx="4" fill="#f5f0ff" stroke="#9966cc" stroke-width="1"/>
  <text x="260" y="228" text-anchor="middle" font-size="9" fill="#330080">BMS_READY | SOC=72% | T_max=18°C</text>
  <text x="155" y="211" text-anchor="start" font-size="8" fill="#888">t=150ms</text>

  <!-- VCU processes, requests pre-charge -->
  <rect x="330" y="245" width="200" height="30" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="430" y="258" text-anchor="middle" font-size="9" fill="#1a5a1a">VCU: check safety OK</text>
  <text x="430" y="269" text-anchor="middle" font-size="9" fill="#1a5a1a">request pre-charge</text>
  <text x="535" y="260" text-anchor="start" font-size="8" fill="#888">t=200ms</text>

  <!-- VCU → BMS: PRECHARGE_REQUEST -->
  <line x1="330" y1="290" x2="90" y2="290" stroke="#2a8a2a" stroke-width="2" marker-end="url(#seqarr)"/>
  <rect x="155" y="278" width="170" height="22" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1"/>
  <text x="240" y="293" text-anchor="middle" font-size="9" fill="#1a5a1a">VCU → BMS: PRECHARGE_REQ</text>
  <text x="540" y="290" text-anchor="start" font-size="8" fill="#888">t=210ms</text>

  <!-- BMS closes pre-charge relay -->
  <rect x="20" y="305" width="130" height="30" rx="4" fill="#e8d0ff" stroke="#9966cc" stroke-width="1.5"/>
  <text x="85" y="318" text-anchor="middle" font-size="9" fill="#330080">Close POS relay</text>
  <text x="85" y="329" text-anchor="middle" font-size="9" fill="#330080">via R_pre</text>

  <!-- Bus capacitor charging -->
  <rect x="155" y="308" width="610" height="22" rx="4" fill="#fffaee" stroke="#c8a000" stroke-width="1"/>
  <text x="460" y="323" text-anchor="middle" font-size="9" fill="#7a5000">Bus capacitor charging via R_pre (RC curve) — V_bus rising from 0V</text>

  <!-- BMS monitors V_bus -->
  <rect x="20" y="342" width="130" height="26" rx="4" fill="#e8d0ff" stroke="#9966cc" stroke-width="1.5"/>
  <text x="85" y="355" text-anchor="middle" font-size="9" fill="#330080">Poll V_bus</text>
  <text x="85" y="367" text-anchor="middle" font-size="9" fill="#330080">every 10ms</text>
  <text x="155" y="355" text-anchor="start" font-size="8" fill="#888">~200–500ms</text>

  <!-- BMS → VCU: PRECHARGE_DONE when V_bus ≥ 95% -->
  <line x1="85" y1="380" x2="425" y2="380" stroke="#9966cc" stroke-width="2" marker-end="url(#seqarr_g)"/>
  <rect x="140" y="368" width="235" height="22" rx="4" fill="#f5f0ff" stroke="#9966cc" stroke-width="1"/>
  <text x="257" y="383" text-anchor="middle" font-size="9" fill="#330080">BMS → VCU: PRECHARGE_DONE | V_bus=395V</text>
  <text x="155" y="366" text-anchor="start" font-size="8" fill="#888">t=~500ms</text>

  <!-- VCU → BMS: CLOSE_MAIN -->
  <line x1="330" y1="405" x2="90" y2="405" stroke="#2a8a2a" stroke-width="2" marker-end="url(#seqarr)"/>
  <rect x="155" y="393" width="170" height="22" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1"/>
  <text x="240" y="408" text-anchor="middle" font-size="9" fill="#1a5a1a">VCU → BMS: CLOSE_MAIN</text>

  <!-- BMS closes main contactor, opens pre-charge -->
  <rect x="20" y="420" width="130" height="30" rx="4" fill="#e8d0ff" stroke="#9966cc" stroke-width="1.5"/>
  <text x="85" y="433" text-anchor="middle" font-size="9" fill="#330080">Close main POS+NEG</text>
  <text x="85" y="445" text-anchor="middle" font-size="9" fill="#330080">open R_pre</text>
  <text x="155" y="432" text-anchor="start" font-size="8" fill="#888">t=520ms</text>

  <!-- BMS → VCU + Inverter: DRIVE_READY -->
  <line x1="85" y1="465" x2="425" y2="465" stroke="#9966cc" stroke-width="2" marker-end="url(#seqarr_g)"/>
  <line x1="85" y1="470" x2="770" y2="470" stroke="#9966cc" stroke-width="2" marker-end="url(#seqarr_b)"/>
  <rect x="140" y="453" width="570" height="22" rx="4" fill="#f5f0ff" stroke="#9966cc" stroke-width="1.5"/>
  <text x="425" y="468" text-anchor="middle" font-size="9" font-weight="bold" fill="#330080">BMS broadcast: DRIVE_READY | SOC=72% | P_max_chg=50kW | P_max_dsg=120kW</text>

  <!-- Inverter enables power stage -->
  <rect x="710" y="485" width="130" height="30" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="775" y="498" text-anchor="middle" font-size="9" fill="#003a7a">Enable HV bridge</text>
  <text x="775" y="510" text-anchor="middle" font-size="9" fill="#003a7a">motor ready</text>
  <text x="700" y="498" text-anchor="end" font-size="8" fill="#888">t=550ms</text>

  <!-- VCU: READY state -->
  <rect x="330" y="520" width="200" height="26" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="430" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5a1a">VCU → DRIVE state</text>
  <text x="535" y="533" text-anchor="start" font-size="8" fill="#888">t=~600ms</text>

  <!-- "Drive Ready" indicator -->
  <rect x="155" y="555" width="550" height="26" rx="6" fill="#2a8a2a" stroke="#1a5a1a" stroke-width="2"/>
  <text x="430" y="572" text-anchor="middle" font-size="11" font-weight="bold" fill="white">DRIVE READY — accelerator pedal active — BMS enforces SOP limits in real time</text>

  <!-- Right side: timing summary -->
  <rect x="15" y="580" width="830" height="0" rx="0" fill="none"/>
</svg>
