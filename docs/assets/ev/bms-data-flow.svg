<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="600" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">BMS Internal Data Flow</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#555">How raw sensor readings become CAN messages — the full signal chain inside a BMS</text>

  <defs>
    <marker id="dfaarr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#555"/>
    </marker>
    <marker id="dfaarr_b" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#1a6eb5"/>
    </marker>
    <marker id="dfaarr_g" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2a8a2a"/>
    </marker>
    <marker id="dfaarr_r" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#c00"/>
    </marker>
  </defs>

  <!-- ── INPUTS (left column) ── -->
  <text x="75" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">SENSORS</text>

  <!-- Cell voltage inputs -->
  <rect x="10" y="82" width="130" height="46" rx="6" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="75" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#802000">Cell Voltages</text>
  <text x="75" y="116" text-anchor="middle" font-size="9" fill="#555">AFE SPI scan — 10ms</text>
  <text x="75" y="127" text-anchor="middle" font-size="8" fill="#888">±1 mV res, all cells</text>

  <!-- Current sensor -->
  <rect x="10" y="148" width="130" height="46" rx="6" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="75" y="167" text-anchor="middle" font-size="10" font-weight="bold" fill="#802000">Current Sensor</text>
  <text x="75" y="182" text-anchor="middle" font-size="9" fill="#555">Hall effect / shunt</text>
  <text x="75" y="193" text-anchor="middle" font-size="8" fill="#888">±0.1% res, 10ms</text>

  <!-- Temperature sensors -->
  <rect x="10" y="214" width="130" height="46" rx="6" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="75" y="233" text-anchor="middle" font-size="10" font-weight="bold" fill="#802000">Thermistors</text>
  <text x="75" y="248" text-anchor="middle" font-size="9" fill="#555">NTC per module</text>
  <text x="75" y="259" text-anchor="middle" font-size="8" fill="#888">±1°C, 100ms</text>

  <!-- V_bus sensor -->
  <rect x="10" y="280" width="130" height="36" rx="6" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="75" y="299" text-anchor="middle" font-size="10" font-weight="bold" fill="#802000">V_bus sensor</text>
  <text x="75" y="311" text-anchor="middle" font-size="9" fill="#555">pre-charge monitor</text>

  <!-- ── AFE / Signal conditioning (column 2) ── -->
  <rect x="185" y="82" width="130" height="244" rx="8" fill="#fff0d0" stroke="#e07b00" stroke-width="2"/>
  <text x="250" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3a00">AFE IC</text>
  <text x="250" y="116" text-anchor="middle" font-size="9" fill="#555">(BQ76940)</text>
  <line x1="185" y1="123" x2="315" y2="123" stroke="#e07b00" stroke-width="1"/>
  <text x="250" y="138" text-anchor="middle" font-size="9" fill="#333">16-bit ADC</text>
  <text x="250" y="152" text-anchor="middle" font-size="9" fill="#333">Cell select MUX</text>
  <text x="250" y="166" text-anchor="middle" font-size="9" fill="#333">Temp ADC</text>
  <text x="250" y="180" text-anchor="middle" font-size="9" fill="#333">Coulomb counter</text>
  <line x1="185" y1="190" x2="315" y2="190" stroke="#e07b00" stroke-width="1"/>
  <text x="250" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#c00">HW Protection</text>
  <text x="250" y="220" text-anchor="middle" font-size="9" fill="#333">OV comparator</text>
  <text x="250" y="234" text-anchor="middle" font-size="9" fill="#333">UV comparator</text>
  <text x="250" y="248" text-anchor="middle" font-size="9" fill="#333">OT comparator</text>
  <text x="250" y="262" text-anchor="middle" font-size="9" fill="#c00">→ FET off &lt;1ms</text>
  <text x="250" y="276" text-anchor="middle" font-size="9" fill="#555">(hardware, no MCU)</text>
  <text x="250" y="295" text-anchor="middle" font-size="8" fill="#888">SPI 4-wire → MCU</text>
  <text x="250" y="307" text-anchor="middle" font-size="8" fill="#888">ALERT pin → IRQ</text>

  <!-- Arrows sensors → AFE -->
  <line x1="140" y1="105" x2="185" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#dfaarr)"/>
  <line x1="140" y1="171" x2="185" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#dfaarr)"/>
  <line x1="140" y1="237" x2="185" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#dfaarr)"/>
  <line x1="140" y1="298" x2="185" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <!-- AFE → MCU -->
  <line x1="315" y1="205" x2="370" y2="205" stroke="#e07b00" stroke-width="2" marker-end="url(#dfaarr)"/>
  <text x="342" y="199" text-anchor="middle" font-size="8" fill="#e07b00">SPI</text>

  <!-- ── MCU / Algorithms (centre column) ── -->
  <rect x="370" y="65" width="200" height="450" rx="10" fill="white" stroke="#6633cc" stroke-width="2.5"/>
  <text x="470" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#330080">MCU</text>
  <text x="470" y="102" text-anchor="middle" font-size="9" fill="#555">(STM32 / Renesas)</text>
  <line x1="370" y1="108" x2="570" y2="108" stroke="#9966cc" stroke-width="1"/>

  <!-- Algorithm blocks inside MCU -->
  <rect x="383" y="115" width="174" height="35" rx="4" fill="#f5f0ff" stroke="#9966cc" stroke-width="1.5"/>
  <text x="470" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#330080">Data Acquisition</text>
  <text x="470" y="143" text-anchor="middle" font-size="8" fill="#555">Read AFE via SPI every 10ms</text>

  <line x1="470" y1="150" x2="470" y2="162" stroke="#9966cc" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <rect x="383" y="163" width="174" height="35" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="470" y="178" text-anchor="middle" font-size="10" font-weight="bold" fill="#003a7a">SOC Estimation</text>
  <text x="470" y="191" text-anchor="middle" font-size="8" fill="#555">Coulomb count + EKF correction</text>

  <line x1="470" y1="198" x2="470" y2="210" stroke="#9966cc" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <rect x="383" y="211" width="174" height="35" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="470" y="226" text-anchor="middle" font-size="10" font-weight="bold" fill="#003a7a">SOH Estimation</text>
  <text x="470" y="239" text-anchor="middle" font-size="8" fill="#555">Capacity fade tracking, R_int</text>

  <line x1="470" y1="246" x2="470" y2="258" stroke="#9966cc" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <rect x="383" y="259" width="174" height="35" rx="4" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="1.5"/>
  <text x="470" y="274" text-anchor="middle" font-size="10" font-weight="bold" fill="#003a7a">SOP Calculation</text>
  <text x="470" y="287" text-anchor="middle" font-size="8" fill="#555">P_max from R₀, R_RC, temp</text>

  <line x1="470" y1="294" x2="470" y2="306" stroke="#9966cc" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <rect x="383" y="307" width="174" height="35" rx="4" fill="#ffe0d0" stroke="#c04000" stroke-width="1.5"/>
  <text x="470" y="322" text-anchor="middle" font-size="10" font-weight="bold" fill="#802000">Protection Logic</text>
  <text x="470" y="335" text-anchor="middle" font-size="8" fill="#555">SW OV/UV/OT/OCC checks</text>

  <line x1="470" y1="342" x2="470" y2="354" stroke="#9966cc" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <rect x="383" y="355" width="174" height="35" rx="4" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="1.5"/>
  <text x="470" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5a1a">Balancing Control</text>
  <text x="470" y="383" text-anchor="middle" font-size="8" fill="#555">Select which cells to bleed</text>

  <line x1="470" y1="390" x2="470" y2="402" stroke="#9966cc" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <rect x="383" y="403" width="174" height="35" rx="4" fill="#e8d0ff" stroke="#6633cc" stroke-width="1.5"/>
  <text x="470" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#330080">CAN Tx/Rx Handler</text>
  <text x="470" y="431" text-anchor="middle" font-size="8" fill="#555">Encode frames, send 10Hz</text>

  <line x1="470" y1="438" x2="470" y2="452" stroke="#9966cc" stroke-width="1.5" marker-end="url(#dfaarr)"/>

  <rect x="383" y="453" width="174" height="35" rx="4" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <text x="470" y="468" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">NV Storage</text>
  <text x="470" y="481" text-anchor="middle" font-size="8" fill="#555">Write SOC, fault log, SOH</text>

  <!-- ── OUTPUTS (right column) ── -->
  <text x="780" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">OUTPUTS</text>

  <!-- CAN bus -->
  <line x1="570" y1="185" x2="630" y2="185" stroke="#1a6eb5" stroke-width="2" marker-end="url(#dfaarr_b)"/>
  <rect x="630" y="165" width="140" height="42" rx="6" fill="#d0e8ff" stroke="#1a6eb5" stroke-width="2"/>
  <text x="700" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#003a7a">CAN Bus</text>
  <text x="700" y="198" text-anchor="middle" font-size="9" fill="#555">SOC, SOH, SOP, T, faults</text>

  <!-- FET drive -->
  <line x1="570" y1="322" x2="630" y2="322" stroke="#c00" stroke-width="2" marker-end="url(#dfaarr_r)"/>
  <rect x="630" y="305" width="140" height="42" rx="6" fill="#ffe0d0" stroke="#c04000" stroke-width="2"/>
  <text x="700" y="324" text-anchor="middle" font-size="10" font-weight="bold" fill="#802000">CHG/DSG FETs</text>
  <text x="700" y="338" text-anchor="middle" font-size="9" fill="#555">Open on fault (&lt;1ms HW)</text>

  <!-- Balance FETs -->
  <line x1="570" y1="372" x2="630" y2="372" stroke="#2a8a2a" stroke-width="2" marker-end="url(#dfaarr_g)"/>
  <rect x="630" y="355" width="140" height="42" rx="6" fill="#d0ffd0" stroke="#2a8a2a" stroke-width="2"/>
  <text x="700" y="374" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5a1a">Balance FETs</text>
  <text x="700" y="388" text-anchor="middle" font-size="9" fill="#555">Bypass resistors per cell</text>

  <!-- NV flash -->
  <line x1="570" y1="470" x2="630" y2="470" stroke="#888" stroke-width="2" marker-end="url(#dfaarr)"/>
  <rect x="630" y="453" width="140" height="42" rx="6" fill="#f0f0f0" stroke="#888" stroke-width="2"/>
  <text x="700" y="472" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">Flash / EEPROM</text>
  <text x="700" y="486" text-anchor="middle" font-size="9" fill="#555">Persist SOC + fault log</text>

  <!-- Timing annotation at bottom -->
  <rect x="10" y="545" width="880" height="44" rx="8" fill="#f0f0ff" stroke="#5555cc" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Timing summary</text>
  <text x="450" y="579" text-anchor="middle" font-size="10" fill="#555">AFE scan: 10ms  |  SOC update: 10ms  |  CAN TX: 100ms (10Hz)  |  HW protection (FET): &lt;1ms  |  NV write: key-off only</text>
</svg>
