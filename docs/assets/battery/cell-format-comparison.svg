<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="900" height="500" fill="#f5f6fa"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Li-ion Cell Formats — To Scale</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#666">Scale: 1 px = 0.75 mm (relative sizes preserved)</text>

  <!-- ======================================================
       SCALE: 1px = 0.75 mm  (so 1 mm = 1.333 px)
       Reference: 18650 = 18mm dia × 65mm height
         → 24px wide × 86.7px tall

       18650:  dia=18mm → 24px  h=65mm → 87px
       21700:  dia=21mm → 28px  h=70mm → 93px
       4680:   dia=46mm → 61px  h=80mm → 107px
       Prismatic: 148mm × 91mm × 26.5mm → 197px × 121px (show face)
       Pouch: 300mm × 100mm × 7mm → 400px × 133px wide × 9px thick
              (show face as landscape rectangle)
  ====================================================== -->

  <!-- ======== SCALE RULER at bottom ======== -->
  <line x1="30" y1="470" x2="163" y2="470" stroke="#888" stroke-width="1.5"/>
  <line x1="30" y1="465" x2="30" y2="475" stroke="#888" stroke-width="1.5"/>
  <line x1="163" y1="465" x2="163" y2="475" stroke="#888" stroke-width="1.5"/>
  <text x="96" y="484" text-anchor="middle" font-size="10" fill="#777">100 mm</text>

  <!-- ======== CELL 1: 18650 ======== -->
  <!-- Center at x=75, baseline y=400 -->
  <!-- 24px wide, 87px tall -->
  <rect x="63" y="313" width="24" height="87" rx="4" ry="4" fill="#4a90d9" stroke="#2a70b9" stroke-width="1.5"/>
  <!-- Positive terminal cap (top) -->
  <rect x="69" y="309" width="12" height="6" rx="2" fill="#2a70b9"/>
  <!-- Negative flat bottom indicator -->
  <line x1="63" y1="400" x2="87" y2="400" stroke="#2a70b9" stroke-width="2"/>
  <!-- Labels -->
  <text x="75" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">18650</text>
  <text x="75" y="447" text-anchor="middle" font-size="10" fill="#555">18 × 65 mm</text>
  <text x="75" y="460" text-anchor="middle" font-size="9" fill="#888">Mature mfg.</text>
  <!-- User label (above) -->
  <text x="75" y="308" text-anchor="middle" font-size="9" fill="#4a90d9">Tesla (legacy)</text>
  <!-- Dimension arrows -->
  <line x1="93" y1="309" x2="93" y2="400" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="100" y="358" font-size="9" fill="#999" transform="rotate(-90,100,358)">65 mm</text>

  <!-- ======== CELL 2: 21700 ======== -->
  <!-- 28px wide, 93px tall, center at x=155 -->
  <rect x="141" y="307" width="28" height="93" rx="4" ry="4" fill="#5ba85e" stroke="#3a884e" stroke-width="1.5"/>
  <rect x="149" y="303" width="12" height="6" rx="2" fill="#3a884e"/>
  <line x1="141" y1="400" x2="169" y2="400" stroke="#3a884e" stroke-width="2"/>
  <text x="155" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">21700</text>
  <text x="155" y="447" text-anchor="middle" font-size="10" fill="#555">21 × 70 mm</text>
  <text x="155" y="460" text-anchor="middle" font-size="9" fill="#888">Higher energy</text>
  <text x="155" y="302" text-anchor="middle" font-size="9" fill="#5ba85e">Tesla Model 3/Y</text>

  <!-- ======== CELL 3: 4680 ======== -->
  <!-- 61px wide, 107px tall, center at x=268 -->
  <rect x="238" y="293" width="61" height="107" rx="6" ry="6" fill="#e07b39" stroke="#c05a19" stroke-width="1.5"/>
  <rect x="250" y="288" width="37" height="7" rx="3" fill="#c05a19"/>
  <line x1="238" y1="400" x2="299" y2="400" stroke="#c05a19" stroke-width="2"/>
  <!-- Tabless label inside cell -->
  <text x="269" y="347" text-anchor="middle" font-size="9" fill="white" font-weight="bold">TABLESS</text>
  <text x="269" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">4680</text>
  <text x="269" y="447" text-anchor="middle" font-size="10" fill="#555">46 × 80 mm</text>
  <text x="269" y="460" text-anchor="middle" font-size="9" fill="#888">Tabless design</text>
  <text x="269" y="287" text-anchor="middle" font-size="9" fill="#e07b39">Tesla 4680</text>

  <!-- ======== CELL 4: Prismatic ======== -->
  <!-- 197px wide × 121px tall (148mm × 91mm face), show as portrait -->
  <!-- Place at x=360 center, drawn as 148px wide × 91px tall (scaled 0.75) -->
  <!-- 148mm×0.75 = 111px wide, 91mm×0.75 = 68px tall -->
  <!-- Let's use 148px × 91px for visual clarity (roughly proportional) -->
  <rect x="360" y="309" width="148" height="91" rx="5" ry="5" fill="#9b59b6" stroke="#7d3c9e" stroke-width="1.5"/>
  <!-- Internal lines suggesting wound cell structure -->
  <line x1="380" y1="309" x2="380" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="400" y1="309" x2="400" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="420" y1="309" x2="420" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="440" y1="309" x2="440" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="460" y1="309" x2="460" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="480" y1="309" x2="480" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Terminals on top -->
  <rect x="390" y="299" width="14" height="12" rx="2" fill="#7d3c9e"/>
  <rect x="460" y="299" width="14" height="12" rx="2" fill="#7d3c9e"/>
  <text x="391" y="307" text-anchor="middle" font-size="8" fill="white">+</text>
  <text x="461" y="307" text-anchor="middle" font-size="8" fill="white">−</text>
  <!-- Depth indicator (26.5mm ~ 20px) -->
  <rect x="508" y="325" width="20" height="59" rx="3" fill="#c39bd3" stroke="#9b59b6" stroke-width="1" opacity="0.7"/>
  <text x="518" y="359" text-anchor="middle" font-size="7" fill="#6c3483" transform="rotate(-90,518,359)">26.5mm</text>
  <text x="434" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Prismatic</text>
  <text x="434" y="447" text-anchor="middle" font-size="10" fill="#555">148 × 91 × 26.5 mm</text>
  <text x="434" y="460" text-anchor="middle" font-size="9" fill="#888">Space-efficient</text>
  <text x="434" y="298" text-anchor="middle" font-size="9" fill="#9b59b6">BMW i3, VW ID.4</text>

  <!-- ======== CELL 5: Pouch ======== -->
  <!-- 300mm × 100mm face, 7mm thick
       Scale: 300×0.75=225px wide, 100×0.75=75px tall
       Place at x=560 center, show face (landscape) -->
  <rect x="545" y="330" width="310" height="65" rx="4" ry="4" fill="#e8c84a" stroke="#c9a800" stroke-width="1.5"/>
  <!-- Aluminum foil texture lines -->
  <line x1="580" y1="330" x2="580" y2="395" stroke="rgba(160,130,0,0.2)" stroke-width="1"/>
  <line x1="620" y1="330" x2="620" y2="395" stroke="rgba(160,130,0,0.2)" stroke-width="1"/>
  <line x1="660" y1="330" x2="660" y2="395" stroke="rgba(160,130,0,0.2)" stroke-width="1"/>
  <line x1="700" y1="330" x2="700" y2="395" stroke="rgba(160,130,0,0.2)" stroke-width="1"/>
  <line x1="740" y1="330" x2="740" y2="395" stroke="rgba(160,130,0,0.2)" stroke-width="1"/>
  <line x1="780" y1="330" x2="780" y2="395" stroke="rgba(160,130,0,0.2)" stroke-width="1"/>
  <line x1="820" y1="330" x2="820" y2="395" stroke="rgba(160,130,0,0.2)" stroke-width="1"/>
  <!-- Tabs (left side) -->
  <rect x="525" y="348" width="22" height="10" rx="1" fill="#c9a800"/>
  <rect x="525" y="368" width="22" height="10" rx="1" fill="#aaa"/>
  <text x="524" y="356" text-anchor="end" font-size="8" fill="#c9a800">+</text>
  <text x="524" y="376" text-anchor="end" font-size="8" fill="#888">−</text>
  <!-- Thickness edge (right side, 7mm → ~9px) -->
  <rect x="855" y="335" width="9" height="55" rx="2" fill="#f5d870" stroke="#c9a800" stroke-width="1" opacity="0.8"/>
  <text x="867" y="365" font-size="8" fill="#8a6d00" transform="rotate(-90,867,365)">7mm</text>

  <text x="700" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Pouch</text>
  <text x="700" y="447" text-anchor="middle" font-size="10" fill="#555">~300 × 100 × 7 mm</text>
  <text x="700" y="460" text-anchor="middle" font-size="9" fill="#888">Highest energy density</text>
  <text x="700" y="329" text-anchor="middle" font-size="9" fill="#c9a800">LG / SK / AESC</text>

  <!-- ======== BASELINE REFERENCE LINE ======== -->
  <line x1="30" y1="400" x2="880" y2="400" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="28" y="403" text-anchor="end" font-size="9" fill="#bbb">baseline</text>

  <!-- ======== SIZE COMPARISON NOTE ======== -->
  <rect x="30" y="55" width="290" height="50" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="72" font-size="10" fill="#555" font-weight="bold">Relative size note:</text>
  <text x="40" y="86" font-size="10" fill="#555">Cylinders drawn to same height scale.</text>
  <text x="40" y="99" font-size="10" fill="#555">Prismatic &amp; pouch shown as face area.</text>

</svg>
